  <script>

  "document": {
    "title": "Anthropic Claude Opus 4.8",
    "source": "https://www.anthropic.com/news/claude-opus-4-8",
    "text": "Introducing Claude Opus 4.8\n\nWe\u2019re upgrading Claude Opus to a new version: Claude Opus 4.8. It builds on Opus 4.7 with improvements across benchmarks, and is a more effective collaborator. It\u2019s available today for the same price.\n\nOpus 4.8 launches alongside several new features. Users on claude.ai now have control over the amount of effort Claude puts into a task. Claude Code has a new \u201cdynamic workflows\u201d feature that allows it to tackle very large-scale problems. And fast mode for Opus 4.8\u2014where the model can work at 2.5\u00d7 the speed\u2014is now three times cheaper than it was for previous models.\n\nOpus 4.8\u2019s capabilities\n\nThe table below shows how Opus 4.8 compares to its predecessor and to other models on tests of coding, agentic skills, reasoning, and practical knowledge work tasks. More details and a much wider range of capability evaluations are provided in the Claude Opus 4.8 System Card.\n\nCollaborating with Opus 4.8\n\nEarly testers have found Claude Opus 4.8 to be more reliable and sharper in its judgement when it\u2019s performing agentic tasks. Below are quotes from many of these testers about their experience collaborating with Opus 4.8:\n\nClaude Opus 4.8 has noticeably better judgment. In Claude Code, it asks the right questions, catches its own mistakes, pushes back when a plan isn\u2019t sound, and builds up confidence around complex, multi-service explorations before making big changes. It\u2019s a great model to build with.Tom Pritchard Staff Engineer\n\nOn our Super-Agent benchmark, Claude Opus 4.8 is the only model to complete every case end-to-end, beating prior Opus models and GPT-5.5 at parity on cost. For agent products in translation, deep research, slide-building, and analysis, it delivers powerful reliability.Kay Zhu Co-Founder and CTO\n\nOn CursorBench, Claude Opus 4.8 exceeds prior Opus models across every effort level. Tool calling is meaningfully more efficient, using fewer steps for the same intelligence, and it carries end-to-end tasks through. Michael Truell Co-Founder and CEO\n\nClaude Opus 4.8 delivers the highest score recorded on our Legal Agent Benchmark, and is the first model to break 10% overall on the all-pass standard. For substantive legal work, that\u2019s the kind of accuracy lift that translates directly into how much real attorney work our customers can hand off with confidence.Niko Grupen Head of Applied Research\n\nClaude Opus 4.8 feels like a major quality-of-life update over Opus 4.7: faster, easier to collaborate with, and better at carrying context and style direction across a long session. Opus 4.8 is the model I kept trusting for work where voice, taste, and technical execution all have to happen side-by-side.Katie Parrott Staff Writer\n\nClaude Opus 4.8 is the strongest computer-use and browser-agent model we\u2019ve tested, scoring 84% on Online-Mind2Web, which is a meaningful jump over both Opus 4.7 and GPT-5.5. It stays reflective and on-task in the way our customers\u2019 agent workloads need to be reliable end-to-end.Miguel Gonzalez Tech Lead\n\nClaude Opus 4.8 uses tools cleanly and follows instructions with the consistency our autonomous engineering workloads need to keep running unattended. It improves on Opus 4.6 and fixes the comment-verbosity and tool-calling issues we saw with Opus 4.7. This release from Anthropic translates directly into faster capability gains for engineers building on Devin.Scott Wu CEO\n\nOn our long-running evals, Claude Opus 4.8\u2019s analysis was consistently higher quality than prior Opus models. It finished faster and produced richer, more information dense outputs. Overall, a noticeably better signal to noise ratio. The biggest differentiator was Opus 4.8\u2019s tendency to proactively flag issues with the inputs and outputs of an analysis, something other models routinely missed and left to the users to catch.Michael Ran Sr. Investment Associate\n\nAcross CoCounsel Legal, Claude Opus 4.8 delivered meaningful improvements in consistency and reasoning quality compared to prior Opus models. For the high-stakes professional workflows our customers depend on, that reliability matters. As we build fiduciary-grade AI systems for legal and tax professionals, advances like these help raise the standard for trusted AI performance in real-world workflows.Joel Hron Chief Technology Officer\n\nClaude Opus 4.8 sets a new bar for enterprise AI. In Genie, Databricks\u2019 AI agent for data and knowledge work, the new Opus model unlocks a step change in agentic reasoning, tackling deeper, multistep questions faster than any prior Opus. Its multimodal strength also lets Genie reason directly over PDFs, diagrams, and other unstructured content at 61% cheaper token cost than Opus 4.7.Hanlin Tang CTO, Neural Networks\n\nFor financial-document workflows in Hebbia\u2019s orchestrator, Claude Opus 4.8 delivers the same strong quality as Opus 4.7 with noticeably better citation precision and more token efficiency on retrieval, which works incredibly well for the kinds of dense filings our customers run every day.Aabhas Sharma CTO\n\nOne of the most prominent improvements in Opus 4.8 is its honesty. We train all our models to be honest\u2014for instance, to avoid making claims that they can\u2019t support. But a general problem with AI models is that they sometimes jump to conclusions, confidently claiming to have made progress in their work despite the evidence being thin. Early testers report that Opus 4.8 is more likely to flag uncertainties about its work and less likely to make unsupported claims. This is borne out in our evaluations, which show that Opus 4.8 is around four times less likely than its predecessor to allow flaws in code it has written to pass unremarked.\n\nAs always, we ran a detailed alignment assessment on the model before release. In terms of positive traits, our Alignment team concluded that Opus 4.8 \u201creaches new highs on our measures of prosocial traits like supporting user autonomy and acting in the user\u2019s best interest.\u201d The assessment also showed Opus 4.8 to have rates of misaligned behavior (such as deception or cooperation with misuse) that are substantially lower than Opus 4.7, and similar to our best-aligned model, Claude Mythos Preview. The full alignment assessment, accompanied by a suite of pre-deployment safety tests, is reported in the Claude Opus 4.8 System Card.\n\nAlso launching today\n\nIn addition to Claude Opus 4.8, we\u2019re making the following updates:\n\nDynamic workflows. This new feature, available in research preview, allows Claude to take on even bigger tasks in Claude Code. Claude can plan the work and then run hundreds of parallel subagents in a single session (and with Opus 4.8, the agents can run for even longer). It then verifies its outputs before reporting back to the user. For example, Claude Code with Opus 4.8 can now carry out codebase-scale migrations across hundreds of thousands of lines of code from kickoff to merge, with the existing test suite as its bar. You can read more about dynamic workflows\u2014available in Claude Code for Enterprise, Team, and Max plans\u2014in this post.\n\nEffort control in claude.ai and Cowork. A new control alongside the model selector lets users choose how much effort Claude puts into a response. On higher effort settings, Claude will think more frequently and more deeply to give better responses. On lower effort settings, Claude will respond faster and use up a user\u2019s rate limits more slowly. Users now have this choice\u2014the effort control is available on all plans.\n\nThe Messages API now accepts system entries inside the messages array. Developers can update Claude\u2019s instructions mid-task without breaking the prompt cache or routing the update through a user turn. This can be used in a given harness to update permissions, token budgets, or environment context as an agent runs.\n\nA note on effort\n\nOpus 4.8 defaults to high effort, which we judge to be the best overall balance of quality and user experience. On coding tasks, this effort level spends a similar number of tokens as Opus 4.7\u2019s default, but with better performance. Users can choose \u201cextra\u201d (\u201cxhigh\u201d in Claude Code) or \u201cmax,\u201d and the model will spend more tokens to get better results; we recommend using \u201cextra\u201d for difficult tasks and long-running asynchronous workflows. We have increased rate limits in Claude Code to accommodate the higher token usage of higher effort levels; users can select whichever makes sense for their particular project.\n\nWhat\u2019s next?\n\nUsers will find Opus 4.8 to be a modest but tangible improvement on its predecessor. There\u2019s still more to be done: we\u2019re working on developing and releasing models that provide many of the same capabilities as Opus at a lower cost.\n\nNot only that, but we plan to release a new class of model with even higher intelligence than Opus. As part of Project Glasswing, a small number of organizations are currently using Claude Mythos Preview for cybersecurity work. Models of this capability level require stronger cyber safeguards before they can be generally released. We\u2019re making swift progress on developing these safeguards and expect to be able to bring Mythos-class models to all our customers in the coming weeks.\n\nAvailability\n\nClaude Opus 4.8 is available everywhere today. Pricing for regular usage is unchanged from Opus 4.7: $5 per million input tokens and $25 per million output tokens. Pricing for fast mode is $10 per million input tokens and $50 per million output tokens. Developers can use claude-opus-4-8 via the Claude API.",

          "block_id": "block-1",
          "kind": "p",
          "text": "We\u2019re upgrading Claude Opus to a new version: Claude Opus 4.8. It builds on Opus 4.7 with improvements across benchmarks, and is a more effective collaborator. It\u2019s available today for the same price.",
          "section_heading": "Introducing Claude Opus 4.8",
          "source_order": 1
        },
        {
          "block_id": "block-2",
          "kind": "p",
          "text": "Opus 4.8 launches alongside several new features. Users on claude.ai now have control over the amount of effort Claude puts into a task. Claude Code has a new \u201cdynamic workflows\u201d feature that allows it to tackle very large-scale problems. And fast mode for Opus 4.8\u2014where the model can work at 2.5\u00d7 the speed\u2014is now three times cheaper than it was for previous models.",
          "section_heading": "Introducing Claude Opus 4.8",
          "source_order": 2
        },
        {
          "block_id": "block-3",
          "kind": "h2",
          "text": "Opus 4.8\u2019s capabilities",
          "section_heading": "Introducing Claude Opus 4.8",
          "source_order": 3
        },
        {
          "block_id": "block-4",
          "kind": "p",
          "text": "The table below shows how Opus 4.8 compares to its predecessor and to other models on tests of coding, agentic skills, reasoning, and practical knowledge work tasks. More details and a much wider range of capability evaluations are provided in the Claude Opus 4.8 System Card.",
          "section_heading": "Opus 4.8\u2019s capabilities",
          "source_order": 4
        },
        {
          "block_id": "block-5",
          "kind": "h2",
          "text": "Collaborating with Opus 4.8",
          "section_heading": "Opus 4.8\u2019s capabilities",
          "source_order": 5
        },
        {
          "block_id": "block-6",
          "kind": "p",
          "text": "Early testers have found Claude Opus 4.8 to be more reliable and sharper in its judgement when it\u2019s performing agentic tasks. Below are quotes from many of these testers about their experience collaborating with Opus 4.8:",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 6
        },
        {
          "block_id": "block-7",
          "kind": "blockquote",
          "text": "Claude Opus 4.8 has noticeably better judgment. In Claude Code, it asks the right questions, catches its own mistakes, pushes back when a plan isn\u2019t sound, and builds up confidence around complex, multi-service explorations before making big changes. It\u2019s a great model to build with.Tom Pritchard Staff Engineer",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 7
        },
        {
          "block_id": "block-8",
          "kind": "blockquote",
          "text": "On our Super-Agent benchmark, Claude Opus 4.8 is the only model to complete every case end-to-end, beating prior Opus models and GPT-5.5 at parity on cost. For agent products in translation, deep research, slide-building, and analysis, it delivers powerful reliability.Kay Zhu Co-Founder and CTO",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 8
        },
        {
          "block_id": "block-9",
          "kind": "blockquote",
          "text": "On CursorBench, Claude Opus 4.8 exceeds prior Opus models across every effort level. Tool calling is meaningfully more efficient, using fewer steps for the same intelligence, and it carries end-to-end tasks through. Michael Truell Co-Founder and CEO",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 9
        },
        {
          "block_id": "block-10",
          "kind": "blockquote",
          "text": "Claude Opus 4.8 delivers the highest score recorded on our Legal Agent Benchmark, and is the first model to break 10% overall on the all-pass standard. For substantive legal work, that\u2019s the kind of accuracy lift that translates directly into how much real attorney work our customers can hand off with confidence.Niko Grupen Head of Applied Research",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 10
        },
        {
          "block_id": "block-11",
          "kind": "blockquote",
          "text": "Claude Opus 4.8 feels like a major quality-of-life update over Opus 4.7: faster, easier to collaborate with, and better at carrying context and style direction across a long session. Opus 4.8 is the model I kept trusting for work where voice, taste, and technical execution all have to happen side-by-side.Katie Parrott Staff Writer",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 11
        },
        {
          "block_id": "block-12",
          "kind": "blockquote",
          "text": "Claude Opus 4.8 is the strongest computer-use and browser-agent model we\u2019ve tested, scoring 84% on Online-Mind2Web, which is a meaningful jump over both Opus 4.7 and GPT-5.5. It stays reflective and on-task in the way our customers\u2019 agent workloads need to be reliable end-to-end.Miguel Gonzalez Tech Lead",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 12
        },
        {
          "block_id": "block-13",
          "kind": "blockquote",
          "text": "Claude Opus 4.8 uses tools cleanly and follows instructions with the consistency our autonomous engineering workloads need to keep running unattended. It improves on Opus 4.6 and fixes the comment-verbosity and tool-calling issues we saw with Opus 4.7. This release from Anthropic translates directly into faster capability gains for engineers building on Devin.Scott Wu CEO",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 13
        },
        {
          "block_id": "block-14",
          "kind": "blockquote",
          "text": "On our long-running evals, Claude Opus 4.8\u2019s analysis was consistently higher quality than prior Opus models. It finished faster and produced richer, more information dense outputs. Overall, a noticeably better signal to noise ratio. The biggest differentiator was Opus 4.8\u2019s tendency to proactively flag issues with the inputs and outputs of an analysis, something other models routinely missed and left to the users to catch.Michael Ran Sr. Investment Associate",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 14
        },
        {
          "block_id": "block-15",
          "kind": "blockquote",
          "text": "Across CoCounsel Legal, Claude Opus 4.8 delivered meaningful improvements in consistency and reasoning quality compared to prior Opus models. For the high-stakes professional workflows our customers depend on, that reliability matters. As we build fiduciary-grade AI systems for legal and tax professionals, advances like these help raise the standard for trusted AI performance in real-world workflows.Joel Hron Chief Technology Officer",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 15
        },
        {
          "block_id": "block-16",
          "kind": "blockquote",
          "text": "Claude Opus 4.8 sets a new bar for enterprise AI. In Genie, Databricks\u2019 AI agent for data and knowledge work, the new Opus model unlocks a step change in agentic reasoning, tackling deeper, multistep questions faster than any prior Opus. Its multimodal strength also lets Genie reason directly over PDFs, diagrams, and other unstructured content at 61% cheaper token cost than Opus 4.7.Hanlin Tang CTO, Neural Networks",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 16
        },
        {
          "block_id": "block-17",
          "kind": "blockquote",
          "text": "For financial-document workflows in Hebbia\u2019s orchestrator, Claude Opus 4.8 delivers the same strong quality as Opus 4.7 with noticeably better citation precision and more token efficiency on retrieval, which works incredibly well for the kinds of dense filings our customers run every day.Aabhas Sharma CTO",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 17
        },
        {
          "block_id": "block-18",
          "kind": "p",
          "text": "One of the most prominent improvements in Opus 4.8 is its honesty. We train all our models to be honest\u2014for instance, to avoid making claims that they can\u2019t support. But a general problem with AI models is that they sometimes jump to conclusions, confidently claiming to have made progress in their work despite the evidence being thin. Early testers report that Opus 4.8 is more likely to flag uncertainties about its work and less likely to make unsupported claims. This is borne out in our evaluations, which show that Opus 4.8 is around four times less likely than its predecessor to allow flaws in code it has written to pass unremarked.",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 18
        },
        {
          "block_id": "block-19",
          "kind": "p",
          "text": "As always, we ran a detailed alignment assessment on the model before release. In terms of positive traits, our Alignment team concluded that Opus 4.8 \u201creaches new highs on our measures of prosocial traits like supporting user autonomy and acting in the user\u2019s best interest.\u201d The assessment also showed Opus 4.8 to have rates of misaligned behavior (such as deception or cooperation with misuse) that are substantially lower than Opus 4.7, and similar to our best-aligned model, Claude Mythos Preview. The full alignment assessment, accompanied by a suite of pre-deployment safety tests, is reported in the Claude Opus 4.8 System Card.",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 19
        },
        {
          "block_id": "block-20",
          "kind": "h2",
          "text": "Also launching today",
          "section_heading": "Collaborating with Opus 4.8",
          "source_order": 20
        },
        {
          "block_id": "block-21",
          "kind": "p",
          "text": "In addition to Claude Opus 4.8, we\u2019re making the following updates:",
          "section_heading": "Also launching today",
          "source_order": 21
        },
        {
          "block_id": "block-22",
          "kind": "li",
          "text": "Dynamic workflows. This new feature, available in research preview, allows Claude to take on even bigger tasks in Claude Code. Claude can plan the work and then run hundreds of parallel subagents in a single session (and with Opus 4.8, the agents can run for even longer). It then verifies its outputs before reporting back to the user. For example, Claude Code with Opus 4.8 can now carry out codebase-scale migrations across hundreds of thousands of lines of code from kickoff to merge, with the existing test suite as its bar. You can read more about dynamic workflows\u2014available in Claude Code for Enterprise, Team, and Max plans\u2014in this post.",
          "section_heading": "Also launching today",
          "source_order": 22
        },
        {
          "block_id": "block-23",
          "kind": "li",
          "text": "Effort control in claude.ai and Cowork. A new control alongside the model selector lets users choose how much effort Claude puts into a response. On higher effort settings, Claude will think more frequently and more deeply to give better responses. On lower effort settings, Claude will respond faster and use up a user\u2019s rate limits more slowly. Users now have this choice\u2014the effort control is available on all plans.",
          "section_heading": "Also launching today",
          "source_order": 23
        },
        {
          "block_id": "block-24",
          "kind": "li",
          "text": "The Messages API now accepts system entries inside the messages array. Developers can update Claude\u2019s instructions mid-task without breaking the prompt cache or routing the update through a user turn. This can be used in a given harness to update permissions, token budgets, or environment context as an agent runs.",
          "section_heading": "Also launching today",
          "source_order": 24
        },
        {
          "block_id": "block-25",
          "kind": "h2",
          "text": "A note on effort",
          "section_heading": "Also launching today",
          "source_order": 25
        },
        {
          "block_id": "block-26",
          "kind": "p",
          "text": "Opus 4.8 defaults to high effort, which we judge to be the best overall balance of quality and user experience. On coding tasks, this effort level spends a similar number of tokens as Opus 4.7\u2019s default, but with better performance. Users can choose \u201cextra\u201d (\u201cxhigh\u201d in Claude Code) or \u201cmax,\u201d and the model will spend more tokens to get better results; we recommend using \u201cextra\u201d for difficult tasks and long-running asynchronous workflows. We have increased rate limits in Claude Code to accommodate the higher token usage of higher effort levels; users can select whichever makes sense for their particular project.",
          "section_heading": "A note on effort",
          "source_order": 26
        },
        {
          "block_id": "block-27",
          "kind": "h2",
          "text": "What\u2019s next?",
          "section_heading": "A note on effort",
          "source_order": 27
        },
        {
          "block_id": "block-28",
          "kind": "p",
          "text": "Users will find Opus 4.8 to be a modest but tangible improvement on its predecessor. There\u2019s still more to be done: we\u2019re working on developing and releasing models that provide many of the same capabilities as Opus at a lower cost.",
          "section_heading": "What\u2019s next?",
          "source_order": 28
        },
        {
          "block_id": "block-29",
          "kind": "p",
          "text": "Not only that, but we plan to release a new class of model with even higher intelligence than Opus. As part of Project Glasswing, a small number of organizations are currently using Claude Mythos Preview for cybersecurity work. Models of this capability level require stronger cyber safeguards before they can be generally released. We\u2019re making swift progress on developing these safeguards and expect to be able to bring Mythos-class models to all our customers in the coming weeks.",
          "section_heading": "What\u2019s next?",
          "source_order": 29
        },
        {
          "block_id": "block-30",
          "kind": "h2",
          "text": "Availability",
          "section_heading": "What\u2019s next?",
          "source_order": 30
        },
        {
          "block_id": "block-31",
          "kind": "p",
          "text": "Claude Opus 4.8 is available everywhere today. Pricing for regular usage is unchanged from Opus 4.7: $5 per million input tokens and $25 per million output tokens. Pricing for fast mode is $10 per million input tokens and $50 per million output tokens. Developers can use claude-opus-4-8 via the Claude API.",
          "section_heading": "Availability",
          "source_order": 31
        }
      ]
    }

  "launch_page": {
    "source_title": "Introducing Claude Opus 4.8 \\ Anthropic",
    "source_url": "https://www.anthropic.com/news/claude-opus-4-8",
    "blocks": [
      {
        "block_id": "block-0",
        "kind": "h1",
        "text": "Introducing Claude Opus 4.8",
        "source_order": 0
      },
      {
        "block_id": "block-1",
        "kind": "p",
        "text": "We\u2019re upgrading Claude Opus to a new version: Claude Opus 4.8. It builds on Opus 4.7 with improvements across benchmarks, and is a more effective collaborator. It\u2019s available today for the same price.",
        "section_heading": "Introducing Claude Opus 4.8",
        "source_order": 1
      },
      {
        "block_id": "block-2",
        "kind": "p",
        "text": "Opus 4.8 launches alongside several new features. Users on claude.ai now have control over the amount of effort Claude puts into a task. Claude Code has a new \u201cdynamic workflows\u201d feature that allows it to tackle very large-scale problems. And fast mode for Opus 4.8\u2014where the model can work at 2.5\u00d7 the speed\u2014is now three times cheaper than it was for previous models.",
        "section_heading": "Introducing Claude Opus 4.8",
        "source_order": 2
      },
      {
        "block_id": "block-3",
        "kind": "h2",
        "text": "Opus 4.8\u2019s capabilities",
        "section_heading": "Introducing Claude Opus 4.8",
        "source_order": 3
      },
      {
        "block_id": "block-4",
        "kind": "p",
        "text": "The table below shows how Opus 4.8 compares to its predecessor and to other models on tests of coding, agentic skills, reasoning, and practical knowledge work tasks. More details and a much wider range of capability evaluations are provided in the Claude Opus 4.8 System Card.",
        "section_heading": "Opus 4.8\u2019s capabilities",
        "source_order": 4
      },
      {
        "block_id": "block-5",
        "kind": "h2",
        "text": "Collaborating with Opus 4.8",
        "section_heading": "Opus 4.8\u2019s capabilities",
        "source_order": 5
      },
      {
        "block_id": "block-6",
        "kind": "p",
        "text": "Early testers have found Claude Opus 4.8 to be more reliable and sharper in its judgement when it\u2019s performing agentic tasks. Below are quotes from many of these testers about their experience collaborating with Opus 4.8:",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 6
      },
      {
        "block_id": "block-7",
        "kind": "blockquote",
        "text": "Claude Opus 4.8 has noticeably better judgment. In Claude Code, it asks the right questions, catches its own mistakes, pushes back when a plan isn\u2019t sound, and builds up confidence around complex, multi-service explorations before making big changes. It\u2019s a great model to build with.Tom Pritchard Staff Engineer",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 7
      },
      {
        "block_id": "block-8",
        "kind": "blockquote",
        "text": "On our Super-Agent benchmark, Claude Opus 4.8 is the only model to complete every case end-to-end, beating prior Opus models and GPT-5.5 at parity on cost. For agent products in translation, deep research, slide-building, and analysis, it delivers powerful reliability.Kay Zhu Co-Founder and CTO",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 8
      },
      {
        "block_id": "block-9",
        "kind": "blockquote",
        "text": "On CursorBench, Claude Opus 4.8 exceeds prior Opus models across every effort level. Tool calling is meaningfully more efficient, using fewer steps for the same intelligence, and it carries end-to-end tasks through. Michael Truell Co-Founder and CEO",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 9
      },
      {
        "block_id": "block-10",
        "kind": "blockquote",
        "text": "Claude Opus 4.8 delivers the highest score recorded on our Legal Agent Benchmark, and is the first model to break 10% overall on the all-pass standard. For substantive legal work, that\u2019s the kind of accuracy lift that translates directly into how much real attorney work our customers can hand off with confidence.Niko Grupen Head of Applied Research",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 10
      },
      {
        "block_id": "block-11",
        "kind": "blockquote",
        "text": "Claude Opus 4.8 feels like a major quality-of-life update over Opus 4.7: faster, easier to collaborate with, and better at carrying context and style direction across a long session. Opus 4.8 is the model I kept trusting for work where voice, taste, and technical execution all have to happen side-by-side.Katie Parrott Staff Writer",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 11
      },
      {
        "block_id": "block-12",
        "kind": "blockquote",
        "text": "Claude Opus 4.8 is the strongest computer-use and browser-agent model we\u2019ve tested, scoring 84% on Online-Mind2Web, which is a meaningful jump over both Opus 4.7 and GPT-5.5. It stays reflective and on-task in the way our customers\u2019 agent workloads need to be reliable end-to-end.Miguel Gonzalez Tech Lead",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 12
      },
      {
        "block_id": "block-13",
        "kind": "blockquote",
        "text": "Claude Opus 4.8 uses tools cleanly and follows instructions with the consistency our autonomous engineering workloads need to keep running unattended. It improves on Opus 4.6 and fixes the comment-verbosity and tool-calling issues we saw with Opus 4.7. This release from Anthropic translates directly into faster capability gains for engineers building on Devin.Scott Wu CEO",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 13
      },
      {
        "block_id": "block-14",
        "kind": "blockquote",
        "text": "On our long-running evals, Claude Opus 4.8\u2019s analysis was consistently higher quality than prior Opus models. It finished faster and produced richer, more information dense outputs. Overall, a noticeably better signal to noise ratio. The biggest differentiator was Opus 4.8\u2019s tendency to proactively flag issues with the inputs and outputs of an analysis, something other models routinely missed and left to the users to catch.Michael Ran Sr. Investment Associate",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 14
      },
      {
        "block_id": "block-15",
        "kind": "blockquote",
        "text": "Across CoCounsel Legal, Claude Opus 4.8 delivered meaningful improvements in consistency and reasoning quality compared to prior Opus models. For the high-stakes professional workflows our customers depend on, that reliability matters. As we build fiduciary-grade AI systems for legal and tax professionals, advances like these help raise the standard for trusted AI performance in real-world workflows.Joel Hron Chief Technology Officer",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 15
      },
      {
        "block_id": "block-16",
        "kind": "blockquote",
        "text": "Claude Opus 4.8 sets a new bar for enterprise AI. In Genie, Databricks\u2019 AI agent for data and knowledge work, the new Opus model unlocks a step change in agentic reasoning, tackling deeper, multistep questions faster than any prior Opus. Its multimodal strength also lets Genie reason directly over PDFs, diagrams, and other unstructured content at 61% cheaper token cost than Opus 4.7.Hanlin Tang CTO, Neural Networks",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 16
      },
      {
        "block_id": "block-17",
        "kind": "blockquote",
        "text": "For financial-document workflows in Hebbia\u2019s orchestrator, Claude Opus 4.8 delivers the same strong quality as Opus 4.7 with noticeably better citation precision and more token efficiency on retrieval, which works incredibly well for the kinds of dense filings our customers run every day.Aabhas Sharma CTO",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 17
      },
      {
        "block_id": "block-18",
        "kind": "p",
        "text": "One of the most prominent improvements in Opus 4.8 is its honesty. We train all our models to be honest\u2014for instance, to avoid making claims that they can\u2019t support. But a general problem with AI models is that they sometimes jump to conclusions, confidently claiming to have made progress in their work despite the evidence being thin. Early testers report that Opus 4.8 is more likely to flag uncertainties about its work and less likely to make unsupported claims. This is borne out in our evaluations, which show that Opus 4.8 is around four times less likely than its predecessor to allow flaws in code it has written to pass unremarked.",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 18
      },
      {
        "block_id": "block-19",
        "kind": "p",
        "text": "As always, we ran a detailed alignment assessment on the model before release. In terms of positive traits, our Alignment team concluded that Opus 4.8 \u201creaches new highs on our measures of prosocial traits like supporting user autonomy and acting in the user\u2019s best interest.\u201d The assessment also showed Opus 4.8 to have rates of misaligned behavior (such as deception or cooperation with misuse) that are substantially lower than Opus 4.7, and similar to our best-aligned model, Claude Mythos Preview. The full alignment assessment, accompanied by a suite of pre-deployment safety tests, is reported in the Claude Opus 4.8 System Card.",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 19
      },
      {
        "block_id": "block-20",
        "kind": "h2",
        "text": "Also launching today",
        "section_heading": "Collaborating with Opus 4.8",
        "source_order": 20
      },
      {
        "block_id": "block-21",
        "kind": "p",
        "text": "In addition to Claude Opus 4.8, we\u2019re making the following updates:",
        "section_heading": "Also launching today",
        "source_order": 21
      },
      {
        "block_id": "block-22",
        "kind": "li",
        "text": "Dynamic workflows. This new feature, available in research preview, allows Claude to take on even bigger tasks in Claude Code. Claude can plan the work and then run hundreds of parallel subagents in a single session (and with Opus 4.8, the agents can run for even longer). It then verifies its outputs before reporting back to the user. For example, Claude Code with Opus 4.8 can now carry out codebase-scale migrations across hundreds of thousands of lines of code from kickoff to merge, with the existing test suite as its bar. You can read more about dynamic workflows\u2014available in Claude Code for Enterprise, Team, and Max plans\u2014in this post.",
        "section_heading": "Also launching today",
        "source_order": 22
      },
      {
        "block_id": "block-23",
        "kind": "li",
        "text": "Effort control in claude.ai and Cowork. A new control alongside the model selector lets users choose how much effort Claude puts into a response. On higher effort settings, Claude will think more frequently and more deeply to give better responses. On lower effort settings, Claude will respond faster and use up a user\u2019s rate limits more slowly. Users now have this choice\u2014the effort control is available on all plans.",
        "section_heading": "Also launching today",
        "source_order": 23
      },
      {
        "block_id": "block-24",
        "kind": "li",
        "text": "The Messages API now accepts system entries inside the messages array. Developers can update Claude\u2019s instructions mid-task without breaking the prompt cache or routing the update through a user turn. This can be used in a given harness to update permissions, token budgets, or environment context as an agent runs.",
        "section_heading": "Also launching today",
        "source_order": 24
      },
      {
        "block_id": "block-25",
        "kind": "h2",
        "text": "A note on effort",
        "section_heading": "Also launching today",
        "source_order": 25
      },
      {
        "block_id": "block-26",
        "kind": "p",
        "text": "Opus 4.8 defaults to high effort, which we judge to be the best overall balance of quality and user experience. On coding tasks, this effort level spends a similar number of tokens as Opus 4.7\u2019s default, but with better performance. Users can choose \u201cextra\u201d (\u201cxhigh\u201d in Claude Code) or \u201cmax,\u201d and the model will spend more tokens to get better results; we recommend using \u201cextra\u201d for difficult tasks and long-running asynchronous workflows. We have increased rate limits in Claude Code to accommodate the higher token usage of higher effort levels; users can select whichever makes sense for their particular project.",
        "section_heading": "A note on effort",
        "source_order": 26
      },
      {
        "block_id": "block-27",
        "kind": "h2",
        "text": "What\u2019s next?",
        "section_heading": "A note on effort",
        "source_order": 27
      },
      {
        "block_id": "block-28",
        "kind": "p",
        "text": "Users will find Opus 4.8 to be a modest but tangible improvement on its predecessor. There\u2019s still more to be done: we\u2019re working on developing and releasing models that provide many of the same capabilities as Opus at a lower cost.",
        "section_heading": "What\u2019s next?",
        "source_order": 28
      },
      {
        "block_id": "block-29",
        "kind": "p",
        "text": "Not only that, but we plan to release a new class of model with even higher intelligence than Opus. As part of Project Glasswing, a small number of organizations are currently using Claude Mythos Preview for cybersecurity work. Models of this capability level require stronger cyber safeguards before they can be generally released. We\u2019re making swift progress on developing these safeguards and expect to be able to bring Mythos-class models to all our customers in the coming weeks.",
        "section_heading": "What\u2019s next?",
        "source_order": 29
      },
      {
        "block_id": "block-30",
        "kind": "h2",
        "text": "Availability",
        "section_heading": "What\u2019s next?",
        "source_order": 30
      },
      {
        "block_id": "block-31",
        "kind": "p",
        "text": "Claude Opus 4.8 is available everywhere today. Pricing for regular usage is unchanged from Opus 4.7: $5 per million input tokens and $25 per million output tokens. Pricing for fast mode is $10 per million input tokens and $50 per million output tokens. Developers can use claude-opus-4-8 via the Claude API.",
        "section_heading": "Availability",
        "source_order": 31
      }
    ],

      "section_heading": "Collaborating with Opus 4.8",
      "source_order": 9
    },
    {
      "block_id": "block-10",
      "kind": "blockquote",
      "text": "Claude Opus 4.8 delivers the highest score recorded on our Legal Agent Benchmark, and is the first model to break 10% overall on the all-pass standard. For substantive legal work, that\u2019s the kind of accuracy lift that translates directly into how much real attorney work our customers can hand off with confidence.Niko Grupen Head of Applied Research",
      "section_heading": "Collaborating with Opus 4.8",
      "source_order": 10
    },
    {
      "block_id": "block-11",
      "kind": "blockquote",
      "text": "Claude Opus 4.8 feels like a major quality-of-life update over Opus 4.7: faster, easier to collaborate with, and better at carrying context and style direction across a long session. Opus 4.8 is the model I kept trusting for work where voice, taste, and technical execution all have to happen side-by-side.Katie Parrott Staff Writer",
      "section_heading": "Collaborating with Opus 4.8",
      "source_order": 11
    },
    {
      "block_id": "block-12",
      "kind": "blockquote",
      "text": "Claude Opus 4.8 is the strongest computer-use and browser-agent model we\u2019ve tested, scoring 84% on Online-Mind2Web, which is a meaningful jump over both Opus 4.7 and GPT-5.5. It stays reflective and on-task in the way our customers\u2019 agent workloads need to be reliable end-to-end.Miguel Gonzalez Tech Lead",
      "section_heading": "Collaborating with Opus 4.8",
      "source_order": 12
    },
    {
      "block_id": "block-13",
      "kind": "blockquote",
      "text": "Claude Opus 4.8 uses tools cleanly and follows instructions with the consistency our autonomous engineering workloads need to keep running unattended. It improves on Opus 4.6 and fixes the comment-verbosity and tool-calling issues we saw with Opus 4.7. This release from Anthropic translates directly into faster capability gains for engineers building on Devin.Scott Wu CEO",
      "section_heading": "Collaborating with Opus 4.8",
      "source_order": 13
    },
    {
      "block_id": "block-14",
      "kind": "blockquote",
      "text": "On our long-running evals, Claude Opus 4.8\u2019s analysis was consistently higher quality than prior Opus models. It finished faster and produced richer, more information dense outputs. Overall, a noticeably better signal to noise ratio. The biggest differentiator was Opus 4.8\u2019s tendency to proactively flag issues with the inputs and outputs of an analysis, something other models routinely missed and left to the users to catch.Michael Ran Sr. Investment Associate",
      "section_heading": "Collaborating with Opus 4.8",
      "source_order": 14
    },
    {
      "block_id": "block-15",
      "kind": "blockquote",
      "text": "Across CoCounsel Legal, Claude Opus 4.8 delivered meaningful improvements in consistency and reasoning quality compared to prior Opus models. For the high-stakes professional workflows our customers depend on, that reliability matters. As we build fiduciary-grade AI systems for legal and tax professionals, advances like these help raise the standard for trusted AI performance in real-world workflows.Joel Hron Chief Technology Officer",
      "section_heading": "Collaborating with Opus 4.8",
      "source_order": 15
    },
    {
      "block_id": "block-16",
      "kind": "blockquote",
      "text": "Claude Opus 4.8 sets a new bar for enterprise AI. In Genie, Databricks\u2019 AI agent for data and knowledge work, the new Opus model unlocks a step change in agentic reasoning, tackling deeper, multistep questions faster than any prior Opus. Its multimodal strength also lets Genie reason directly over PDFs, diagrams, and other unstructured content at 61% cheaper token cost than Opus 4.7.Hanlin Tang CTO, Neural Networks",
      "section_heading": "Collaborating with Opus 4.8",
      "source_order": 16
    },
    {
      "block_id": "block-17",
      "kind": "blockquote",
      "text": "For financial-document workflows in Hebbia\u2019s orchestrator, Claude Opus 4.8 delivers the same strong quality as Opus 4.7 with noticeably better citation precision and more token efficiency on retrieval, which works incredibly well for the kinds of dense filings our customers run every day.Aabhas Sharma CTO",
      "section_heading": "Collaborating with Opus 4.8",
      "source_order": 17
    },
    {
      "block_id": "block-18",
      "kind": "p",
      "text": "One of the most prominent improvements in Opus 4.8 is its honesty. We train all our models to be honest\u2014for instance, to avoid making claims that they can\u2019t support. But a general problem with AI models is that they sometimes jump to conclusions, confidently claiming to have made progress in their work despite the evidence being thin. Early testers report that Opus 4.8 is more likely to flag uncertainties about its work and less likely to make unsupported claims. This is borne out in our evaluations, which show that Opus 4.8 is around four times less likely than its predecessor to allow flaws in code it has written to pass unremarked.",
      "section_heading": "Collaborating with Opus 4.8",
      "source_order": 18
    },
    {
      "block_id": "block-19",
      "kind": "p",
      "text": "As always, we ran a detailed alignment assessment on the model before release. In terms of positive traits, our Alignment team concluded that Opus 4.8 \u201creaches new highs on our measures of prosocial traits like supporting user autonomy and acting in the user\u2019s best interest.\u201d The assessment also showed Opus 4.8 to have rates of misaligned behavior (such as deception or cooperation with misuse) that are substantially lower than Opus 4.7, and similar to our best-aligned model, Claude Mythos Preview. The full alignment assessment, accompanied by a suite of pre-deployment safety tests, is reported in the Claude Opus 4.8 System Card.",
      "section_heading": "Collaborating with Opus 4.8",
      "source_order": 19
    },
    {
      "block_id": "block-20",
      "kind": "h2",
      "text": "Also launching today",
      "section_heading": "Collaborating with Opus 4.8",
      "source_order": 20
    },
    {
      "block_id": "block-21",
      "kind": "p",
      "text": "In addition to Claude Opus 4.8, we\u2019re making the following updates:",
      "section_heading": "Also launching today",
      "source_order": 21
    },
    {
      "block_id": "block-22",
      "kind": "li",
      "text": "Dynamic workflows. This new feature, available in research preview, allows Claude to take on even bigger tasks in Claude Code. Claude can plan the work and then run hundreds of parallel subagents in a single session (and with Opus 4.8, the agents can run for even longer). It then verifies its outputs before reporting back to the user. For example, Claude Code with Opus 4.8 can now carry out codebase-scale migrations across hundreds of thousands of lines of code from kickoff to merge, with the existing test suite as its bar. You can read more about dynamic workflows\u2014available in Claude Code for Enterprise, Team, and Max plans\u2014in this post.",
      "section_heading": "Also launching today",
      "source_order": 22
    },
    {
      "block_id": "block-23",
      "kind": "li",
      "text": "Effort control in claude.ai and Cowork. A new control alongside the model selector lets users choose how much effort Claude puts into a response. On higher effort settings, Claude will think more frequently and more deeply to give better responses. On lower effort settings, Claude will respond faster and use up a user\u2019s rate limits more slowly. Users now have this choice\u2014the effort control is available on all plans.",
      "section_heading": "Also launching today",
      "source_order": 23
    },
    {
      "block_id": "block-24",
      "kind": "li",
      "text": "The Messages API now accepts system entries inside the messages array. Developers can update Claude\u2019s instructions mid-task without breaking the prompt cache or routing the update through a user turn. This can be used in a given harness to update permissions, token budgets, or environment context as an agent runs.",
      "section_heading": "Also launching today",
      "source_order": 24
    },
    {
      "block_id": "block-25",
      "kind": "h2",
      "text": "A note on effort",
      "section_heading": "Also launching today",
      "source_order": 25
    },
    {
      "block_id": "block-26",
      "kind": "p",
      "text": "Opus 4.8 defaults to high effort, which we judge to be the best overall balance of quality and user experience. On coding tasks, this effort level spends a similar number of tokens as Opus 4.7\u2019s default, but with better performance. Users can choose \u201cextra\u201d (\u201cxhigh\u201d in Claude Code) or \u201cmax,\u201d and the model will spend more tokens to get better results; we recommend using \u201cextra\u201d for difficult tasks and long-running asynchronous workflows. We have increased rate limits in Claude Code to accommodate the higher token usage of higher effort levels; users can select whichever makes sense for their particular project.",
      "section_heading": "A note on effort",
      "source_order": 26
    },
    {
      "block_id": "block-27",
      "kind": "h2",
      "text": "What\u2019s next?",
      "section_heading": "A note on effort",
      "source_order": 27
    },
    {
      "block_id": "block-28",
      "kind": "p",
      "text": "Users will find Opus 4.8 to be a modest but tangible improvement on its predecessor. There\u2019s still more to be done: we\u2019re working on developing and releasing models that provide many of the same capabilities as Opus at a lower cost.",
      "section_heading": "What\u2019s next?",
      "source_order": 28
    },
    {
      "block_id": "block-29",
      "kind": "p",
      "text": "Not only that, but we plan to release a new class of model with even higher intelligence than Opus. As part of Project Glasswing, a small number of organizations are currently using Claude Mythos Preview for cybersecurity work. Models of this capability level require stronger cyber safeguards before they can be generally released. We\u2019re making swift progress on developing these safeguards and expect to be able to bring Mythos-class models to all our customers in the coming weeks.",
      "section_heading": "What\u2019s next?",
      "source_order": 29
    },
    {
      "block_id": "block-30",
      "kind": "h2",
      "text": "Availability",
      "section_heading": "What\u2019s next?",
      "source_order": 30
    },
    {
      "block_id": "block-31",
      "kind": "p",
      "text": "Claude Opus 4.8 is available everywhere today. Pricing for regular usage is unchanged from Opus 4.7: $5 per million input tokens and $25 per million output tokens. Pricing for fast mode is $10 per million input tokens and $50 per million output tokens. Developers can use claude-opus-4-8 via the Claude API.",
      "section_heading": "Availability",
      "source_order": 31
    }

        if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start || start < cursor) continue;
        output += esc(text.slice(cursor, start));
        output += `<button type="button" class="audit-mark" data-claim-id="${esc(decoration.claim_id)}">${esc(decoration.rewritten_text)}</button>`;
        cursor = end;
      }
      output += esc(text.slice(cursor));
      return output;
    }
    function bindAuditMarks() {
      const tooltip = document.getElementById('audit-tooltip');
      const decorations = new Map((launchPage.decorations || []).map(item => [item.claim_id, item]));
      document.querySelectorAll('.audit-mark').forEach(node => {
        if (node.dataset.tooltipBound === '1') return;
        node.dataset.tooltipBound = '1';
        const claimId = node.getAttribute('data-claim-id');
        if (!claimId) return;
        const decoration = decorations.get(claimId);
        if (!decoration) return;
        const show = (event) => {
          tooltip.innerHTML = tooltipMarkup(decoration);
          tooltip.hidden = false;
          positionTooltip(node, tooltip);
          event?.stopPropagation?.();
        };
        const hide = () => {
          tooltip.hidden = true;
        };
        node.addEventListener('mouseenter', show);
        node.addEventListener('focus', show);
        node.addEventListener('mouseleave', hide);
        node.addEventListener('blur', hide);
        node.addEventListener('click', show);
      });
      if (!launchTooltipGlobalsBound) {
        launchTooltipGlobalsBound = true;
        document.addEventListener('click', (event) => {
          if (!event.target.closest('.audit-mark') && !event.target.closest('#audit-tooltip')) {
            tooltip.hidden = true;
          }
        });
        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') {
            tooltip.hidden = true;
          }
        });
        window.addEventListener('scroll', () => {
          tooltip.hidden = true;
        }, { passive: true });
      }
    }
    function tooltipMarkup(decoration) {
      const citations = decoration.citations || [];
      return `
        <div class="tooltip-label">Original wording</div>
        <p class="wrap">${esc(decoration.original_text)}</p>
        <div class="tooltip-label">Why it changed</div>
        <p class="wrap"><strong>${esc(verdictLabel(decoration.verdict))}</strong> - ${esc(decoration.reason)}</p>
        <div class="tooltip-label">Citations</div>
        <div class="tooltip-citations">
          ${citations.length ? citations.map(citation => tooltipCitationMarkup(citation)).join('') : '<p class="muted">No explicit reference citations were attached to this claim.</p>'}
        </div>
      `;
    }
    function tooltipCitationMarkup(citation) {
      const href = safeHref(citation.url);
      const titleMarkup = href
        ? `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(citation.title)}</a>`
        : `<strong>${esc(citation.title)}</strong>`;
      return `
        <div class="tooltip-citation">
          <p class="wrap">${titleMarkup}</p>
          ${citation.snippet ? `<p class="muted wrap">${esc(citation.snippet)}</p>` : ''}
          ${citation.why_relevant ? `<p class="muted wrap">${esc(citation.why_relevant)}</p>` : ''}
        </div>
      `;
    }
    function positionTooltip(target, tooltip) {
      const rect = target.getBoundingClientRect();
      const margin = 12;
      const desiredTop = rect.bottom + margin;
      const maxLeft = window.innerWidth - tooltip.offsetWidth - margin;
      const left = Math.max(margin, Math.min(rect.left, maxLeft));
      let top = desiredTop;
      if (top + tooltip.offsetHeight > window.innerHeight - margin) {
        top = Math.max(margin, rect.top - tooltip.offsetHeight - margin);
      }
      tooltip.style.left = `${left}px`;
      tooltip.style.top = `${top}px`;
    }
    const filteredAudits = () => report.audits
      .map((audit, index) => ({ ...audit, __index: index }))
      .filter(audit => filters.verdict === 'all' || audit.verdict === filters.verdict);
    function setupFilters() {
      fillSelect('verdict-filter', 'All verdicts', [...new Set(report.audits.map(audit => audit.verdict))]);
    }
    function fillSelect(id, allLabel, values) {
      document.getElementById(id).innerHTML = [
        `<option value="all">${allLabel}</option>`,
        ...values.map(value => `<option value="${esc(value)}">${esc(value)}</option>`)
      ].join('');
    }
    function syncSelection() {
      const audits = filteredAudits();
      if (!audits.some(audit => audit.__index === selected)) selected = audits[0]?.__index ?? 0;
    }
    function render() {
      const audits = filteredAudits();
      document.getElementById('filter-summary').textContent = `${audits.length} of ${report.audits.length} claims shown`;
      document.getElementById('claim-list').innerHTML = audits.map((audit, i) => `
        <button class="claim-row ${audit.__index === selected ? 'active' : ''}" onclick="selected=${audit.__index}; render();">
          <div class="claim-meta">
            <span class="muted">${esc(audit.verdict)} · ${esc(audit.claim.claim_type)} · score ${audit.stretch_score}/100</span>
          </div>
          <div class="wrap">${esc(audit.claim.claim)}</div>
          <div class="meter ${cls(audit.verdict)}" title="Stretch score ${audit.stretch_score} / 100"><div style="width: ${audit.stretch_score}%"></div></div>
          <p class="muted wrap">${esc(audit.claim.why_risky || '')}</p>
        </button>
      `).join('');
      if (!audits.length) {
        document.getElementById('claim-detail').innerHTML = '<div class="panel"><p class="muted">No claims match the selected filters.</p></div>';
        document.getElementById('evidence').innerHTML = '';
        return;
      }
      const audit = audits.find(item => item.__index === selected) ?? audits[0];
      const evidenceCount = audit.supporting_evidence.length + audit.counter_evidence.length;
      const evidenceScore = Math.min(100, evidenceCount * 25);
      const confidence = confidenceScore[audit.confidence] ?? 0;
      const computedChecks = audit.numeric_findings?.length
        ? `<div class="panel"><h3>Computed Checks</h3>${list(audit.numeric_findings)}</div>`
        : '';
      const runProfile = report.run_profile
        ? `
            <p class="wrap"><strong>Pipeline wall:</strong> ${fmtMs(report.run_profile.total_duration_ms)} · <strong>Load:</strong> ${fmtMs(report.run_profile.load_document_ms)} · <strong>Extract:</strong> ${fmtMs(report.run_profile.extract_claims_ms)} · <strong>Audit:</strong> ${fmtMs(report.run_profile.audit_claims_ms)} · <strong>Contrast:</strong> ${fmtMs(report.run_profile.contrast_duration_ms)}</p>
            <p class="wrap"><strong>Claims extracted / audited:</strong> ${report.run_profile.claims_extracted} / ${report.run_profile.claims_audited} · <strong>Specialist passes:</strong> ${report.run_profile.agent_passes} · <strong>Unique sources:</strong> ${report.run_profile.unique_source_count}</p>
          `
        : '';
      document.getElementById('claim-detail').innerHTML = `
        <div class="panel">
          <h3>Report Provenance</h3>
          <p class="wrap"><strong>Mode:</strong> ${esc(report.mode)} · <strong>Model:</strong> ${esc(report.model || 'none')}</p>
          <p class="wrap"><strong>Evidence Contrast:</strong> ${report.contrast_enabled ? 'enabled' : 'disabled'}</p>
          <p class="wrap"><strong>Provided reference URLs:</strong> ${(report.reference_urls || []).length ? (report.reference_urls || []).map(esc).join(', ') : 'none'}</p>
          ${runProfile}
        </div>
        <div class="panel">
          <strong>Formal verdict: ${esc(audit.verdict)}</strong> ${hint(verdictTip(audit.verdict))}
          <div class="score"><div style="width: ${audit.stretch_score}%"></div></div>
          <p class="muted">
            Confidence: ${esc(audit.confidence)} ${hint('Confidence reflects how strongly the available evidence supports this verdict, not whether the original claim is true.')}
            · Stretch Score: ${audit.stretch_score} / 100 ${hint('Higher means the original wording stretches further beyond what the evidence supports.')}
            · Evidence items: ${evidenceCount} ${hint('Evidence items are supporting or counter-evidence records attached to this claim.')}
          </p>
          <div class="strength-grid">
            ${strengthCard('Stretch pressure', audit.stretch_score, audit.verdict, `${audit.stretch_score}/100`, 'How much the wording outruns the evidence.')}
            ${strengthCard('Confidence', confidence, audit.verdict, esc(audit.confidence), 'How confident Honest Launches is in this verdict from available evidence.')}
            ${strengthCard('Evidence depth', evidenceScore, audit.verdict, `${evidenceCount} item${evidenceCount === 1 ? '' : 's'}`, 'How much direct evidence is attached to this claim audit.')}
          </div>
        </div>
        <div class="panel"><h3>Original</h3><p class="wrap">${esc(audit.claim.claim)}</p></div>
        ${contrastCard(audit.contrast)}
        <div class="panel"><h3>Defensible Rewrite</h3><p class="wrap">${esc(audit.weaker_supported_rewrite)}</p></div>
        <div class="panel"><h3>Why</h3><p class="wrap">${esc(audit.why)}</p></div>
        ${claimTimingPanel(audit.claim_timing)}
        ${computedChecks}
        <div class="panel"><h3>Agent Steps</h3>${agentSteps(audit.agent_outputs || [])}</div>
      `;
      document.getElementById('evidence').innerHTML = `
        ${providedReferencesPanel(report.reference_urls || [])}
        ${sourcesChecked(audit.contrast)}
        <div class="panel"><h3>Gemini-Discovered Supporting Sources</h3><p class="muted">Sources found by the verifier while looking for the strongest support for this claim.</p>${items(audit.supporting_evidence)}</div>
        <div class="panel"><h3>Gemini-Discovered Caveat / Counter Sources</h3><p class="muted">Sources found by the contradiction-finder while looking for caveats, missing context, benchmark limits, or contrary evidence.</p>${items(audit.counter_evidence)}</div>
        <div class="panel"><h3>Missing Context</h3>${list(audit.missing_context)}</div>
      `;
    }
    function strengthCard(label, value, verdict, display, tip) {
      return `
        <div class="strength-card">
          <div class="strength-label"><span>${label} ${hint(tip)}</span><span>${display}</span></div>
          <div class="meter ${cls(verdict)}"><div style="width: ${value}%"></div></div>
        </div>
      `;
    }
    function contrastCard(contrast) {
      if (!contrast) return '';
      const best = contrast.best_sources?.[0];
      const sourceSummary = best ? best.evidence_summary : 'No usable reference source was available.';
      const qualification = best?.key_qualification ? `<p><strong>Key qualification:</strong> ${esc(best.key_qualification)}</p>` : '';
      return `
        <div class="panel">
          <h3>Evidence Contrast</h3>
          <p><strong>Claim says:</strong> <span class="wrap">${esc(contrast.claim_text)}</span></p>
          <p><strong>Best reference says:</strong> <span class="wrap">${esc(sourceSummary)}</span></p>
          ${qualification}
          <p><strong>Delta:</strong> ${esc(contrast.delta_type)} — ${esc(contrast.delta_explanation)}</p>
          <p><strong>Final verdict:</strong> ${esc(contrast.recommended_verdict)} · Confidence: ${esc(contrast.confidence)}</p>
          <p><strong>Defensible rewrite:</strong> <span class="wrap">${esc(contrast.suggested_rewrite)}</span></p>
        </div>
      `;
    }
    function claimTimingPanel(timing) {
      if (!timing) return '';
      return `
        <div class="panel">
          <h3>Claim Timing</h3>
          <p class="muted">Measured wall-clock time for this claim during the run.</p>
          <p><strong>Total:</strong> ${fmtMs(timing.total_duration_ms)} · <strong>Contrast:</strong> ${fmtMs(timing.contrast_ms)}</p>
          <ul>
            <li class="wrap"><strong>Verifier:</strong> ${fmtMs(timing.verifier_ms)}</li>
            <li class="wrap"><strong>Contradiction finder:</strong> ${fmtMs(timing.contradiction_finder_ms)}</li>
            <li class="wrap"><strong>Numeric calibrator:</strong> ${fmtMs(timing.numeric_calibrator_ms)}</li>
            <li class="wrap"><strong>Aggregator:</strong> ${fmtMs(timing.aggregator_ms)}</li>
          </ul>
        </div>
      `;
    }
    function providedReferencesPanel(values) {
      if (!values.length) {
        return `
          <div class="panel">
            <h3>Provided Reference URLs</h3>
            <p class="muted">No explicit reference URLs were provided for this run.</p>
          </div>
        `;
      }
      return `
        <div class="panel">
          <h3>Provided Reference URLs</h3>
          <p class="muted">Explicit sources supplied on the CLI with <code>--reference</code>. These anchor Evidence Contrast and define the source-of-truth packet for this run.</p>
          ${plainUrlItems(values)}
        </div>
      `;
    }
    function sourcesChecked(contrast) {
      if (!contrast) return '<div class="panel"><h3>Claim-Level Contrast References</h3><p class="muted">No contrast references checked for this claim. Contrast is applied only to the selected top-risk claims controlled by --contrast-top.</p></div>';
      const references = contrast.reference_sources || [];
      const best = contrast.best_sources || [];
      return `
        <div class="panel">
          <h3>Claim-Level Contrast References</h3>
          <p class="muted">References used by the Evidence Contrast pass for this selected claim. These are anchored by provided reference URLs, but Gemini may resolve nearby canonical pages or source titles while reading them.</p>
          ${referenceItems(references)}
        </div>
        <div class="panel">
          <h3>Reference Snippets / Mismatches</h3>
          <p class="muted">Claim-level snippets showing how the referenced source supports, narrows, or conflicts with the original wording.</p>
          ${contrastSourceItems(best)}
        </div>
      `;
    }
    function plainUrlItems(values) {
      return values.map(value => {
        const href = safeHref(value);
        const source = href
          ? `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(value)}</a>`
          : `<span class="muted">${esc(value)}</span>`;
        return `<div class="source-item"><p class="wrap">${source}</p></div>`;
      }).join('');
    }
    function referenceItems(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return values.map(item => {
        const href = safeHref(item.url);
        const source = href
          ? `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(item.url)}</a>`
          : `<span class="muted">${esc(item.url || 'No URL recorded')}</span>`;
        return `
          <div class="source-item">
            <p><strong>${esc(item.title)}</strong> <span class="muted">(${esc(item.source_type)} · authority ${item.authority_score}/100)</span></p>
            <p class="wrap">${source}</p>
            <p class="muted wrap">${esc(item.why_relevant || '')}</p>
          </div>
        `;
      }).join('');
    }
    function contrastSourceItems(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return values.map(item => {
        const href = safeHref(item.url);
        const source = href
          ? `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(item.url)}</a>`
          : `<span class="muted">${esc(item.url || 'No URL recorded')}</span>`;
        return `
          <div class="source-item">
            <p><strong>${esc(item.title)}</strong> <span class="muted">(${esc(item.stance)})</span></p>
            <p class="wrap">${esc(item.evidence_summary)}</p>
            <p class="wrap">${source}</p>
            <p class="muted wrap">${esc(item.key_qualification || '')}</p>
          </div>
        `;
      }).join('');
    }
    function agentSteps(values) {
      if (!values.length) return '<p class="muted">No agent step trace recorded.</p>';
      return values.map(step => `
        <details>
          <summary>${esc(step.agent)} — ${esc(step.summary)}</summary>
          <p class="muted">Claim ID: ${esc(step.claim_id)}</p>
          <p class="muted">Duration: ${step.duration_ms == null ? 'not recorded' : fmtMs(step.duration_ms)}</p>
          <h4>Supporting evidence</h4>
          ${items(step.supporting_evidence || [])}
          <h4>Contradictions / narrowing evidence</h4>
          ${items(step.counter_evidence || [])}
          <h4>Missing context</h4>
          ${list(step.missing_context || [])}
          <h4>Computed checks</h4>
          ${list(step.numeric_findings || [])}
        </details>
      `).join('');
    }
    function list(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return `<ul>${values.map(value => `<li class="wrap">${esc(value)}</li>`).join('')}</ul>`;
    }
    function items(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return values.map(item => {
        const href = safeHref(item.url);
        const source = href
          ? `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(item.url)}</a>`
          : `<span class="muted">${esc(item.url || 'No URL recorded')}</span>`;
        return `
          <div class="source-item">
            <p><strong>${esc(item.source_title)}</strong></p>
            <p class="wrap">${esc(item.snippet)}</p>
            <p class="wrap">${source}</p>
            <p class="muted wrap">${esc(item.relevance || '')}</p>
          </div>
        `;
      }).join('');
    }
    setupFilters();
    renderPublicationHeader();
    renderHeadline();
    render();
    setView(activeView);
    window.addEventListener('hashchange', () => {
      const nextView = window.location.hash === '#ledger' ? 'ledger' : 'launch';
      if (nextView !== activeView) {
        setView(nextView);
      }
    });
  </script>
</body>
</html>
