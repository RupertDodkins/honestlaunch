<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Gemini 3.5 Flash · Honest Launches</title>
  <style>
    :root {
      --ink: #1f2328;
      --muted: #667085;
      --line: #d0d7de;
      --bg: #f6f8fa;
      --panel: #ffffff;
      --overstated: #b42318;
      --missing: #b54708;
      --supported: #067647;
      --receipts: #344054;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
    }
    .eyebrow {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    main {
      min-height: calc(100vh - 74px);
    }
    [hidden] { display: none !important; }
    .notice-strip {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff7ed 0%, #ffffff 100%);
    }
    .notice-copy {
      max-width: 920px;
    }
    .notice-copy p {
      margin: 6px 0 0;
      color: var(--ink);
    }
    .notice-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .notice-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
      color: var(--ink);
    }
    .notice-link.primary {
      background: var(--ink);
      border-color: var(--ink);
      color: #ffffff;
    }
    .view-switcher {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 14px 18px 0;
      background: var(--bg);
    }
    .view-toggle {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }
    .view-toggle.active {
      background: var(--ink);
      color: #ffffff;
      border-color: var(--ink);
    }
    .launch-shell {
      padding: 18px;
      background: var(--bg);
    }
    .launch-article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 22px;
      line-height: 1.7;
      box-shadow: 0 8px 24px rgba(31,35,40,.06);
    }
    .launch-block {
      margin: 0 0 18px;
      overflow-wrap: anywhere;
    }
    .launch-block:last-child {
      margin-bottom: 0;
    }
    .launch-block.list-item {
      padding-left: 18px;
      position: relative;
    }
    .launch-block.list-item::before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--muted);
    }
    .launch-block.preformatted {
      white-space: pre-wrap;
      background: #0d1117;
      color: #f0f6fc;
      border-radius: 8px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .launch-kicker {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .launch-note {
      margin: 0 0 14px;
      color: var(--muted);
    }
    .launch-meta {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }
    .launch-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .launch-meta p {
      margin: 0;
    }
    .audit-mark {
      appearance: none;
      border: 0;
      border-bottom: 2px dotted rgba(181, 71, 8, 0.9);
      background: transparent;
      color: inherit;
      padding: 0;
      margin: 0;
      font: inherit;
      line-height: inherit;
      cursor: pointer;
      text-align: left;
    }
    .audit-mark:hover,
    .audit-mark:focus-visible {
      background: rgba(181, 71, 8, 0.08);
      outline: none;
      border-bottom-style: solid;
    }
    .audit-tooltip {
      position: fixed;
      z-index: 1000;
      max-width: min(360px, calc(100vw - 32px));
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--ink);
      padding: 12px 14px;
      box-shadow: 0 18px 42px rgba(31,35,40,.18);
    }
    .audit-tooltip p {
      margin: 0 0 10px;
      color: inherit;
    }
    .audit-tooltip p:last-child {
      margin-bottom: 0;
    }
    .audit-tooltip .tooltip-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .audit-tooltip .tooltip-citations {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .audit-tooltip .tooltip-citation {
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }
    .claim-strip {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }
    .headline-strip {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(246,248,250,0.96));
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .telemetry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }
    .stat-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .stat-note {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }
    .report-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      min-height: calc(100vh - 250px);
    }
    section { padding: 18px; border-right: 1px solid var(--line); }
    section:last-child { border-right: 0; }
    .filters {
      display: grid;
      grid-template-columns: minmax(180px, 260px);
      gap: 10px;
      margin: 0 0 12px;
    }
    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--panel);
      color: var(--ink);
    }
    .claim-row {
      width: 100%;
      text-align: left;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      overflow-wrap: anywhere;
    }
    .claim-row.active { border-color: var(--ink); box-shadow: 0 0 0 2px rgba(31,35,40,.08); }
    #claim-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
    }
    .claim-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 999px;
      margin-right: 6px;
      color: white;
      background: var(--receipts);
    }
    .hint {
      display: inline-grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      cursor: help;
      position: relative;
      background: var(--panel);
      vertical-align: middle;
    }
    .hint:focus {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }
    .hint::after {
      content: attr(data-tip);
      display: none;
      position: absolute;
      z-index: 10;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      width: min(280px, 72vw);
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--ink);
      color: #ffffff;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.35;
      box-shadow: 0 8px 24px rgba(31,35,40,.18);
    }
    .hint:hover::after,
    .hint:focus::after {
      display: block;
    }
    .muted { color: var(--muted); }
    .wrap {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
      overflow-wrap: anywhere;
    }
    .score {
      height: 10px;
      background: #eaecf0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .score > div { height: 100%; background: var(--overstated); }
    .strength-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .strength-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--bg);
    }
    .strength-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }
    .meter {
      height: 8px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .meter > div { height: 100%; background: var(--receipts); }
    .meter.overstated > div, .meter.contradicted > div { background: var(--overstated); }
    .meter.missing-context > div { background: var(--missing); }
    .meter.supported > div { background: var(--supported); }
    a {
      color: var(--receipts);
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .source-item {
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .source-item:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }
    h2, h3 { margin: 0 0 10px; letter-spacing: 0; }
    .title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    pre {
      white-space: pre-wrap;
      background: #0d1117;
      color: #f0f6fc;
      padding: 12px;
      border-radius: 8px;
      max-height: 260px;
      overflow: auto;
    }
    details {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--bg);
      padding: 10px 12px;
      margin-top: 10px;
    }
    details:first-of-type {
      margin-top: 0;
    }
    summary {
      cursor: pointer;
      font-weight: 800;
    }
    @media (max-width: 980px) {
      .report-grid { grid-template-columns: 1fr; }
      section { border-right: 0; border-bottom: 1px solid var(--line); }
      .strength-grid { grid-template-columns: 1fr; }
      .notice-strip {
        display: block;
      }
      .notice-links {
        margin-top: 12px;
      }
    }
  </style>
</head>
<body>
  <header id="artifact-header">
    <div>
      <div class="eyebrow">Honest Launches audit artifact</div>
      <h1>Google Gemini 3.5 Flash</h1>
      <div class="muted">Gemini 3.5: frontier intelligence with action</div>
    </div>
    <div class="muted">7 audited claims · 130.80s pipeline · live_gemini</div>
  </header>
  <main>
    <div class="view-switcher">
      <button class="view-toggle active" id="launch-toggle" onclick="setView('launch')">Audited Launch Page</button>
      <button class="view-toggle" id="ledger-toggle" onclick="setView('ledger')">Audit Ledger</button>
    </div>
    <div id="launch-view" class="launch-shell">
      <div id="launch-summary"></div>
      <article class="launch-article">
        <div id="launch-article"></div>
      </article>
    </div>
    <div id="ledger-view" hidden>
      <div class="notice-strip">
        <div class="notice-copy" id="publication-notice"></div>
        <div class="notice-links" id="publication-links"></div>
      </div>
      <div class="headline-strip">
        <div class="title-row">
          <h2>Run Summary</h2>
          <span class="hint" tabindex="0" data-tip="This strip summarizes the audit punchline: how many claims were audited, how severe they were, and what runtime/profile telemetry was recorded for the run.">?</span>
        </div>
        <div class="summary-grid" id="scorecard-grid"></div>
        <div class="telemetry-grid" id="telemetry-grid"></div>
      </div>
      <div class="claim-strip">
        <div class="title-row">
          <h2>Audit Ledger</h2>
          <span class="hint" tabindex="0" data-tip="Gemini extracts risky factual claims, then Honest Launches audits the selected claims. Click a card to inspect verdict, evidence, contrast, and agent steps.">?</span>
        </div>
        <div class="filters single">
          <label>Verdict
            <span class="hint" tabindex="0" data-tip="Formal verdict definitions: supported = evidence supports the claim as written; overstated = directionally supported but too broad/strong/certain; missing_context = may be true but key scope/baseline/method/source context is absent; contradicted = evidence conflicts with the claim; not_checkable = insufficient evidence to verify or falsify.">?</span>
            <select id="verdict-filter" onchange="filters.verdict=this.value; syncSelection(); render();"></select>
          </label>
        </div>
        <p class="muted" id="filter-summary"></p>
        <div id="claim-list"></div>
      </div>
      <div class="report-grid">
        <section>
          <div class="title-row">
            <h2>Selected Claim</h2>
            <span class="hint" tabindex="0" data-tip="This panel shows the selected claim, the Honest Launches verdict, and the strongest defensible rewrite.">?</span>
          </div>
          <div id="claim-detail"></div>
        </section>
        <section>
          <div class="title-row">
            <h2>Source Provenance</h2>
            <span class="hint" tabindex="0" data-tip="Separates explicit references you provided from claim-level contrast references and Gemini-discovered supporting or caveat/counter sources.">?</span>
          </div>
          <div id="evidence"></div>
        </section>
      </div>
    </div>
  </main>
  <div id="audit-tooltip" class="audit-tooltip" hidden></div>

    "text": "Gemini 3.5: frontier intelligence with action\n\nMay 19, 2026\n\nGemini 3.5 is built to help you execute complex, agentic workflows.\n\nToday, we\u2019re introducing Gemini 3.5, our latest family of models combining frontier intelligence with action. This represents a major leap forward in building more capable, intelligent agents. We\u2019re kicking off the series by releasing 3.5 Flash. It delivers frontier performance for agents and coding, excelling at complex long-horizon tasks that deliver real-world utility.\n\n3.5 Flash is available today to billions of people globally:\n\nFor everyone via the Gemini app and AI Mode in Google Search\n\nFor developers in our agent-first development platform Google Antigravity and Gemini API in Google AI Studio and Android Studio\n\nFor enterprises in Gemini Enterprise Agent Platform and Gemini Enterprise.\n\nWe\u2019re also hard at work on 3.5 Pro. It's already being used internally, and we look forward to rolling it out next month.\n\n3.5 Flash: frontier performance for agents and coding\n\nGemini 3.5 Flash delivers intelligence that rivals large flagship models on multiple dimensions, at the speeds you have come to expect from the Flash series. It\u2019s our strongest agentic and coding model yet, outperforming Gemini 3.1 Pro on challenging coding and agentic benchmarks like Terminal-Bench 2.1 (76.2%), GDPval-AA (1656 Elo) and MCP Atlas (83.6%), and leading in multimodal understanding (84.2% on CharXiv Reasoning). When looking at output tokens per second, it is 4 times faster than other frontier models.\n\nLanding in the top-right quadrant of the Artificial Analysis index, 3.5 Flash delivers frontier-level intelligence at exceptional speed \u2014 proving you no longer have to trade quality for latency.\n\n3.5 Flash: agentic tasks at scale\n\nThis balance of speed and performance makes 3.5 Flash ideal for tackling long-horizon agentic tasks. What used to take a developer days or an auditor weeks, 3.5 Flash can now help complete in a fraction of the time, often at less than half the cost of other frontier models. It rapidly plans, builds and iterates to solve real-world problems, whether it\u2019s developing new applications, maintaining codebases or helping to prepare financial documents.\n\nWhen coupled with the updated Antigravity harness, 3.5 Flash becomes a powerful engine for deploying collaborative subagents to tackle problems at scale for the most demanding use cases. Under supervision, it can reliably execute multi-step workflows and coding tasks while sustaining frontier performance.\n\nPowered by Antigravity, 3.5 Flash executes multi-step workflows to automatically rename and categorize unstructured assets based on dynamic criteria.\n\nLeveraging Antigravity, 3.5 Flash uses two agents to synthesize the AlphaZero paper and code a fully playable game in six hours.\n\n3.5 Flash uses the Antigravity harness to transform a messy legacy codebase to Next.js.\n\n3.5 Flash uses subagents to create new city landscapes in Antigravity.\n\n3.5 Flash uses two agents: a builder and a player, working in a rapid self-improvement loop to develop a game in Antigravity.\n\nBuilding on the strong multimodal foundation of Gemini 3, 3.5 Flash generates richer, more interactive web UIs and graphics.\n\n3.5 Flash creates interactive animations for a research paper on AI Studio.\n\n3.5 Flash turns a plain text description into interactive hardware on AI Studio.\n\n3.5 Flash executes multiple concepts in parallel to build a full branding concept for a school fundraiser on AI Studio.\n\n3.5 Flash generates different UX approaches for a checkout flow in just 60 seconds on AI Studio.\n\n3.5 Flash: real-world impact\n\n3.5 Flash\u2019s real-world agentic capabilities are already driving meaningful progress for our developers and enterprises alike. In developing the 3.5 model series, we worked closely with industry partners to understand where toil and complexity arose in their workflows. Partners are seeing meaningful impact \u2014 from banks and fintechs automating multi-week workflows to data science teams unearthing insights amidst complex data environments.\n\nShopify is running subagents in parallel to analyze complex data over a long horizon for more accurate merchant growth forecasts at a global scale.\n\nMacquarie Bank is piloting how 3.5 Flash can accelerate customer onboarding by reasoning over complex 100+ page documents, retrieving relevant information and making reliable recommendations with low latency.\n\nSalesforce is integrating 3.5 Flash into Agentforce to reliably automate complicated enterprise tasks by deploying multiple subagents that retain context and execute complex, multi-turn tool calling.\n\n3.5 Flash is helping Ramp enable smarter, more reliable OCR through multimodal understanding of complex invoices combined with reasoning over historical patterns.\n\nXero is deploying agents to autonomously manage complex, multi-week workflows, such as identifying suppliers and gathering information for 1099 tax forms, enabling small businesses to automate tedious admin tasks.\n\nDatabricks is using agentic workflows to monitor and retrieve real-time information, reason across massive datasets to diagnose issues, identify fixes and propose solutions for data scientists.\n\nPersonal AI agents: built with 3.5 Flash\n\n3.5 Flash is now the default model for the Gemini app and AI Mode in Search globally. At I/O today, we showed how its agentic capabilities are powering new features to bring frontier-level intelligence to your daily life.\n\nThe new Gemini Spark, your personal AI agent, uses 3.5 Flash. It runs 24/7, helping you navigate your digital life, taking action on your behalf while under your direction. We\u2019re starting to roll out Gemini Spark to trusted testers today, and we\u2019re planning on bringing the Beta to Google AI Ultra subscribers in the US next week.\n\nThe enhanced agentic coding capabilities of 3.5 Flash are also delivering even more intelligent experiences across Search, from introducing new information agents that work for you 24/7 to unlocking more dynamic generative UI experiences. Learn more in our blog post.\n\nSearch leverages 3.5 Flash to build an interactive visual explaining Gyroid patterns.\n\nGemini 3.5: built with frontier safeguards\n\nGemini 3.5 was developed in accordance with our Frontier Safety Framework. We have strengthened our cyber and CBRN safeguards, which means it's less likely to generate harmful content, and to mistakenly refuse to answer safe queries. We achieve this with new, more advanced safety training and mitigations, including interpretability tools that help check and understand the AI's inner reasoning before it provides a response.\n\n3.5 Flash is available today\n\nGemini 3.5 Flash is generally available via Google Antigravity, the Gemini API in Google AI Studio and Android Studio, Gemini Enterprise Agent Platform and Gemini Enterprise. It\u2019s also now available to everyone in the Gemini app and AI Mode in Search. On behalf of the entire Gemini team, we can\u2019t wait to see what you build.",

          "kind": "p",
          "text": "We\u2019re also hard at work on 3.5 Pro. It's already being used internally, and we look forward to rolling it out next month.",
          "section_heading": "Gemini 3.5: frontier intelligence with action",
          "source_order": 8
        },
        {
          "block_id": "block-9",
          "kind": "h2",
          "text": "3.5 Flash: frontier performance for agents and coding",
          "section_heading": "Gemini 3.5: frontier intelligence with action",
          "source_order": 9
        },
        {
          "block_id": "block-10",
          "kind": "p",
          "text": "Gemini 3.5 Flash delivers intelligence that rivals large flagship models on multiple dimensions, at the speeds you have come to expect from the Flash series. It\u2019s our strongest agentic and coding model yet, outperforming Gemini 3.1 Pro on challenging coding and agentic benchmarks like Terminal-Bench 2.1 (76.2%), GDPval-AA (1656 Elo) and MCP Atlas (83.6%), and leading in multimodal understanding (84.2% on CharXiv Reasoning). When looking at output tokens per second, it is 4 times faster than other frontier models.",
          "section_heading": "3.5 Flash: frontier performance for agents and coding",
          "source_order": 10
        },
        {
          "block_id": "block-11",
          "kind": "p",
          "text": "Landing in the top-right quadrant of the Artificial Analysis index, 3.5 Flash delivers frontier-level intelligence at exceptional speed \u2014 proving you no longer have to trade quality for latency.",
          "section_heading": "3.5 Flash: frontier performance for agents and coding",
          "source_order": 11
        },
        {
          "block_id": "block-12",
          "kind": "h2",
          "text": "3.5 Flash: agentic tasks at scale",
          "section_heading": "3.5 Flash: frontier performance for agents and coding",
          "source_order": 12
        },
        {
          "block_id": "block-13",
          "kind": "p",
          "text": "This balance of speed and performance makes 3.5 Flash ideal for tackling long-horizon agentic tasks. What used to take a developer days or an auditor weeks, 3.5 Flash can now help complete in a fraction of the time, often at less than half the cost of other frontier models. It rapidly plans, builds and iterates to solve real-world problems, whether it\u2019s developing new applications, maintaining codebases or helping to prepare financial documents.",
          "section_heading": "3.5 Flash: agentic tasks at scale",
          "source_order": 13
        },
        {
          "block_id": "block-14",
          "kind": "p",
          "text": "When coupled with the updated Antigravity harness, 3.5 Flash becomes a powerful engine for deploying collaborative subagents to tackle problems at scale for the most demanding use cases. Under supervision, it can reliably execute multi-step workflows and coding tasks while sustaining frontier performance.",
          "section_heading": "3.5 Flash: agentic tasks at scale",
          "source_order": 14
        },
        {
          "block_id": "block-15",
          "kind": "p",
          "text": "Powered by Antigravity, 3.5 Flash executes multi-step workflows to automatically rename and categorize unstructured assets based on dynamic criteria.",
          "section_heading": "3.5 Flash: agentic tasks at scale",
          "source_order": 15
        },
        {
          "block_id": "block-16",
          "kind": "p",
          "text": "Leveraging Antigravity, 3.5 Flash uses two agents to synthesize the AlphaZero paper and code a fully playable game in six hours.",
          "section_heading": "3.5 Flash: agentic tasks at scale",
          "source_order": 16
        },
        {
          "block_id": "block-17",
          "kind": "p",
          "text": "3.5 Flash uses the Antigravity harness to transform a messy legacy codebase to Next.js.",
          "section_heading": "3.5 Flash: agentic tasks at scale",
          "source_order": 17
        },
        {
          "block_id": "block-18",
          "kind": "p",
          "text": "3.5 Flash uses subagents to create new city landscapes in Antigravity.",
          "section_heading": "3.5 Flash: agentic tasks at scale",
          "source_order": 18
        },
        {
          "block_id": "block-19",
          "kind": "p",
          "text": "3.5 Flash uses two agents: a builder and a player, working in a rapid self-improvement loop to develop a game in Antigravity.",
          "section_heading": "3.5 Flash: agentic tasks at scale",
          "source_order": 19
        },
        {
          "block_id": "block-20",
          "kind": "p",
          "text": "Building on the strong multimodal foundation of Gemini 3, 3.5 Flash generates richer, more interactive web UIs and graphics.",
          "section_heading": "3.5 Flash: agentic tasks at scale",
          "source_order": 20
        },
        {
          "block_id": "block-21",
          "kind": "p",
          "text": "3.5 Flash creates interactive animations for a research paper on AI Studio.",
          "section_heading": "3.5 Flash: agentic tasks at scale",
          "source_order": 21
        },
        {
          "block_id": "block-22",
          "kind": "p",
          "text": "3.5 Flash turns a plain text description into interactive hardware on AI Studio.",
          "section_heading": "3.5 Flash: agentic tasks at scale",
          "source_order": 22
        },
        {
          "block_id": "block-23",
          "kind": "p",
          "text": "3.5 Flash executes multiple concepts in parallel to build a full branding concept for a school fundraiser on AI Studio.",
          "section_heading": "3.5 Flash: agentic tasks at scale",
          "source_order": 23
        },
        {
          "block_id": "block-24",
          "kind": "p",
          "text": "3.5 Flash generates different UX approaches for a checkout flow in just 60 seconds on AI Studio.",
          "section_heading": "3.5 Flash: agentic tasks at scale",
          "source_order": 24
        },
        {
          "block_id": "block-25",
          "kind": "h2",
          "text": "3.5 Flash: real-world impact",
          "section_heading": "3.5 Flash: agentic tasks at scale",
          "source_order": 25
        },
        {
          "block_id": "block-26",
          "kind": "p",
          "text": "3.5 Flash\u2019s real-world agentic capabilities are already driving meaningful progress for our developers and enterprises alike. In developing the 3.5 model series, we worked closely with industry partners to understand where toil and complexity arose in their workflows. Partners are seeing meaningful impact \u2014 from banks and fintechs automating multi-week workflows to data science teams unearthing insights amidst complex data environments.",
          "section_heading": "3.5 Flash: real-world impact",
          "source_order": 26
        },
        {
          "block_id": "block-27",
          "kind": "p",
          "text": "Shopify is running subagents in parallel to analyze complex data over a long horizon for more accurate merchant growth forecasts at a global scale.",
          "section_heading": "3.5 Flash: real-world impact",
          "source_order": 27
        },
        {
          "block_id": "block-28",
          "kind": "p",
          "text": "Macquarie Bank is piloting how 3.5 Flash can accelerate customer onboarding by reasoning over complex 100+ page documents, retrieving relevant information and making reliable recommendations with low latency.",
          "section_heading": "3.5 Flash: real-world impact",
          "source_order": 28
        },
        {
          "block_id": "block-29",
          "kind": "p",
          "text": "Salesforce is integrating 3.5 Flash into Agentforce to reliably automate complicated enterprise tasks by deploying multiple subagents that retain context and execute complex, multi-turn tool calling.",
          "section_heading": "3.5 Flash: real-world impact",
          "source_order": 29
        },
        {
          "block_id": "block-30",
          "kind": "p",
          "text": "3.5 Flash is helping Ramp enable smarter, more reliable OCR through multimodal understanding of complex invoices combined with reasoning over historical patterns.",
          "section_heading": "3.5 Flash: real-world impact",
          "source_order": 30
        },
        {
          "block_id": "block-31",
          "kind": "p",
          "text": "Xero is deploying agents to autonomously manage complex, multi-week workflows, such as identifying suppliers and gathering information for 1099 tax forms, enabling small businesses to automate tedious admin tasks.",
          "section_heading": "3.5 Flash: real-world impact",
          "source_order": 31
        },
        {
          "block_id": "block-32",
          "kind": "p",
          "text": "Databricks is using agentic workflows to monitor and retrieve real-time information, reason across massive datasets to diagnose issues, identify fixes and propose solutions for data scientists.",
          "section_heading": "3.5 Flash: real-world impact",
          "source_order": 32
        },
        {
          "block_id": "block-33",
          "kind": "h2",
          "text": "Personal AI agents: built with 3.5 Flash",
          "section_heading": "3.5 Flash: real-world impact",
          "source_order": 33
        },
        {
          "block_id": "block-34",
          "kind": "p",
          "text": "3.5 Flash is now the default model for the Gemini app and AI Mode in Search globally. At I/O today, we showed how its agentic capabilities are powering new features to bring frontier-level intelligence to your daily life.",
          "section_heading": "Personal AI agents: built with 3.5 Flash",
          "source_order": 34
        },
        {
          "block_id": "block-35",
          "kind": "p",
          "text": "The new Gemini Spark, your personal AI agent, uses 3.5 Flash. It runs 24/7, helping you navigate your digital life, taking action on your behalf while under your direction. We\u2019re starting to roll out Gemini Spark to trusted testers today, and we\u2019re planning on bringing the Beta to Google AI Ultra subscribers in the US next week.",
          "section_heading": "Personal AI agents: built with 3.5 Flash",
          "source_order": 35
        },
        {
          "block_id": "block-36",
          "kind": "p",
          "text": "The enhanced agentic coding capabilities of 3.5 Flash are also delivering even more intelligent experiences across Search, from introducing new information agents that work for you 24/7 to unlocking more dynamic generative UI experiences. Learn more in our blog post.",
          "section_heading": "Personal AI agents: built with 3.5 Flash",
          "source_order": 36
        },
        {
          "block_id": "block-37",
          "kind": "p",
          "text": "Search leverages 3.5 Flash to build an interactive visual explaining Gyroid patterns.",
          "section_heading": "Personal AI agents: built with 3.5 Flash",
          "source_order": 37
        },
        {
          "block_id": "block-38",
          "kind": "h2",
          "text": "Gemini 3.5: built with frontier safeguards",
          "section_heading": "Personal AI agents: built with 3.5 Flash",
          "source_order": 38
        },
        {
          "block_id": "block-39",
          "kind": "p",
          "text": "Gemini 3.5 was developed in accordance with our Frontier Safety Framework. We have strengthened our cyber and CBRN safeguards, which means it's less likely to generate harmful content, and to mistakenly refuse to answer safe queries. We achieve this with new, more advanced safety training and mitigations, including interpretability tools that help check and understand the AI's inner reasoning before it provides a response.",
          "section_heading": "Gemini 3.5: built with frontier safeguards",
          "source_order": 39
        },
        {
          "block_id": "block-40",
          "kind": "h2",
          "text": "3.5 Flash is available today",
          "section_heading": "Gemini 3.5: built with frontier safeguards",
          "source_order": 40
        },
        {
          "block_id": "block-41",
          "kind": "p",
          "text": "Gemini 3.5 Flash is generally available via Google Antigravity, the Gemini API in Google AI Studio and Android Studio, Gemini Enterprise Agent Platform and Gemini Enterprise. It\u2019s also now available to everyone in the Gemini app and AI Mode in Search. On behalf of the entire Gemini team, we can\u2019t wait to see what you build.",
          "section_heading": "3.5 Flash is available today",
          "source_order": 41
        }
      ]
    }
  },

  "launch_page": {
    "source_title": "Gemini 3.5: frontier intelligence with action",
    "source_url": "https://blog.google/innovation-and-ai/models-and-research/gemini-models/gemini-3-5/",
    "blocks": [
      {
        "block_id": "block-0",
        "kind": "h1",
        "text": "Gemini 3.5: frontier intelligence with action",
        "source_order": 0
      },
      {
        "block_id": "block-1",
        "kind": "p",
        "text": "May 19, 2026",
        "section_heading": "Gemini 3.5: frontier intelligence with action",
        "source_order": 1
      },
      {
        "block_id": "block-2",
        "kind": "p",
        "text": "Gemini 3.5 is built to help you execute complex, agentic workflows.",
        "section_heading": "Gemini 3.5: frontier intelligence with action",
        "source_order": 2
      },
      {
        "block_id": "block-3",
        "kind": "p",
        "text": "Today, we\u2019re introducing Gemini 3.5, our latest family of models combining frontier intelligence with action. This represents a major leap forward in building more capable, intelligent agents. We\u2019re kicking off the series by releasing 3.5 Flash. It delivers frontier performance for agents and coding, excelling at complex long-horizon tasks that deliver real-world utility.",
        "section_heading": "Gemini 3.5: frontier intelligence with action",
        "source_order": 3
      },
      {
        "block_id": "block-4",
        "kind": "p",
        "text": "3.5 Flash is available today to billions of people globally:",
        "section_heading": "Gemini 3.5: frontier intelligence with action",
        "source_order": 4
      },
      {
        "block_id": "block-5",
        "kind": "li",
        "text": "For everyone via the Gemini app and AI Mode in Google Search",
        "section_heading": "Gemini 3.5: frontier intelligence with action",
        "source_order": 5
      },
      {
        "block_id": "block-6",
        "kind": "li",
        "text": "For developers in our agent-first development platform Google Antigravity and Gemini API in Google AI Studio and Android Studio",
        "section_heading": "Gemini 3.5: frontier intelligence with action",
        "source_order": 6
      },
      {
        "block_id": "block-7",
        "kind": "li",
        "text": "For enterprises in Gemini Enterprise Agent Platform and Gemini Enterprise.",
        "section_heading": "Gemini 3.5: frontier intelligence with action",
        "source_order": 7
      },
      {
        "block_id": "block-8",
        "kind": "p",
        "text": "We\u2019re also hard at work on 3.5 Pro. It's already being used internally, and we look forward to rolling it out next month.",
        "section_heading": "Gemini 3.5: frontier intelligence with action",
        "source_order": 8
      },
      {
        "block_id": "block-9",
        "kind": "h2",
        "text": "3.5 Flash: frontier performance for agents and coding",
        "section_heading": "Gemini 3.5: frontier intelligence with action",
        "source_order": 9
      },
      {
        "block_id": "block-10",
        "kind": "p",
        "text": "Gemini 3.5 Flash delivers intelligence that rivals large flagship models on multiple dimensions, at the speeds you have come to expect from the Flash series. It\u2019s our strongest agentic and coding model yet, outperforming Gemini 3.1 Pro on challenging coding and agentic benchmarks like Terminal-Bench 2.1 (76.2%), GDPval-AA (1656 Elo) and MCP Atlas (83.6%), and leading in multimodal understanding (84.2% on CharXiv Reasoning). When looking at output tokens per second, it is 4 times faster than other frontier models.",
        "section_heading": "3.5 Flash: frontier performance for agents and coding",
        "source_order": 10
      },
      {
        "block_id": "block-11",
        "kind": "p",
        "text": "Landing in the top-right quadrant of the Artificial Analysis index, 3.5 Flash delivers frontier-level intelligence at exceptional speed \u2014 proving you no longer have to trade quality for latency.",
        "section_heading": "3.5 Flash: frontier performance for agents and coding",
        "source_order": 11
      },
      {
        "block_id": "block-12",
        "kind": "h2",
        "text": "3.5 Flash: agentic tasks at scale",
        "section_heading": "3.5 Flash: frontier performance for agents and coding",
        "source_order": 12
      },
      {
        "block_id": "block-13",
        "kind": "p",
        "text": "This balance of speed and performance makes 3.5 Flash ideal for tackling long-horizon agentic tasks. What used to take a developer days or an auditor weeks, 3.5 Flash can now help complete in a fraction of the time, often at less than half the cost of other frontier models. It rapidly plans, builds and iterates to solve real-world problems, whether it\u2019s developing new applications, maintaining codebases or helping to prepare financial documents.",
        "section_heading": "3.5 Flash: agentic tasks at scale",
        "source_order": 13
      },
      {
        "block_id": "block-14",
        "kind": "p",
        "text": "When coupled with the updated Antigravity harness, 3.5 Flash becomes a powerful engine for deploying collaborative subagents to tackle problems at scale for the most demanding use cases. Under supervision, it can reliably execute multi-step workflows and coding tasks while sustaining frontier performance.",
        "section_heading": "3.5 Flash: agentic tasks at scale",
        "source_order": 14
      },
      {
        "block_id": "block-15",
        "kind": "p",
        "text": "Powered by Antigravity, 3.5 Flash executes multi-step workflows to automatically rename and categorize unstructured assets based on dynamic criteria.",
        "section_heading": "3.5 Flash: agentic tasks at scale",
        "source_order": 15
      },
      {
        "block_id": "block-16",
        "kind": "p",
        "text": "Leveraging Antigravity, 3.5 Flash uses two agents to synthesize the AlphaZero paper and code a fully playable game in six hours.",
        "section_heading": "3.5 Flash: agentic tasks at scale",
        "source_order": 16
      },
      {
        "block_id": "block-17",
        "kind": "p",
        "text": "3.5 Flash uses the Antigravity harness to transform a messy legacy codebase to Next.js.",
        "section_heading": "3.5 Flash: agentic tasks at scale",
        "source_order": 17
      },
      {
        "block_id": "block-18",
        "kind": "p",
        "text": "3.5 Flash uses subagents to create new city landscapes in Antigravity.",
        "section_heading": "3.5 Flash: agentic tasks at scale",
        "source_order": 18
      },
      {
        "block_id": "block-19",
        "kind": "p",
        "text": "3.5 Flash uses two agents: a builder and a player, working in a rapid self-improvement loop to develop a game in Antigravity.",
        "section_heading": "3.5 Flash: agentic tasks at scale",
        "source_order": 19
      },
      {
        "block_id": "block-20",
        "kind": "p",
        "text": "Building on the strong multimodal foundation of Gemini 3, 3.5 Flash generates richer, more interactive web UIs and graphics.",
        "section_heading": "3.5 Flash: agentic tasks at scale",
        "source_order": 20
      },
      {
        "block_id": "block-21",
        "kind": "p",
        "text": "3.5 Flash creates interactive animations for a research paper on AI Studio.",
        "section_heading": "3.5 Flash: agentic tasks at scale",
        "source_order": 21
      },
      {
        "block_id": "block-22",
        "kind": "p",
        "text": "3.5 Flash turns a plain text description into interactive hardware on AI Studio.",
        "section_heading": "3.5 Flash: agentic tasks at scale",
        "source_order": 22
      },
      {
        "block_id": "block-23",
        "kind": "p",
        "text": "3.5 Flash executes multiple concepts in parallel to build a full branding concept for a school fundraiser on AI Studio.",
        "section_heading": "3.5 Flash: agentic tasks at scale",
        "source_order": 23
      },
      {
        "block_id": "block-24",
        "kind": "p",
        "text": "3.5 Flash generates different UX approaches for a checkout flow in just 60 seconds on AI Studio.",
        "section_heading": "3.5 Flash: agentic tasks at scale",
        "source_order": 24
      },
      {
        "block_id": "block-25",
        "kind": "h2",
        "text": "3.5 Flash: real-world impact",
        "section_heading": "3.5 Flash: agentic tasks at scale",
        "source_order": 25
      },
      {
        "block_id": "block-26",
        "kind": "p",
        "text": "3.5 Flash\u2019s real-world agentic capabilities are already driving meaningful progress for our developers and enterprises alike. In developing the 3.5 model series, we worked closely with industry partners to understand where toil and complexity arose in their workflows. Partners are seeing meaningful impact \u2014 from banks and fintechs automating multi-week workflows to data science teams unearthing insights amidst complex data environments.",
        "section_heading": "3.5 Flash: real-world impact",
        "source_order": 26
      },
      {
        "block_id": "block-27",
        "kind": "p",
        "text": "Shopify is running subagents in parallel to analyze complex data over a long horizon for more accurate merchant growth forecasts at a global scale.",
        "section_heading": "3.5 Flash: real-world impact",
        "source_order": 27
      },
      {
        "block_id": "block-28",
        "kind": "p",
        "text": "Macquarie Bank is piloting how 3.5 Flash can accelerate customer onboarding by reasoning over complex 100+ page documents, retrieving relevant information and making reliable recommendations with low latency.",
        "section_heading": "3.5 Flash: real-world impact",
        "source_order": 28
      },
      {
        "block_id": "block-29",
        "kind": "p",
        "text": "Salesforce is integrating 3.5 Flash into Agentforce to reliably automate complicated enterprise tasks by deploying multiple subagents that retain context and execute complex, multi-turn tool calling.",
        "section_heading": "3.5 Flash: real-world impact",
        "source_order": 29
      },
      {
        "block_id": "block-30",
        "kind": "p",
        "text": "3.5 Flash is helping Ramp enable smarter, more reliable OCR through multimodal understanding of complex invoices combined with reasoning over historical patterns.",
        "section_heading": "3.5 Flash: real-world impact",
        "source_order": 30
      },
      {
        "block_id": "block-31",
        "kind": "p",
        "text": "Xero is deploying agents to autonomously manage complex, multi-week workflows, such as identifying suppliers and gathering information for 1099 tax forms, enabling small businesses to automate tedious admin tasks.",
        "section_heading": "3.5 Flash: real-world impact",
        "source_order": 31
      },
      {
        "block_id": "block-32",
        "kind": "p",
        "text": "Databricks is using agentic workflows to monitor and retrieve real-time information, reason across massive datasets to diagnose issues, identify fixes and propose solutions for data scientists.",
        "section_heading": "3.5 Flash: real-world impact",
        "source_order": 32
      },
      {
        "block_id": "block-33",
        "kind": "h2",
        "text": "Personal AI agents: built with 3.5 Flash",
        "section_heading": "3.5 Flash: real-world impact",
        "source_order": 33
      },
      {
        "block_id": "block-34",
        "kind": "p",
        "text": "3.5 Flash is now the default model for the Gemini app and AI Mode in Search globally. At I/O today, we showed how its agentic capabilities are powering new features to bring frontier-level intelligence to your daily life.",
        "section_heading": "Personal AI agents: built with 3.5 Flash",
        "source_order": 34
      },
      {
        "block_id": "block-35",
        "kind": "p",
        "text": "The new Gemini Spark, your personal AI agent, uses 3.5 Flash. It runs 24/7, helping you navigate your digital life, taking action on your behalf while under your direction. We\u2019re starting to roll out Gemini Spark to trusted testers today, and we\u2019re planning on bringing the Beta to Google AI Ultra subscribers in the US next week.",
        "section_heading": "Personal AI agents: built with 3.5 Flash",
        "source_order": 35
      },
      {
        "block_id": "block-36",
        "kind": "p",
        "text": "The enhanced agentic coding capabilities of 3.5 Flash are also delivering even more intelligent experiences across Search, from introducing new information agents that work for you 24/7 to unlocking more dynamic generative UI experiences. Learn more in our blog post.",
        "section_heading": "Personal AI agents: built with 3.5 Flash",
        "source_order": 36
      },
      {
        "block_id": "block-37",
        "kind": "p",
        "text": "Search leverages 3.5 Flash to build an interactive visual explaining Gyroid patterns.",
        "section_heading": "Personal AI agents: built with 3.5 Flash",
        "source_order": 37
      },
      {
        "block_id": "block-38",
        "kind": "h2",
        "text": "Gemini 3.5: built with frontier safeguards",
        "section_heading": "Personal AI agents: built with 3.5 Flash",
        "source_order": 38
      },
      {
        "block_id": "block-39",
        "kind": "p",
        "text": "Gemini 3.5 was developed in accordance with our Frontier Safety Framework. We have strengthened our cyber and CBRN safeguards, which means it's less likely to generate harmful content, and to mistakenly refuse to answer safe queries. We achieve this with new, more advanced safety training and mitigations, including interpretability tools that help check and understand the AI's inner reasoning before it provides a response.",
        "section_heading": "Gemini 3.5: built with frontier safeguards",
        "source_order": 39
      },
      {
        "block_id": "block-40",
        "kind": "h2",
        "text": "3.5 Flash is available today",
        "section_heading": "Gemini 3.5: built with frontier safeguards",
        "source_order": 40
      },
      {
        "block_id": "block-41",
        "kind": "p",
        "text": "Gemini 3.5 Flash is generally available via Google Antigravity, the Gemini API in Google AI Studio and Android Studio, Gemini Enterprise Agent Platform and Gemini Enterprise. It\u2019s also now available to everyone in the Gemini app and AI Mode in Search. On behalf of the entire Gemini team, we can\u2019t wait to see what you build.",
        "section_heading": "3.5 Flash is available today",
        "source_order": 41
      }
    ],

    const launchPage = {
  "source_title": "Gemini 3.5: frontier intelligence with action",
  "source_url": "https://blog.google/innovation-and-ai/models-and-research/gemini-models/gemini-3-5/",
  "blocks": [
    {
      "block_id": "block-0",
      "kind": "h1",
      "text": "Gemini 3.5: frontier intelligence with action",
      "source_order": 0
    },
    {
      "block_id": "block-1",
      "kind": "p",
      "text": "May 19, 2026",
      "section_heading": "Gemini 3.5: frontier intelligence with action",
      "source_order": 1
    },
    {
      "block_id": "block-2",
      "kind": "p",
      "text": "Gemini 3.5 is built to help you execute complex, agentic workflows.",
      "section_heading": "Gemini 3.5: frontier intelligence with action",
      "source_order": 2
    },
    {
      "block_id": "block-3",
      "kind": "p",
      "text": "Today, we\u2019re introducing Gemini 3.5, our latest family of models combining frontier intelligence with action. This represents a major leap forward in building more capable, intelligent agents. We\u2019re kicking off the series by releasing 3.5 Flash. It delivers frontier performance for agents and coding, excelling at complex long-horizon tasks that deliver real-world utility.",
      "section_heading": "Gemini 3.5: frontier intelligence with action",
      "source_order": 3
    },
    {
      "block_id": "block-4",
      "kind": "p",
      "text": "3.5 Flash is available today to billions of people globally:",
      "section_heading": "Gemini 3.5: frontier intelligence with action",
      "source_order": 4
    },
    {
      "block_id": "block-5",
      "kind": "li",
      "text": "For everyone via the Gemini app and AI Mode in Google Search",
      "section_heading": "Gemini 3.5: frontier intelligence with action",
      "source_order": 5
    },
    {
      "block_id": "block-6",
      "kind": "li",
      "text": "For developers in our agent-first development platform Google Antigravity and Gemini API in Google AI Studio and Android Studio",
      "section_heading": "Gemini 3.5: frontier intelligence with action",
      "source_order": 6
    },
    {
      "block_id": "block-7",
      "kind": "li",
      "text": "For enterprises in Gemini Enterprise Agent Platform and Gemini Enterprise.",
      "section_heading": "Gemini 3.5: frontier intelligence with action",
      "source_order": 7
    },
    {
      "block_id": "block-8",
      "kind": "p",
      "text": "We\u2019re also hard at work on 3.5 Pro. It's already being used internally, and we look forward to rolling it out next month.",
      "section_heading": "Gemini 3.5: frontier intelligence with action",
      "source_order": 8
    },
    {
      "block_id": "block-9",
      "kind": "h2",
      "text": "3.5 Flash: frontier performance for agents and coding",
      "section_heading": "Gemini 3.5: frontier intelligence with action",
      "source_order": 9
    },
    {
      "block_id": "block-10",
      "kind": "p",
      "text": "Gemini 3.5 Flash delivers intelligence that rivals large flagship models on multiple dimensions, at the speeds you have come to expect from the Flash series. It\u2019s our strongest agentic and coding model yet, outperforming Gemini 3.1 Pro on challenging coding and agentic benchmarks like Terminal-Bench 2.1 (76.2%), GDPval-AA (1656 Elo) and MCP Atlas (83.6%), and leading in multimodal understanding (84.2% on CharXiv Reasoning). When looking at output tokens per second, it is 4 times faster than other frontier models.",
      "section_heading": "3.5 Flash: frontier performance for agents and coding",
      "source_order": 10
    },
    {
      "block_id": "block-11",
      "kind": "p",
      "text": "Landing in the top-right quadrant of the Artificial Analysis index, 3.5 Flash delivers frontier-level intelligence at exceptional speed \u2014 proving you no longer have to trade quality for latency.",
      "section_heading": "3.5 Flash: frontier performance for agents and coding",
      "source_order": 11
    },
    {
      "block_id": "block-12",
      "kind": "h2",
      "text": "3.5 Flash: agentic tasks at scale",
      "section_heading": "3.5 Flash: frontier performance for agents and coding",
      "source_order": 12
    },
    {
      "block_id": "block-13",
      "kind": "p",
      "text": "This balance of speed and performance makes 3.5 Flash ideal for tackling long-horizon agentic tasks. What used to take a developer days or an auditor weeks, 3.5 Flash can now help complete in a fraction of the time, often at less than half the cost of other frontier models. It rapidly plans, builds and iterates to solve real-world problems, whether it\u2019s developing new applications, maintaining codebases or helping to prepare financial documents.",
      "section_heading": "3.5 Flash: agentic tasks at scale",
      "source_order": 13
    },
    {
      "block_id": "block-14",
      "kind": "p",
      "text": "When coupled with the updated Antigravity harness, 3.5 Flash becomes a powerful engine for deploying collaborative subagents to tackle problems at scale for the most demanding use cases. Under supervision, it can reliably execute multi-step workflows and coding tasks while sustaining frontier performance.",
      "section_heading": "3.5 Flash: agentic tasks at scale",
      "source_order": 14
    },
    {
      "block_id": "block-15",
      "kind": "p",
      "text": "Powered by Antigravity, 3.5 Flash executes multi-step workflows to automatically rename and categorize unstructured assets based on dynamic criteria.",
      "section_heading": "3.5 Flash: agentic tasks at scale",
      "source_order": 15
    },
    {
      "block_id": "block-16",
      "kind": "p",
      "text": "Leveraging Antigravity, 3.5 Flash uses two agents to synthesize the AlphaZero paper and code a fully playable game in six hours.",
      "section_heading": "3.5 Flash: agentic tasks at scale",
      "source_order": 16
    },
    {
      "block_id": "block-17",
      "kind": "p",
      "text": "3.5 Flash uses the Antigravity harness to transform a messy legacy codebase to Next.js.",
      "section_heading": "3.5 Flash: agentic tasks at scale",
      "source_order": 17
    },
    {
      "block_id": "block-18",
      "kind": "p",
      "text": "3.5 Flash uses subagents to create new city landscapes in Antigravity.",
      "section_heading": "3.5 Flash: agentic tasks at scale",
      "source_order": 18
    },
    {
      "block_id": "block-19",
      "kind": "p",
      "text": "3.5 Flash uses two agents: a builder and a player, working in a rapid self-improvement loop to develop a game in Antigravity.",
      "section_heading": "3.5 Flash: agentic tasks at scale",
      "source_order": 19
    },
    {
      "block_id": "block-20",
      "kind": "p",
      "text": "Building on the strong multimodal foundation of Gemini 3, 3.5 Flash generates richer, more interactive web UIs and graphics.",
      "section_heading": "3.5 Flash: agentic tasks at scale",
      "source_order": 20
    },
    {
      "block_id": "block-21",
      "kind": "p",
      "text": "3.5 Flash creates interactive animations for a research paper on AI Studio.",
      "section_heading": "3.5 Flash: agentic tasks at scale",
      "source_order": 21
    },
    {
      "block_id": "block-22",
      "kind": "p",
      "text": "3.5 Flash turns a plain text description into interactive hardware on AI Studio.",
      "section_heading": "3.5 Flash: agentic tasks at scale",
      "source_order": 22
    },
    {
      "block_id": "block-23",
      "kind": "p",
      "text": "3.5 Flash executes multiple concepts in parallel to build a full branding concept for a school fundraiser on AI Studio.",
      "section_heading": "3.5 Flash: agentic tasks at scale",
      "source_order": 23
    },
    {
      "block_id": "block-24",
      "kind": "p",
      "text": "3.5 Flash generates different UX approaches for a checkout flow in just 60 seconds on AI Studio.",
      "section_heading": "3.5 Flash: agentic tasks at scale",
      "source_order": 24
    },
    {
      "block_id": "block-25",
      "kind": "h2",
      "text": "3.5 Flash: real-world impact",
      "section_heading": "3.5 Flash: agentic tasks at scale",
      "source_order": 25
    },
    {
      "block_id": "block-26",
      "kind": "p",
      "text": "3.5 Flash\u2019s real-world agentic capabilities are already driving meaningful progress for our developers and enterprises alike. In developing the 3.5 model series, we worked closely with industry partners to understand where toil and complexity arose in their workflows. Partners are seeing meaningful impact \u2014 from banks and fintechs automating multi-week workflows to data science teams unearthing insights amidst complex data environments.",
      "section_heading": "3.5 Flash: real-world impact",
      "source_order": 26
    },
    {
      "block_id": "block-27",
      "kind": "p",
      "text": "Shopify is running subagents in parallel to analyze complex data over a long horizon for more accurate merchant growth forecasts at a global scale.",
      "section_heading": "3.5 Flash: real-world impact",
      "source_order": 27
    },
    {
      "block_id": "block-28",
      "kind": "p",
      "text": "Macquarie Bank is piloting how 3.5 Flash can accelerate customer onboarding by reasoning over complex 100+ page documents, retrieving relevant information and making reliable recommendations with low latency.",
      "section_heading": "3.5 Flash: real-world impact",
      "source_order": 28
    },
    {
      "block_id": "block-29",
      "kind": "p",
      "text": "Salesforce is integrating 3.5 Flash into Agentforce to reliably automate complicated enterprise tasks by deploying multiple subagents that retain context and execute complex, multi-turn tool calling.",
      "section_heading": "3.5 Flash: real-world impact",
      "source_order": 29
    },
    {
      "block_id": "block-30",
      "kind": "p",
      "text": "3.5 Flash is helping Ramp enable smarter, more reliable OCR through multimodal understanding of complex invoices combined with reasoning over historical patterns.",
      "section_heading": "3.5 Flash: real-world impact",
      "source_order": 30
    },
    {
      "block_id": "block-31",
      "kind": "p",
      "text": "Xero is deploying agents to autonomously manage complex, multi-week workflows, such as identifying suppliers and gathering information for 1099 tax forms, enabling small businesses to automate tedious admin tasks.",
      "section_heading": "3.5 Flash: real-world impact",
      "source_order": 31
    },
    {
      "block_id": "block-32",
      "kind": "p",
      "text": "Databricks is using agentic workflows to monitor and retrieve real-time information, reason across massive datasets to diagnose issues, identify fixes and propose solutions for data scientists.",
      "section_heading": "3.5 Flash: real-world impact",
      "source_order": 32
    },
    {
      "block_id": "block-33",
      "kind": "h2",
      "text": "Personal AI agents: built with 3.5 Flash",
      "section_heading": "3.5 Flash: real-world impact",
      "source_order": 33
    },
    {
      "block_id": "block-34",
      "kind": "p",
      "text": "3.5 Flash is now the default model for the Gemini app and AI Mode in Search globally. At I/O today, we showed how its agentic capabilities are powering new features to bring frontier-level intelligence to your daily life.",
      "section_heading": "Personal AI agents: built with 3.5 Flash",
      "source_order": 34
    },
    {
      "block_id": "block-35",
      "kind": "p",
      "text": "The new Gemini Spark, your personal AI agent, uses 3.5 Flash. It runs 24/7, helping you navigate your digital life, taking action on your behalf while under your direction. We\u2019re starting to roll out Gemini Spark to trusted testers today, and we\u2019re planning on bringing the Beta to Google AI Ultra subscribers in the US next week.",
      "section_heading": "Personal AI agents: built with 3.5 Flash",
      "source_order": 35
    },
    {

          <div class="wrap">${esc(audit.claim.claim)}</div>
          <div class="meter ${cls(audit.verdict)}" title="Stretch score ${audit.stretch_score} / 100"><div style="width: ${audit.stretch_score}%"></div></div>
          <p class="muted wrap">${esc(audit.claim.why_risky || '')}</p>
        </button>
      `).join('');
      if (!audits.length) {
        document.getElementById('claim-detail').innerHTML = '<div class="panel"><p class="muted">No claims match the selected filters.</p></div>';
        document.getElementById('evidence').innerHTML = '';
        return;
      }
      const audit = audits.find(item => item.__index === selected) ?? audits[0];
      const evidenceCount = audit.supporting_evidence.length + audit.counter_evidence.length;
      const evidenceScore = Math.min(100, evidenceCount * 25);
      const confidence = confidenceScore[audit.confidence] ?? 0;
      const computedChecks = audit.numeric_findings?.length
        ? `<div class="panel"><h3>Computed Checks</h3>${list(audit.numeric_findings)}</div>`
        : '';
      const runProfile = report.run_profile
        ? `
            <p class="wrap"><strong>Pipeline wall:</strong> ${fmtMs(report.run_profile.total_duration_ms)} · <strong>Load:</strong> ${fmtMs(report.run_profile.load_document_ms)} · <strong>Extract:</strong> ${fmtMs(report.run_profile.extract_claims_ms)} · <strong>Audit:</strong> ${fmtMs(report.run_profile.audit_claims_ms)} · <strong>Contrast:</strong> ${fmtMs(report.run_profile.contrast_duration_ms)}</p>
            <p class="wrap"><strong>Claims extracted / audited:</strong> ${report.run_profile.claims_extracted} / ${report.run_profile.claims_audited} · <strong>Specialist passes:</strong> ${report.run_profile.agent_passes} · <strong>Unique sources:</strong> ${report.run_profile.unique_source_count}</p>
          `
        : '';
      document.getElementById('claim-detail').innerHTML = `
        <div class="panel">
          <h3>Report Provenance</h3>
          <p class="wrap"><strong>Mode:</strong> ${esc(report.mode)} · <strong>Model:</strong> ${esc(report.model || 'none')}</p>
          <p class="wrap"><strong>Evidence Contrast:</strong> ${report.contrast_enabled ? 'enabled' : 'disabled'}</p>
          <p class="wrap"><strong>Provided reference URLs:</strong> ${(report.reference_urls || []).length ? (report.reference_urls || []).map(esc).join(', ') : 'none'}</p>
          ${runProfile}
        </div>
        <div class="panel">
          <strong>Formal verdict: ${esc(audit.verdict)}</strong> ${hint(verdictTip(audit.verdict))}
          <div class="score"><div style="width: ${audit.stretch_score}%"></div></div>
          <p class="muted">
            Confidence: ${esc(audit.confidence)} ${hint('Confidence reflects how strongly the available evidence supports this verdict, not whether the original claim is true.')}
            · Stretch Score: ${audit.stretch_score} / 100 ${hint('Higher means the original wording stretches further beyond what the evidence supports.')}
            · Evidence items: ${evidenceCount} ${hint('Evidence items are supporting or counter-evidence records attached to this claim.')}
          </p>
          <div class="strength-grid">
            ${strengthCard('Stretch pressure', audit.stretch_score, audit.verdict, `${audit.stretch_score}/100`, 'How much the wording outruns the evidence.')}
            ${strengthCard('Confidence', confidence, audit.verdict, esc(audit.confidence), 'How confident Honest Launches is in this verdict from available evidence.')}
            ${strengthCard('Evidence depth', evidenceScore, audit.verdict, `${evidenceCount} item${evidenceCount === 1 ? '' : 's'}`, 'How much direct evidence is attached to this claim audit.')}
          </div>
        </div>
        <div class="panel"><h3>Original</h3><p class="wrap">${esc(audit.claim.claim)}</p></div>
        ${contrastCard(audit.contrast)}
        <div class="panel"><h3>Defensible Rewrite</h3><p class="wrap">${esc(audit.weaker_supported_rewrite)}</p></div>
        <div class="panel"><h3>Why</h3><p class="wrap">${esc(audit.why)}</p></div>
        ${claimTimingPanel(audit.claim_timing)}
        ${computedChecks}
        <div class="panel"><h3>Agent Steps</h3>${agentSteps(audit.agent_outputs || [])}</div>
      `;
      document.getElementById('evidence').innerHTML = `
        ${providedReferencesPanel(report.reference_urls || [])}
        ${sourcesChecked(audit.contrast)}
        <div class="panel"><h3>Gemini-Discovered Supporting Sources</h3><p class="muted">Sources found by the verifier while looking for the strongest support for this claim.</p>${items(audit.supporting_evidence)}</div>
        <div class="panel"><h3>Gemini-Discovered Caveat / Counter Sources</h3><p class="muted">Sources found by the contradiction-finder while looking for caveats, missing context, benchmark limits, or contrary evidence.</p>${items(audit.counter_evidence)}</div>
        <div class="panel"><h3>Missing Context</h3>${list(audit.missing_context)}</div>
      `;
    }
    function strengthCard(label, value, verdict, display, tip) {
      return `
        <div class="strength-card">
          <div class="strength-label"><span>${label} ${hint(tip)}</span><span>${display}</span></div>
          <div class="meter ${cls(verdict)}"><div style="width: ${value}%"></div></div>
        </div>
      `;
    }
    function contrastCard(contrast) {
      if (!contrast) return '';
      const best = contrast.best_sources?.[0];
      const sourceSummary = best ? best.evidence_summary : 'No usable reference source was available.';
      const qualification = best?.key_qualification ? `<p><strong>Key qualification:</strong> ${esc(best.key_qualification)}</p>` : '';
      return `
        <div class="panel">
          <h3>Evidence Contrast</h3>
          <p><strong>Claim says:</strong> <span class="wrap">${esc(contrast.claim_text)}</span></p>
          <p><strong>Best reference says:</strong> <span class="wrap">${esc(sourceSummary)}</span></p>
          ${qualification}
          <p><strong>Delta:</strong> ${esc(contrast.delta_type)} — ${esc(contrast.delta_explanation)}</p>
          <p><strong>Final verdict:</strong> ${esc(contrast.recommended_verdict)} · Confidence: ${esc(contrast.confidence)}</p>
          <p><strong>Defensible rewrite:</strong> <span class="wrap">${esc(contrast.suggested_rewrite)}</span></p>
        </div>
      `;
    }
    function claimTimingPanel(timing) {
      if (!timing) return '';
      return `
        <div class="panel">
          <h3>Claim Timing</h3>
          <p class="muted">Measured wall-clock time for this claim during the run.</p>
          <p><strong>Total:</strong> ${fmtMs(timing.total_duration_ms)} · <strong>Contrast:</strong> ${fmtMs(timing.contrast_ms)}</p>
          <ul>
            <li class="wrap"><strong>Verifier:</strong> ${fmtMs(timing.verifier_ms)}</li>
            <li class="wrap"><strong>Contradiction finder:</strong> ${fmtMs(timing.contradiction_finder_ms)}</li>
            <li class="wrap"><strong>Numeric calibrator:</strong> ${fmtMs(timing.numeric_calibrator_ms)}</li>
            <li class="wrap"><strong>Aggregator:</strong> ${fmtMs(timing.aggregator_ms)}</li>
          </ul>
        </div>
      `;
    }
    function providedReferencesPanel(values) {
      if (!values.length) {
        return `
          <div class="panel">
            <h3>Provided Reference URLs</h3>
            <p class="muted">No explicit reference URLs were provided for this run.</p>
          </div>
        `;
      }
      return `
        <div class="panel">
          <h3>Provided Reference URLs</h3>
          <p class="muted">Explicit sources supplied on the CLI with <code>--reference</code>. These anchor Evidence Contrast and define the source-of-truth packet for this run.</p>
          ${plainUrlItems(values)}
        </div>
      `;
    }
    function sourcesChecked(contrast) {
      if (!contrast) return '<div class="panel"><h3>Claim-Level Contrast References</h3><p class="muted">No contrast references checked for this claim. Contrast is applied only to the selected top-risk claims controlled by --contrast-top.</p></div>';
      const references = contrast.reference_sources || [];
      const best = contrast.best_sources || [];
      return `
        <div class="panel">
          <h3>Claim-Level Contrast References</h3>
          <p class="muted">References used by the Evidence Contrast pass for this selected claim. These are anchored by provided reference URLs, but Gemini may resolve nearby canonical pages or source titles while reading them.</p>
          ${referenceItems(references)}
        </div>
        <div class="panel">
          <h3>Reference Snippets / Mismatches</h3>
          <p class="muted">Claim-level snippets showing how the referenced source supports, narrows, or conflicts with the original wording.</p>
          ${contrastSourceItems(best)}
        </div>
      `;
    }
    function plainUrlItems(values) {
      return values.map(value => {
        const source = sourceUrlMarkup(value);
        return `<div class="source-item"><p class="wrap">${source}</p></div>`;
      }).join('');
    }
    function referenceItems(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return values.map(item => {
        const source = sourceUrlMarkup(item.url);
        return `
          <div class="source-item">
            <p>${sourceTitleMarkup(item.title, item.url)} <span class="muted">(${esc(item.source_type)} · authority ${item.authority_score}/100)</span></p>
            <p class="wrap">${source}</p>
            <p class="muted wrap">${esc(item.why_relevant || '')}</p>
          </div>
        `;
      }).join('');
    }
    function contrastSourceItems(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return values.map(item => {
        const source = sourceUrlMarkup(item.url);
        return `
          <div class="source-item">
            <p>${sourceTitleMarkup(item.title, item.url)} <span class="muted">(${esc(item.stance)})</span></p>
            <p class="wrap">${esc(item.evidence_summary)}</p>
            <p class="wrap">${source}</p>
            <p class="muted wrap">${esc(item.key_qualification || '')}</p>
          </div>
        `;
      }).join('');
    }
    function agentSteps(values) {
      if (!values.length) return '<p class="muted">No agent step trace recorded.</p>';
      return values.map(step => `
        <details>
          <summary>${esc(step.agent)} — ${esc(step.summary)}</summary>
          <p class="muted">Claim ID: ${esc(step.claim_id)}</p>
          <p class="muted">Duration: ${step.duration_ms == null ? 'not recorded' : fmtMs(step.duration_ms)}</p>
          <h4>Supporting evidence</h4>
          ${items(step.supporting_evidence || [])}
          <h4>Contradictions / narrowing evidence</h4>
          ${items(step.counter_evidence || [])}
          <h4>Missing context</h4>
          ${list(step.missing_context || [])}
          <h4>Computed checks</h4>
          ${list(step.numeric_findings || [])}
        </details>
      `).join('');
    }
    function list(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return `<ul>${values.map(value => `<li class="wrap">${esc(value)}</li>`).join('')}</ul>`;
    }
    function items(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return values.map(item => {
        const source = sourceUrlMarkup(item.url);
        return `
          <div class="source-item">
            <p>${sourceTitleMarkup(item.source_title, item.url)}</p>
            <p class="wrap">${esc(item.snippet)}</p>
            <p class="wrap">${source}</p>
            <p class="muted wrap">${esc(item.relevance || '')}</p>
          </div>
        `;
      }).join('');
    }
    function isOpaqueGroundingUrl(value) {
      try {
        const url = new URL(String(value), document.baseURI);
        return url.hostname === 'vertexaisearch.cloud.google.com' && url.pathname.includes('/grounding-api-redirect/');
      } catch (error) {
        return false;
      }
    }
    function sourceTitleMarkup(title, url) {
      const label = title || 'Reference source';
      const href = isOpaqueGroundingUrl(url) ? '' : safeHref(url);
      return href
        ? `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(label)}</a>`
        : `<strong>${esc(label)}</strong>`;
    }
    function sourceUrlMarkup(url) {
      if (!url) return '<span class="muted">No URL recorded</span>';
      if (isOpaqueGroundingUrl(url)) {
        return '<span class="muted">Opaque Gemini grounding redirect hidden; source title retained above.</span>';
      }
      const href = safeHref(url);
      return href
        ? `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(url)}</a>`
        : `<span class="muted">${esc(url)}</span>`;
    }
    setupFilters();
    renderPublicationHeader();
    renderHeadline();
    render();
    setView(activeView);
    window.addEventListener('hashchange', () => {
      const nextView = window.location.hash === '#ledger' ? 'ledger' : 'launch';
      if (nextView !== activeView) {
        setView(nextView);
      }
    });
  </script>
</body>
</html>
