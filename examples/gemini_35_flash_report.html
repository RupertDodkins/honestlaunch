<html lang="en">
<head>
  <meta charset="utf-8">

  <title>CappinCheck Report</title>
  <style>
    :root {
      --ink: #1f2328;
      --muted: #667085;
      --line: #d0d7de;
      --bg: #f6f8fa;
      --panel: #ffffff;
      --overstated: #b42318;
      --missing: #b54708;
      --supported: #067647;
      --receipts: #344054;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    main {
      min-height: calc(100vh - 74px);
    }
    .claim-strip {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }
    .headline-strip {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(246,248,250,0.96));
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .telemetry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }
    .stat-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .stat-note {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }
    .report-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      min-height: calc(100vh - 250px);
    }
    section { padding: 18px; border-right: 1px solid var(--line); }
    section:last-child { border-right: 0; }
    .filters {
      display: grid;
      grid-template-columns: minmax(180px, 260px);
      gap: 10px;
      margin: 0 0 12px;
    }
    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--panel);
      color: var(--ink);
    }
    .claim-row {
      width: 100%;
      text-align: left;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      overflow-wrap: anywhere;
    }
    .claim-row.active { border-color: var(--ink); box-shadow: 0 0 0 2px rgba(31,35,40,.08); }
    #claim-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
    }
    .claim-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 999px;
      margin-right: 6px;
      color: white;
      background: var(--receipts);
    }
    .hint {
      display: inline-grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      cursor: help;
      position: relative;
      background: var(--panel);
      vertical-align: middle;
    }
    .hint:focus {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }
    .hint::after {
      content: attr(data-tip);
      display: none;
      position: absolute;
      z-index: 10;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      width: min(280px, 72vw);
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--ink);
      color: #ffffff;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.35;
      box-shadow: 0 8px 24px rgba(31,35,40,.18);
    }
    .hint:hover::after,
    .hint:focus::after {
      display: block;
    }
    .muted { color: var(--muted); }
    .wrap {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
      overflow-wrap: anywhere;
    }
    .score {
      height: 10px;
      background: #eaecf0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .score > div { height: 100%; background: var(--overstated); }
    .strength-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .strength-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--bg);
    }
    .strength-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }
    .meter {
      height: 8px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .meter > div { height: 100%; background: var(--receipts); }
    .meter.overstated > div, .meter.contradicted > div { background: var(--overstated); }
    .meter.missing-context > div { background: var(--missing); }
    .meter.supported > div { background: var(--supported); }
    a {
      color: var(--receipts);
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .source-item {
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .source-item:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }
    h2, h3 { margin: 0 0 10px; letter-spacing: 0; }
    .title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    pre {
      white-space: pre-wrap;
      background: #0d1117;
      color: #f0f6fc;
      padding: 12px;
      border-radius: 8px;
      max-height: 260px;
      overflow: auto;
    }
    details {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--bg);
      padding: 10px 12px;
      margin-top: 10px;
    }
    details:first-of-type {
      margin-top: 0;
    }
    summary {
      cursor: pointer;
      font-weight: 800;
    }
    @media (max-width: 980px) {
      .report-grid { grid-template-columns: 1fr; }
      section { border-right: 0; border-bottom: 1px solid var(--line); }
      .strength-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

      </section>
    </div>
  </main>

Creating opportunity Safety &amp; security Google.org Public policy Sustainability Health See all Leadership Sundar Pichai, CEO More authors See all Inside Google Around the globe Life at Google See all Feed Images RSS feed Subscribe Breadcrumb Innovation &amp; AI Models &amp; research Gemini Models Gemini 3.5: frontier intelligence with action May 19, 2026 \u00b7 Share x.com Facebook LinkedIn Mail Copy link Gemini 3.5 is built to help you execute complex, agentic workflows. Koray Kavukcuoglu CTO, Google DeepMind and Chief AI Architect, Google Jeff Dean Chief Scientist, Google DeepMind and Google Research Oriol Vinyals Vice President, Google DeepMind Noam Shazeer Vice President, Google DeepMind Share x.com Facebook LinkedIn Mail Copy link In this story In this story Gemini 3.5 Flash Frontier intelligence, exceptional speed Agentic tasks at scale Richer graphics Real-world impact Personal AI agents Built with Frontier safeguards Available today Today, we\u2019re introducing Gemini 3.5, our latest family of models combining frontier intelligence with action. This represents a major leap forward in building more capable, intelligent agents. We\u2019re kicking off the series by releasing 3.5 Flash. It delivers frontier performance for agents and coding, excelling at complex long-horizon tasks that deliver real-world utility. 3.5 Flash is available today to billions of people globally: For everyone via the Gemini app and AI Mode in Google Search For developers in our agent-first development platform Google Antigravity and Gemini API in Google AI Studio and Android Studio For enterprises in Gemini Enterprise Agent Platform and Gemini Enterprise. We\u2019re also hard at work on 3.5 Pro. It's already being used internally, and we look forward to rolling it out next month. 3.5 Flash: frontier performance for agents and coding Gemini 3.5 Flash delivers intelligence that rivals large flagship models on multiple dimensions, at the speeds you have come to expect from the Flash series. It\u2019s our strongest agentic and coding model yet, outperforming Gemini 3.1 Pro on challenging coding and agentic benchmarks like Terminal-Bench 2.1 (76.2%), GDPval-AA (1656 Elo) and MCP Atlas (83.6%), and leading in multimodal understanding (84.2% on CharXiv Reasoning). When looking at output tokens per second, it is 4 times faster than other frontier models. Landing in the top-right quadrant of the Artificial Analysis index, 3.5 Flash delivers frontier-level intelligence at exceptional speed \u2014 proving you no longer have to trade quality for latency. 3.5 Flash: agentic tasks at scale This balance of speed and performance makes 3.5 Flash ideal for tackling long-horizon agentic tasks. What used to take a developer days or an auditor weeks, 3.5 Flash can now help complete in a fraction of the time, often at less than half the cost of other frontier models. It rapidly plans, builds and iterates to solve real-world problems, whether it\u2019s developing new applications, maintaining codebases or helping to prepare financial documents. When coupled with the updated Antigravity harness, 3.5 Flash becomes a powerful engine for deploying collaborative subagents to tackle problems at scale for the most demanding use cases. Under supervision, it can reliably execute multi-step workflows and coding tasks while sustaining frontier performance. Powered by Antigravity, 3.5 Flash executes multi-step workflows to automatically rename and categorize unstructured assets based on dynamic criteria. Leveraging Antigravity, 3.5 Flash uses two agents to synthesize the AlphaZero paper and code a fully playable game in six hours. 3.5 Flash uses the Antigravity harness to transform a messy legacy codebase to Next.js. 3.5 Flash uses subagents to create new city landscapes in Antigravity. 3.5 Flash uses two agents: a builder and a player, working in a rapid self-improvement loop to develop a game in Antigravity. Building on the strong multimodal foundation of Gemini 3, 3.5 Flash generates richer, more interactive web UIs and graphics. 3.5 Flash creates interactive animations for a research paper on AI Studio. 3.5 Flash turns a plain text description into interactive hardware on AI Studio. 3.5 Flash executes multiple concepts in parallel to build a full branding concept for a school fundraiser on AI Studio. 3.5 Flash generates different UX approaches for a checkout flow in just 60 seconds on AI Studio. 3.5 Flash: real-world impact 3.5 Flash\u2019s real-world agentic capabilities are already driving meaningful progress for our developers and enterprises alike. In developing the 3.5 model series, we worked closely with industry partners to understand where toil and complexity arose in their workflows. Partners are seeing meaningful impact \u2014 from banks and fintechs automating multi-week workflows to data science teams unearthing insights amidst complex data environments. Shopify is running subagents in parallel to analyze complex data over a long horizon for more accurate merchant growth forecasts at a global scale. Macquarie Bank is piloting how 3.5 Flash can accelerate customer onboarding by reasoning over complex 100+ page documents, retrieving relevant information and making reliable recommendations with low latency. Salesforce is integrating 3.5 Flash into Agentforce to reliably automate complicated enterprise tasks by deploying multiple subagents that retain context and execute complex, multi-turn tool calling. 3.5 Flash is helping Ramp enable smarter, more reliable OCR through multimodal understanding of complex invoices combined with reasoning over historical patterns. Xero is deploying agents to autonomously manage complex, multi-week workflows, such as identifying suppliers and gathering information for 1099 tax forms, enabling small businesses to automate tedious admin tasks. Databricks is using agentic workflows to monitor and retrieve real-time information, reason across massive datasets to diagnose issues, identify fixes and propose solutions for data scientists. Personal AI agents: built with 3.5 Flash 3.5 Flash is now the default model for the Gemini app and AI Mode in Search globally. At I/O today, we showed how its agentic capabilities are powering new features to bring frontier-level intelligence to your daily life. The new Gemini Spark, your personal AI agent, uses 3.5 Flash. It runs 24/7, helping you navigate your digital life, taking action on your behalf while under your direction. We\u2019re starting to roll out Gemini Spark to trusted testers today, and we\u2019re planning on bringing the Beta to Google AI Ultra subscribers in the US next week. Gemini Spark uses 3.5 Flash to help accomplish these tasks Gemini Spark uses 3.5 Flash to help accomplish these tasks Gemini Spark uses 3.5 Flash to help accomplish these tasks Gemini Spark uses 3.5 Flash to help accomplish these tasks Gemini Spark uses 3.5 Flash to help accomplish these tasks The enhanced agentic coding capabilities of 3.5 Flash are also delivering even more intelligent experiences across Search, from introducing new information agents that work for you 24/7 to unlocking more dynamic generative UI experiences. Learn more in our blog post . Search leverages 3.5 Flash to build an interactive visual explaining Gyroid patterns. Gemini 3.5: built with frontier safeguards Gemini 3.5 was developed in accordance with our Frontier Safety Framework. We have strengthened our cyber and CBRN safeguards, which means it's less likely to generate harmful content, and to mistakenly refuse to answer safe queries. We achieve this with new, more advanced safety training and mitigations, including interpretability tools that help check and understand the AI's inner reasoning before it provides a response. 3.5 Flash is available today Gemini 3.5 Flash is generally available via Google Antigravity, the Gemini API in Google AI Studio and Android Studio, Gemini Enterprise Agent Platform and Gemini Enterprise . It\u2019s also now available to everyone in the Gemini app and AI Mode in Search. On behalf of the entire Gemini team, we can\u2019t wait to see what you build. Get more stories from Google in your inbox. Get more stories from Google in your inbox. Email address Your information will be used in accordance with Google's privacy policy. Subscribe Done. Just one step more. Check your inbox to confirm your subscription. You are already subscribed to our newsletter. You can also subscribe with a different email address . POSTED IN: Gemini models AI Related stories AI Catch up on the Dialogues stage at Google I/O 2026. May 22, 2026 Global Network We\u2019re announcing new community investments in Missouri. May 20, 2026 AI 100 things we announced at I/O 2026 By Keyword Team May 20, 2026 Google Research A new experiment brings better group meetings to Google Beam By Mohamed Abdelgany May 20, 2026 Search How AI Mode is changing the way people search in the U.S. By Shivani Mohan May 19, 2026 Google Workspace New ways to create and get things done in Google Workspace By Yulie Kwon Kim May 19, 2026 . Jump to position 1 Jump to position 2 Jump to position 3 Jump to position 4 Jump to position 5 Jump to position 6 Let\u2019s stay in touch. Get the latest news from Google in your inbox. Subscribe No thanks Follow Us Privacy Terms About Google Google Products About the Keyword Help Global (English) Africa (English) Australia (English) Brasil (Portugu\u00eas) Canada (English) Canada (Fran\u00e7ais) \u010cesko (\u010ce\u0161tina) Deutschland (Deutsch) Espa\u00f1a (Espa\u00f1ol) France (Fran\u00e7ais) Greece (\u0395\u03bb\u03bb\u03b7\u03bd\u03b9\u03ba\u03ac) India (English) Indonesia (Bahasa Indonesia) Italia (Italiano) \u65e5\u672c (\u65e5\u672c\u8a9e) \ub300\ud55c\ubbfc\uad6d (\ud55c\uad6d\uc5b4) Latinoam\u00e9rica (Espa\u00f1ol) \u0627\u0644\u0634\u0631\u0642 \u0627\u0644\u0623\u0648\u0633\u0637 \u0648\u0634\u0645\u0627\u0644 \u0623\u0641\u0631\u064a\u0642\u064a\u0627 (\u0627\u0644\u0644\u063a\u0629 \u0627\u0644
