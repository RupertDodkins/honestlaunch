<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClaimLens Report</title>
  <style>
    :root {
      --ink: #1f2328;
      --muted: #667085;
      --line: #d0d7de;
      --bg: #f6f8fa;
      --panel: #ffffff;
      --cap: #b42318;
      --sus: #b54708;
      --nocap: #067647;
      --receipts: #344054;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    main {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr) 380px;
      min-height: calc(100vh - 74px);
    }
    aside, section { padding: 18px; border-right: 1px solid var(--line); }
    section:last-child { border-right: 0; }
    .claim-row {
      width: 100%;
      text-align: left;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .claim-row.active { border-color: var(--ink); box-shadow: 0 0 0 2px rgba(31,35,40,.08); }
    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 999px;
      margin-right: 6px;
      color: white;
      background: var(--receipts);
    }
    .badge.cap { background: var(--cap); }
    .badge.sus { background: var(--sus); }
    .badge.no-cap, .badge.mostly-no-cap { background: var(--nocap); }
    .muted { color: var(--muted); }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .score {
      height: 10px;
      background: #eaecf0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .score > div { height: 100%; background: var(--cap); }
    h2, h3 { margin: 0 0 10px; letter-spacing: 0; }
    pre {
      white-space: pre-wrap;
      background: #0d1117;
      color: #f0f6fc;
      padding: 12px;
      border-radius: 8px;
      max-height: 260px;
      overflow: auto;
    }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      aside, section { border-right: 0; border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>ClaimLens</h1>
      <div class="muted">Demo Paper: ClaimLens for Agentic Claim Audits</div>
    </div>
    <div class="muted">3 audited claims</div>
  </header>
  <main>
    <aside>
      <h2>Claim Ledger</h2>
      <div id="claim-list"></div>
    </aside>
    <section>
      <h2>Selected Claim</h2>
      <div id="claim-detail"></div>
    </section>
    <section>
      <h2>Evidence Stack</h2>
      <div id="evidence"></div>
      <h3>Raw JSON</h3>
      <pre id="raw"></pre>
    </section>
  </main>
  <script>
    const report = {
  "document": {
    "title": "Demo Paper: ClaimLens for Agentic Claim Audits",
    "source": "examples/demo_document.md",
    "text": "# Demo Paper: ClaimLens for Agentic Claim Audits\n\n## Abstract\n\nWe introduce ClaimLens, an agentic workflow that improves performance by 30% over prior work on real-world tasks. The system robustly generalizes across domains and is the first agentic workflow for scientific claim auditing.\n\n## Results\n\nWe compare ClaimLens against a baseline claim-review pipeline on Benchmark X. The baseline system achieves 84.1% on the benchmark. ClaimLens achieves 87.3% on the same benchmark.\n\n| System | Benchmark X accuracy |\n| --- | ---: |\n| Baseline | 84.1% |\n| ClaimLens | 87.3% |\n\n## Discussion\n\nThe benchmark contains curated technical claims from public documents. We did not evaluate prospective real-world deployment, clinical documents, legal documents, or private enterprise workflows. We did not run an external literature search for prior scientific fact-checking or claim-audit systems.\n\n"
  },
  "claims": [
    {
      "id": "c1",
      "claim": "Our method improves performance by 30% over prior work on real-world tasks.",
      "claim_type": "numeric",
      "source_location": "Abstract",
      "why_risky": "The claim combines a large numeric improvement with broad real-world language.",
      "audit_question": "Do the reported benchmark numbers justify a 30% improvement and real-world generalization?"
    },
    {
      "id": "c2",
      "claim": "The system robustly generalizes across domains.",
      "claim_type": "generalization",
      "source_location": "Conclusion",
      "why_risky": "Generalization language is stronger than typical benchmark evidence.",
      "audit_question": "Were multiple domains and out-of-distribution settings actually tested?"
    },
    {
      "id": "c3",
      "claim": "This is the first agentic workflow for scientific claim auditing.",
      "claim_type": "novelty",
      "source_location": "Introduction",
      "why_risky": "First/novelty claims require broad literature comparison.",
      "audit_question": "Does prior work include similar scientific fact-checking or claim-audit systems?"
    }
  ],
  "audits": [
    {
      "claim": {
        "id": "c1",
        "claim": "Our method improves performance by 30% over prior work on real-world tasks.",
        "claim_type": "numeric",
        "source_location": "Abstract",
        "why_risky": "The claim combines a large numeric improvement with broad real-world language.",
        "audit_question": "Do the reported benchmark numbers justify a 30% improvement and real-world generalization?"
      },
      "verdict": "overstated",
      "vibe": "cap",
      "confidence": "high",
      "cap_score": 88,
      "why": "The reported benchmark numbers show improvement, but the stated 30% improvement does not match the arithmetic and the evidence is a curated benchmark, not real-world tasks.",
      "weaker_supported_rewrite": "Our method improves performance from 84.1% to 87.3% on Benchmark X, a 3.2-point absolute gain and 3.8% relative improvement.",
      "supporting_evidence": [
        {
          "source_title": "Demo document benchmark table",
          "url": null,
          "date": null,
          "snippet": "Baseline: 84.1%. ClaimLens: 87.3%.",
          "relevance": "The table supports a 3.2-point absolute gain, not a 30% relative improvement."
        }
      ],
      "counter_evidence": [],
      "missing_context": [
        "No real-world deployment task is reported in the demo document."
      ],
      "numeric_findings": [
        "Absolute gain: 87.3 - 84.1 = 3.2 points.",
        "Relative gain: (3.2 / 84.1) * 100 = 3.8%."
      ]
    },
    {
      "claim": {
        "id": "c2",
        "claim": "The system robustly generalizes across domains.",
        "claim_type": "generalization",
        "source_location": "Conclusion",
        "why_risky": "Generalization language is stronger than typical benchmark evidence.",
        "audit_question": "Were multiple domains and out-of-distribution settings actually tested?"
      },
      "verdict": "missing_context",
      "vibe": "sus",
      "confidence": "medium",
      "cap_score": 64,
      "why": "The claim may be plausible, but the demo document does not provide enough scope or external evidence.",
      "weaker_supported_rewrite": "The document provides preliminary evidence for a narrower version of this claim.",
      "supporting_evidence": [],
      "counter_evidence": [],
      "missing_context": [
        "Additional external grounding would be needed for a production verdict."
      ],
      "numeric_findings": []
    },
    {
      "claim": {
        "id": "c3",
        "claim": "This is the first agentic workflow for scientific claim auditing.",
        "claim_type": "novelty",
        "source_location": "Introduction",
        "why_risky": "First/novelty claims require broad literature comparison.",
        "audit_question": "Does prior work include similar scientific fact-checking or claim-audit systems?"
      },
      "verdict": "missing_context",
      "vibe": "sus",
      "confidence": "medium",
      "cap_score": 64,
      "why": "The claim may be plausible, but the demo document does not provide enough scope or external evidence.",
      "weaker_supported_rewrite": "The document provides preliminary evidence for a narrower version of this claim.",
      "supporting_evidence": [],
      "counter_evidence": [],
      "missing_context": [
        "Additional external grounding would be needed for a production verdict."
      ],
      "numeric_findings": []
    }
  ]
};
    let selected = 0;
    const cls = (vibe) => vibe.replaceAll(' ', '-');
    function render() {
      const audits = report.audits;
      document.getElementById('claim-list').innerHTML = audits.map((audit, i) => `
        <button class="claim-row ${i === selected ? 'active' : ''}" onclick="selected=${i}; render();">
          <span class="badge ${cls(audit.vibe)}">${audit.vibe}</span>
          <span class="muted">${audit.claim.claim_type}</span>
          <div>${audit.claim.claim}</div>
        </button>
      `).join('');
      const audit = audits[selected];
      document.getElementById('claim-detail').innerHTML = `
        <div class="panel">
          <span class="badge ${cls(audit.vibe)}">${audit.vibe}</span>
          <strong>${audit.verdict}</strong>
          <div class="score"><div style="width: ${audit.cap_score}%"></div></div>
          <p class="muted">Cap Score: ${audit.cap_score} / 100 · Confidence: ${audit.confidence}</p>
        </div>
        <div class="panel"><h3>Original</h3><p>${audit.claim.claim}</p></div>
        <div class="panel"><h3>Defensible Rewrite</h3><p>${audit.weaker_supported_rewrite}</p></div>
        <div class="panel"><h3>Why</h3><p>${audit.why}</p></div>
        <div class="panel"><h3>Numeric Findings</h3><ul>${audit.numeric_findings.map(x => `<li>${x}</li>`).join('')}</ul></div>
      `;
      document.getElementById('evidence').innerHTML = `
        <div class="panel"><h3>Supporting</h3>${items(audit.supporting_evidence)}</div>
        <div class="panel"><h3>Counter</h3>${items(audit.counter_evidence)}</div>
        <div class="panel"><h3>Missing Context</h3><ul>${audit.missing_context.map(x => `<li>${x}</li>`).join('')}</ul></div>
      `;
      document.getElementById('raw').textContent = JSON.stringify(audit, null, 2);
    }
    function items(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return values.map(item => `<p><strong>${item.source_title}</strong><br>${item.snippet}<br><span class="muted">${item.url || ''}</span></p>`).join('');
    }
    render();
  </script>
</body>
</html>
