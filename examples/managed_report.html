<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CappinCheck Report</title>
  <style>
    :root {
      --ink: #1f2328;
      --muted: #667085;
      --line: #d0d7de;
      --bg: #f6f8fa;
      --panel: #ffffff;
      --cap: #b42318;
      --sus: #b54708;
      --nocap: #067647;
      --receipts: #344054;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    main {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr) 380px;
      min-height: calc(100vh - 74px);
    }
    aside, section { padding: 18px; border-right: 1px solid var(--line); }
    section:last-child { border-right: 0; }
    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0;
    }
    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--panel);
      color: var(--ink);
    }
    .claim-row {
      width: 100%;
      text-align: left;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      overflow-wrap: anywhere;
    }
    .claim-row.active { border-color: var(--ink); box-shadow: 0 0 0 2px rgba(31,35,40,.08); }
    .claim-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 999px;
      margin-right: 6px;
      color: white;
      background: var(--receipts);
    }
    .badge.cap { background: var(--cap); }
    .badge.sus { background: var(--sus); }
    .badge.no-cap, .badge.mostly-no-cap { background: var(--nocap); }
    .badge.needs-receipts { background: var(--receipts); }
    .muted { color: var(--muted); }
    .wrap {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
      overflow-wrap: anywhere;
    }
    .score {
      height: 10px;
      background: #eaecf0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .score > div { height: 100%; background: var(--cap); }
    .strength-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .strength-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--bg);
    }
    .strength-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }
    .meter {
      height: 8px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .meter > div { height: 100%; background: var(--receipts); }
    .meter.cap > div { background: var(--cap); }
    .meter.sus > div { background: var(--sus); }
    .meter.no-cap > div, .meter.mostly-no-cap > div { background: var(--nocap); }
    a {
      color: var(--receipts);
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .source-item {
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .source-item:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }
    h2, h3 { margin: 0 0 10px; letter-spacing: 0; }
    pre {
      white-space: pre-wrap;
      background: #0d1117;
      color: #f0f6fc;
      padding: 12px;
      border-radius: 8px;
      max-height: 260px;
      overflow: auto;
    }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      aside, section { border-right: 0; border-bottom: 1px solid var(--line); }
      .strength-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>CappinCheck</h1>
      <div class="muted">Demo Paper: CappinCheck for Agentic Claim Audits</div>
    </div>
    <div class="muted">1 audited claims</div>
  </header>
  <main>
    <aside>
      <h2>Claim Ledger</h2>
      <div class="filters">
        <label>Vibe
          <select id="vibe-filter" onchange="filters.vibe=this.value; syncSelection(); render();"></select>
        </label>
        <label>Verdict
          <select id="verdict-filter" onchange="filters.verdict=this.value; syncSelection(); render();"></select>
        </label>
      </div>
      <p class="muted" id="filter-summary"></p>
      <div id="claim-list"></div>
    </aside>
    <section>
      <h2>Selected Claim</h2>
      <div id="claim-detail"></div>
    </section>
    <section>
      <h2>Evidence Stack</h2>
      <div id="evidence"></div>
      <h3>Raw JSON</h3>
      <pre id="raw"></pre>
    </section>
  </main>
  <script>
    const report = {
  "document": {
    "title": "Demo Paper: CappinCheck for Agentic Claim Audits",
    "source": "examples/demo_document.md",
    "text": "# Demo Paper: CappinCheck for Agentic Claim Audits\n\n## Abstract\n\nWe introduce CappinCheck, an agentic workflow that improves performance by 30% over prior work on real-world tasks. The system robustly generalizes across domains and is the first agentic workflow for scientific claim auditing.\n\n## Results\n\nWe compare CappinCheck against a baseline claim-review pipeline on Benchmark X. The baseline system achieves 84.1% on the benchmark. CappinCheck achieves 87.3% on the same benchmark.\n\n| System | Benchmark X accuracy |\n| --- | ---: |\n| Baseline | 84.1% |\n| CappinCheck | 87.3% |\n\n## Discussion\n\nThe benchmark contains curated technical claims from public documents. We did not evaluate prospective real-world deployment, clinical documents, legal documents, or private enterprise workflows. We did not run an external literature search for prior scientific fact-checking or claim-audit systems.\n"
  },
  "claims": [
    {
      "id": "claim_1",
      "claim": "improves performance by 30% over prior work",
      "claim_type": "numeric",
      "source_location": "Abstract",
      "why_risky": "The results section shows an absolute improvement of only 3.2% (84.1% to 87.3%), which does not mathematically align with a 30% improvement claim under standard interpretations.",
      "audit_question": "What mathematical formulation or baseline comparison is used to justify the 30% improvement claim, and how is this reconciled with the 84.1% vs 87.3% results?"
    },
    {
      "id": "claim_2",
      "claim": "on real-world tasks",
      "claim_type": "generalization",
      "source_location": "Abstract",
      "why_risky": "The discussion explicitly admits that the authors did not evaluate prospective real-world deployment, clinical documents, legal documents, or private enterprise workflows.",
      "audit_question": "What specific real-world tasks were evaluated to justify this claim, given that the evaluation was restricted to Benchmark X?"
    },
    {
      "id": "claim_3",
      "claim": "The system robustly generalizes across domains",
      "claim_type": "generalization",
      "source_location": "Abstract",
      "why_risky": "The evaluation was limited to Benchmark X, which only contains curated public technical claims, meaning generalization to other critical domains (like clinical or legal) has not been tested.",
      "audit_question": "What empirical evidence or cross-domain evaluations are available to support the claim of robust generalization across domains?"
    },
    {
      "id": "claim_4",
      "claim": "is the first agentic workflow for scientific claim auditing",
      "claim_type": "novelty",
      "source_location": "Abstract",
      "why_risky": "The authors state in the discussion that they did not run an external literature search for prior scientific fact-checking or claim-audit systems, making the novelty claim unsubstantiated.",
      "audit_question": "Have the authors conducted a systematic literature review to ensure that no other agentic workflows have been proposed for scientific claim auditing?"
    },
    {
      "id": "claim_5",
      "claim": "We compare CappinCheck against a baseline claim-review pipeline on Benchmark X.",
      "claim_type": "benchmark",
      "source_location": "Results",
      "why_risky": "The baseline is not described, making it impossible to know if it is a weak strawman or a competitive, state-of-the-art pipeline.",
      "audit_question": "What is the exact architecture, configuration, and implementation of the baseline claim-review pipeline used in this evaluation?"
    },
    {
      "id": "claim_6",
      "claim": "The baseline system achieves 84.1% on the benchmark.",
      "claim_type": "numeric",
      "source_location": "Results",
      "why_risky": "If the baseline pipeline was under-optimized, the comparison is biased in favor of the new system.",
      "audit_question": "Was the baseline system fully optimized and evaluated under identical conditions to ensure a fair comparison?"
    },
    {
      "id": "claim_7",
      "claim": "CappinCheck achieves 87.3% on the same benchmark.",
      "claim_type": "benchmark",
      "source_location": "Results",
      "why_risky": "Without details on statistical significance, standard deviation, or the nature of the test split, the 87.3% accuracy could be due to noise or overfitting.",
      "audit_question": "What are the confidence intervals and statistical significance levels for CappinCheck's performance on Benchmark X?"
    },
    {
      "id": "claim_8",
      "claim": "The benchmark contains curated technical claims from public documents.",
      "claim_type": "other",
      "source_location": "Discussion",
      "why_risky": "Curated benchmarks from public documents may suffer from selection bias, contamination, or lack of representative complexity compared to organic datasets.",
      "audit_question": "What methodology and selection criteria were used to curate the technical claims in Benchmark X, and how do they represent the broader population of scientific claims?"
    }
  ],
  "audits": [
    {
      "claim": {
        "id": "claim_1",
        "claim": "improves performance by 30% over prior work",
        "claim_type": "numeric",
        "source_location": "",
        "why_risky": "The claim inflates the performance improvement percentage, which can mislead users about the tool's relative effectiveness compared to baseline methods.",
        "audit_question": "Does the system improve performance by 30% over prior work?"
      },
      "verdict": "overstated",
      "vibe": "cap",
      "confidence": "high",
      "cap_score": 87,
      "why": "The claim of a 30% performance improvement is mathematically irreconcilable with the actual results presented in the paper. The baseline system achieves 84.1% accuracy and CappinCheck achieves 87.3% accuracy on Benchmark X. This represents a 3.2 percentage point absolute increase, a ~3.8% relative accuracy improvement, or a ~20.1% relative reduction in the error rate. No standard mathematical formulation supports the 30% figure.",
      "weaker_supported_rewrite": "CappinCheck improves from 84.1% to 87.3% versus Baseline, a 3.2-point absolute gain and 3.8% relative improvement.",
      "supporting_evidence": [],
      "counter_evidence": [
        {
          "source_title": "Demo Paper: CappinCheck for Agentic Claim Audits",
          "url": "examples/demo_document.md",
          "date": null,
          "snippet": "We compare CappinCheck against a baseline claim-review pipeline on Benchmark X. The baseline system achieves 84.1% on the benchmark. CappinCheck achieves 87.3% on the same benchmark.",
          "relevance": "Provides the actual benchmark results (84.1% baseline vs 87.3% CappinCheck) which mathematically contradict the 30% improvement claim."
        }
      ],
      "missing_context": [
        "There is no mathematical explanation, alternative metric definition, or prior baseline in the text that justifies how the 30% improvement figure was calculated."
      ],
      "numeric_findings": [
        "Baseline system accuracy: 84.1%",
        "CappinCheck accuracy: 87.3%",
        "Absolute accuracy improvement: 3.2 percentage points (87.3% - 84.1%)",
        "Relative accuracy improvement: ~3.8% ((87.3 - 84.1) / 84.1)",
        "Relative error rate reduction: ~20.1% ((15.9 - 12.7) / 15.9)",
        "Detected benchmark rows: Baseline = 84.1%, CappinCheck = 87.3%.",
        "Absolute gain: 87.3 - 84.1 = 3.2 percentage points.",
        "Relative gain: (3.2 / 84.1) * 100 = 3.8%.",
        "Claimed improvement is 30.0%; computed relative improvement is 3.8% (difference 26.2 points)."
      ]
    }
  ]
};
    let selected = 0;
    const filters = { vibe: 'all', verdict: 'all' };
    const cls = (vibe) => String(vibe).replaceAll(' ', '-');
    const confidenceScore = { low: 34, medium: 67, high: 100 };
    const esc = (value) => String(value ?? '').replace(/[&<>"']/g, char => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[char]));
    const safeHref = (value) => {
      if (!value) return '';
      try {
        const url = new URL(String(value), document.baseURI);
        if (['http:', 'https:', 'mailto:'].includes(url.protocol)) return url.href;
      } catch (_) {}
      return '';
    };
    const filteredAudits = () => report.audits
      .map((audit, index) => ({ ...audit, __index: index }))
      .filter(audit => filters.vibe === 'all' || audit.vibe === filters.vibe)
      .filter(audit => filters.verdict === 'all' || audit.verdict === filters.verdict);
    function setupFilters() {
      fillSelect('vibe-filter', 'All vibes', [...new Set(report.audits.map(audit => audit.vibe))]);
      fillSelect('verdict-filter', 'All verdicts', [...new Set(report.audits.map(audit => audit.verdict))]);
    }
    function fillSelect(id, allLabel, values) {
      document.getElementById(id).innerHTML = [
        `<option value="all">${allLabel}</option>`,
        ...values.map(value => `<option value="${esc(value)}">${esc(value)}</option>`)
      ].join('');
    }
    function syncSelection() {
      const audits = filteredAudits();
      if (!audits.some(audit => audit.__index === selected)) selected = audits[0]?.__index ?? 0;
    }
    function render() {
      const audits = filteredAudits();
      document.getElementById('filter-summary').textContent = `${audits.length} of ${report.audits.length} claims shown`;
      document.getElementById('claim-list').innerHTML = audits.map((audit, i) => `
        <button class="claim-row ${audit.__index === selected ? 'active' : ''}" onclick="selected=${audit.__index}; render();">
          <div class="claim-meta">
            <span class="badge ${cls(audit.vibe)}">${esc(audit.vibe)}</span>
            <span class="muted">${esc(audit.verdict)} · ${esc(audit.claim.claim_type)}</span>
          </div>
          <div class="wrap">${esc(audit.claim.claim)}</div>
          <div class="meter ${cls(audit.vibe)}" title="Cap score ${audit.cap_score} / 100"><div style="width: ${audit.cap_score}%"></div></div>
        </button>
      `).join('');
      if (!audits.length) {
        document.getElementById('claim-detail').innerHTML = '<div class="panel"><p class="muted">No claims match the selected filters.</p></div>';
        document.getElementById('evidence').innerHTML = '';
        document.getElementById('raw').textContent = '';
        return;
      }
      const audit = audits.find(item => item.__index === selected) ?? audits[0];
      const evidenceCount = audit.supporting_evidence.length + audit.counter_evidence.length;
      const evidenceScore = Math.min(100, evidenceCount * 25);
      const confidence = confidenceScore[audit.confidence] ?? 0;
      document.getElementById('claim-detail').innerHTML = `
        <div class="panel">
          <span class="badge ${cls(audit.vibe)}">${esc(audit.vibe)}</span>
          <strong>${esc(audit.verdict)}</strong>
          <div class="score"><div style="width: ${audit.cap_score}%"></div></div>
          <p class="muted">Cap Score: ${audit.cap_score} / 100 · Confidence: ${esc(audit.confidence)} · Evidence items: ${evidenceCount}</p>
          <div class="strength-grid">
            ${strengthCard('Cap pressure', audit.cap_score, audit.vibe, `${audit.cap_score}/100`)}
            ${strengthCard('Confidence', confidence, audit.vibe, esc(audit.confidence))}
            ${strengthCard('Evidence depth', evidenceScore, audit.vibe, `${evidenceCount} item${evidenceCount === 1 ? '' : 's'}`)}
          </div>
        </div>
        <div class="panel"><h3>Original</h3><p class="wrap">${esc(audit.claim.claim)}</p></div>
        <div class="panel"><h3>Defensible Rewrite</h3><p class="wrap">${esc(audit.weaker_supported_rewrite)}</p></div>
        <div class="panel"><h3>Why</h3><p class="wrap">${esc(audit.why)}</p></div>
        <div class="panel"><h3>Numeric Findings</h3>${list(audit.numeric_findings)}</div>
      `;
      document.getElementById('evidence').innerHTML = `
        <div class="panel"><h3>Supporting</h3>${items(audit.supporting_evidence)}</div>
        <div class="panel"><h3>Counter</h3>${items(audit.counter_evidence)}</div>
        <div class="panel"><h3>Missing Context</h3>${list(audit.missing_context)}</div>
      `;
      document.getElementById('raw').textContent = JSON.stringify(audit, null, 2);
    }
    function strengthCard(label, value, vibe, display) {
      return `
        <div class="strength-card">
          <div class="strength-label"><span>${label}</span><span>${display}</span></div>
          <div class="meter ${cls(vibe)}"><div style="width: ${value}%"></div></div>
        </div>
      `;
    }
    function list(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return `<ul>${values.map(value => `<li class="wrap">${esc(value)}</li>`).join('')}</ul>`;
    }
    function items(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return values.map(item => {
        const href = safeHref(item.url);
        const source = href
          ? `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(item.url)}</a>`
          : `<span class="muted">${esc(item.url || 'No URL recorded')}</span>`;
        return `
          <div class="source-item">
            <p><strong>${esc(item.source_title)}</strong></p>
            <p class="wrap">${esc(item.snippet)}</p>
            <p class="wrap">${source}</p>
            <p class="muted wrap">${esc(item.relevance || '')}</p>
          </div>
        `;
      }).join('');
    }
    setupFilters();
    render();
  </script>
</body>
</html>
