<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CappinCheck Demo Gallery</title>
  <style>
    :root {
      --ink: #1f2328;
      --muted: #667085;
      --line: #d0d7de;
      --bg: #f6f8fa;
      --panel: #ffffff;
      --overstated: #b42318;
      --context: #b54708;
      --supported: #067647;
      --receipts: #344054;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }
    p {
      margin: 6px 0 0;
      color: var(--muted);
    }
    .tabs {
      display: flex;
      gap: 8px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      overflow-x: auto;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 9px 12px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }
    button.active {
      border-color: var(--ink);
      box-shadow: 0 0 0 2px rgba(31,35,40,.08);
    }
    .badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 7px;
      border-radius: 999px;
      color: white;
      font-size: 12px;
      background: var(--receipts);
    }
    .overstated { background: var(--overstated); }
    .context { background: var(--context); }
    .supported { background: var(--supported); }
    .layout {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: calc(100vh - 122px);
    }
    .summary {
      padding: 14px 22px;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
    }
    iframe {
      width: 100%;
      min-height: 900px;
      border: 0;
      background: var(--panel);
    }
    code {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 2px 5px;
    }
    @media (max-width: 760px) {
      header {
        display: block;
      }
      iframe {
        min-height: 1100px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>CappinCheck Demo Gallery</h1>
      <p>Pre-generated static reports: real AI model launch docs plus one careful supported control.</p>
    </div>
    <p><code>Document -> Claims -> Audit Report</code></p>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main class="layout">
    <section class="summary" id="summary"></section>
    <iframe id="frame" title="Selected CappinCheck report"></iframe>
  </main>
  <script>
    const examples = [
      {
        label: 'Google Gemini 3.5 Flash',
        badge: 'mixed',
        href: 'gemini_35_flash_report.html',
        summary: 'Live Gemini run on Google’s Gemini 3.5 announcement, contrasted against the official DeepMind model card. Best headline artifact for showing real public input.',
        command: 'cappincheck audit https://blog.google/innovation-and-ai/models-and-research/gemini-models/gemini-3-5/ --contrast --reference https://deepmind.google/models/model-cards/gemini-3-5-flash --contrast-top 2 --limit 4 --out examples/gemini_35_flash_report.md --json examples/gemini_35_flash_report.json --html examples/gemini_35_flash_report.html'
      },
      {
        label: 'Anthropic Sonnet 4.5',
        badge: 'overstated',
        href: 'anthropic_sonnet_45_report.html',
        summary: 'Live Gemini run on Anthropic’s Claude Sonnet 4.5 launch page. Shows a broad “best coding model” claim being narrowed against provided Anthropic references and Gemini-discovered evidence.',
        command: 'cappincheck audit https://www.anthropic.com/news/claude-sonnet-4-5 --contrast --reference https://www.anthropic.com/claude-sonnet-4-5-system-card --reference https://www.anthropic.com/news/announcing-our-updated-responsible-scaling-policy --contrast-top 1 --limit 1 --out examples/anthropic_sonnet_45_report.md --json examples/anthropic_sonnet_45_report.json --html examples/anthropic_sonnet_45_report.html'
      },
      {
        label: 'xAI Grok 3 Proxy',
        badge: 'missing_context',
        href: 'xai_grok3_report.html',
        summary: 'Live Gemini run on a local source proxy for the xAI Grok 3 launch page, because the official xAI page is Cloudflare-blocked to the CLI fetcher. Official xAI, leaderboard, LiveCodeBench, and Stanford transparency URLs are preserved as references.',
        command: 'cappincheck audit examples/xai_grok3_launch_input.md --contrast --reference https://x.ai/news/grok-3 --reference https://lmarena.ai/?leaderboard= --reference https://livecodebench.github.io/ --reference https://crfm.stanford.edu/fmti/December-2025/company-reports/xAI_FinalReport_FMTI2025.html --contrast-top 1 --limit 1 --out examples/xai_grok3_report.md --json examples/xai_grok3_report.json --html examples/xai_grok3_report.html'
      },
      {
        label: 'Careful Scientific Claim',
        badge: 'supported',
        href: 'careful_report.html',
        summary: 'Shows the non-cynical state: a scoped document with correct percentage-point wording and explicit limitations remains supported.',
        command: 'cappincheck audit examples/careful_document.md --mock --profile --out examples/careful_report.md --json examples/careful_report.json --html examples/careful_report.html'
      }
    ];
    let selected = 0;
    const tabs = document.getElementById('tabs');
    const frame = document.getElementById('frame');
    const summary = document.getElementById('summary');
    function cls(value) {
      if (value === 'supported') return 'supported';
      if (value === 'overstated') return 'overstated';
      if (value === 'context' || value === 'mixed' || value === 'missing_context') return 'context';
      return '';
    }
    function render() {
      tabs.innerHTML = examples.map((item, index) => `
        <button class="${index === selected ? 'active' : ''}" onclick="selected=${index}; render();">
          ${item.label}<span class="badge ${cls(item.badge)}">${item.badge}</span>
        </button>
      `).join('');
      const item = examples[selected];
      summary.innerHTML = `
        <strong>${item.label}</strong>
        <p>${item.summary}</p>
        ${item.command ? `<p>Command: <code>${item.command}</code></p>` : ''}
      `;
      frame.src = item.href;
    }
    render();
  </script>
</body>
</html>
