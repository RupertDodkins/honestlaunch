<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CappinCheck Report</title>
  <style>
    :root {
      --ink: #1f2328;
      --muted: #667085;
      --line: #d0d7de;
      --bg: #f6f8fa;
      --panel: #ffffff;
      --cap: #b42318;
      --sus: #b54708;
      --nocap: #067647;
      --receipts: #344054;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    main {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr) 380px;
      min-height: calc(100vh - 74px);
    }
    aside, section { padding: 18px; border-right: 1px solid var(--line); }
    section:last-child { border-right: 0; }
    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0;
    }
    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--panel);
      color: var(--ink);
    }
    .claim-row {
      width: 100%;
      text-align: left;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      overflow-wrap: anywhere;
    }
    .claim-row.active { border-color: var(--ink); box-shadow: 0 0 0 2px rgba(31,35,40,.08); }
    .claim-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 999px;
      margin-right: 6px;
      color: white;
      background: var(--receipts);
    }
    .badge.cap { background: var(--cap); }
    .badge.sus { background: var(--sus); }
    .badge.no-cap, .badge.mostly-no-cap { background: var(--nocap); }
    .badge.needs-receipts { background: var(--receipts); }
    .hint {
      display: inline-grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      cursor: help;
      position: relative;
      background: var(--panel);
      vertical-align: middle;
    }
    .hint:focus {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }
    .hint::after {
      content: attr(data-tip);
      display: none;
      position: absolute;
      z-index: 10;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      width: min(280px, 72vw);
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--ink);
      color: #ffffff;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.35;
      box-shadow: 0 8px 24px rgba(31,35,40,.18);
    }
    .hint:hover::after,
    .hint:focus::after {
      display: block;
    }
    .muted { color: var(--muted); }
    .wrap {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
      overflow-wrap: anywhere;
    }
    .score {
      height: 10px;
      background: #eaecf0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .score > div { height: 100%; background: var(--cap); }
    .strength-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .strength-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--bg);
    }
    .strength-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }
    .meter {
      height: 8px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .meter > div { height: 100%; background: var(--receipts); }
    .meter.cap > div { background: var(--cap); }
    .meter.sus > div { background: var(--sus); }
    .meter.no-cap > div, .meter.mostly-no-cap > div { background: var(--nocap); }
    a {
      color: var(--receipts);
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .source-item {
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .source-item:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }
    h2, h3 { margin: 0 0 10px; letter-spacing: 0; }
    .title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    pre {
      white-space: pre-wrap;
      background: #0d1117;
      color: #f0f6fc;
      padding: 12px;
      border-radius: 8px;
      max-height: 260px;
      overflow: auto;
    }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      aside, section { border-right: 0; border-bottom: 1px solid var(--line); }
      .strength-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>CappinCheck</h1>
      <div class="muted">Needs Receipts Demo</div>
    </div>
    <div class="muted">3 audited claims</div>
  </header>
  <main>
    <aside>
      <div class="title-row">
        <h2>Claim Ledger</h2>
        <span class="hint" tabindex="0" data-tip="Each row is a risky factual claim extracted from the document. Click one to inspect the audit.">?</span>
      </div>
      <div class="filters">
        <label>Vibe
          <span class="hint" tabindex="0" data-tip="Memorable verdict: no cap means supported; sus means missing context; cap means overstated or contradicted; needs receipts means not checkable.">?</span>
          <select id="vibe-filter" onchange="filters.vibe=this.value; syncSelection(); render();"></select>
        </label>
        <label>Verdict
          <span class="hint" tabindex="0" data-tip="Formal verdict used in JSON/Markdown: supported, overstated, missing context, contradicted, or not checkable.">?</span>
          <select id="verdict-filter" onchange="filters.verdict=this.value; syncSelection(); render();"></select>
        </label>
      </div>
      <p class="muted" id="filter-summary"></p>
      <div id="claim-list"></div>
    </aside>
    <section>
      <div class="title-row">
        <h2>Selected Claim</h2>
        <span class="hint" tabindex="0" data-tip="This panel shows the selected claim, CappinCheck verdict, and strongest defensible rewrite.">?</span>
      </div>
      <div id="claim-detail"></div>
    </section>
    <section>
      <div class="title-row">
        <h2>Evidence Stack</h2>
        <span class="hint" tabindex="0" data-tip="Evidence is split into support, counter-evidence, and missing context so the verdict can be inspected.">?</span>
      </div>
      <div id="evidence"></div>
      <h3>Raw JSON</h3>
      <pre id="raw"></pre>
    </section>
  </main>
  <script>
    const report = {
  "document": {
    "title": "Needs Receipts Demo",
    "source": "examples/needs_receipts_document.md",
    "text": "# Needs Receipts Demo\n\n## Abstract\n\nUsers strongly prefer CappinCheck over existing review tools. CappinCheck is the first tool to audit scientific claims with agents.\n\n## Deployment\n\nCappinCheck is safe for production use in regulated environments.\n\n## Evidence\n\nThis short document intentionally does not include a user study, benchmark, safety evaluation, production deployment study, prior-work comparison, or external validation.\n\n"
  },
  "claims": [
    {
      "id": "receipts_1",
      "claim": "Users strongly prefer CappinCheck over existing review tools.",
      "claim_type": "other",
      "source_location": "Abstract",
      "why_risky": "Preference claims need user study data or survey evidence.",
      "audit_question": "Does the document report a user study, sample size, or preference measurement?"
    },
    {
      "id": "receipts_2",
      "claim": "CappinCheck is safe for production use in regulated environments.",
      "claim_type": "safety",
      "source_location": "Deployment",
      "why_risky": "Safety and regulated-production claims require concrete validation and scope.",
      "audit_question": "Does the document provide safety evaluation, threat model, or deployment evidence?"
    },
    {
      "id": "receipts_3",
      "claim": "CappinCheck is the first tool to audit scientific claims with agents.",
      "claim_type": "novelty",
      "source_location": "Introduction",
      "why_risky": "First/novelty claims require prior-work search.",
      "audit_question": "Does the document provide a literature or product comparison supporting the firstness claim?"
    }
  ],
  "audits": [
    {
      "claim": {
        "id": "receipts_1",
        "claim": "Users strongly prefer CappinCheck over existing review tools.",
        "claim_type": "other",
        "source_location": "Abstract",
        "why_risky": "Preference claims need user study data or survey evidence.",
        "audit_question": "Does the document report a user study, sample size, or preference measurement?"
      },
      "verdict": "not_checkable",
      "vibe": "needs receipts",
      "confidence": "medium",
      "cap_score": 58,
      "why": "The claim may be true, but the document does not provide the evidence needed to audit it.",
      "weaker_supported_rewrite": "The document presents this as an aspiration or positioning claim, not an evidenced result.",
      "supporting_evidence": [],
      "counter_evidence": [],
      "missing_context": [
        "No measurement method is reported.",
        "No sample size, benchmark, user study, or external validation is attached to the claim."
      ],
      "numeric_findings": []
    },
    {
      "claim": {
        "id": "receipts_2",
        "claim": "CappinCheck is safe for production use in regulated environments.",
        "claim_type": "safety",
        "source_location": "Deployment",
        "why_risky": "Safety and regulated-production claims require concrete validation and scope.",
        "audit_question": "Does the document provide safety evaluation, threat model, or deployment evidence?"
      },
      "verdict": "not_checkable",
      "vibe": "needs receipts",
      "confidence": "medium",
      "cap_score": 72,
      "why": "The claim may be true, but the document does not provide the evidence needed to audit it.",
      "weaker_supported_rewrite": "The document presents this as an aspiration or positioning claim, not an evidenced result.",
      "supporting_evidence": [],
      "counter_evidence": [],
      "missing_context": [
        "No measurement method is reported.",
        "No sample size, benchmark, user study, or external validation is attached to the claim."
      ],
      "numeric_findings": []
    },
    {
      "claim": {
        "id": "receipts_3",
        "claim": "CappinCheck is the first tool to audit scientific claims with agents.",
        "claim_type": "novelty",
        "source_location": "Introduction",
        "why_risky": "First/novelty claims require prior-work search.",
        "audit_question": "Does the document provide a literature or product comparison supporting the firstness claim?"
      },
      "verdict": "not_checkable",
      "vibe": "needs receipts",
      "confidence": "medium",
      "cap_score": 58,
      "why": "The claim may be true, but the document does not provide the evidence needed to audit it.",
      "weaker_supported_rewrite": "The document presents this as an aspiration or positioning claim, not an evidenced result.",
      "supporting_evidence": [],
      "counter_evidence": [],
      "missing_context": [
        "No measurement method is reported.",
        "No sample size, benchmark, user study, or external validation is attached to the claim."
      ],
      "numeric_findings": []
    }
  ]
};
    let selected = 0;
    const filters = { vibe: 'all', verdict: 'all' };
    const cls = (vibe) => String(vibe).replaceAll(' ', '-');
    const confidenceScore = { low: 34, medium: 67, high: 100 };
    const esc = (value) => String(value ?? '').replace(/[&<>"']/g, char => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[char]));
    const safeHref = (value) => {
      if (!value) return '';
      try {
        const url = new URL(String(value), document.baseURI);
        if (['http:', 'https:', 'mailto:'].includes(url.protocol)) return url.href;
      } catch (_) {}
      return '';
    };
    const hint = (text) => `<span class="hint" tabindex="0" data-tip="${esc(text)}">?</span>`;
    const filteredAudits = () => report.audits
      .map((audit, index) => ({ ...audit, __index: index }))
      .filter(audit => filters.vibe === 'all' || audit.vibe === filters.vibe)
      .filter(audit => filters.verdict === 'all' || audit.verdict === filters.verdict);
    function setupFilters() {
      fillSelect('vibe-filter', 'All vibes', [...new Set(report.audits.map(audit => audit.vibe))]);
      fillSelect('verdict-filter', 'All verdicts', [...new Set(report.audits.map(audit => audit.verdict))]);
    }
    function fillSelect(id, allLabel, values) {
      document.getElementById(id).innerHTML = [
        `<option value="all">${allLabel}</option>`,
        ...values.map(value => `<option value="${esc(value)}">${esc(value)}</option>`)
      ].join('');
    }
    function syncSelection() {
      const audits = filteredAudits();
      if (!audits.some(audit => audit.__index === selected)) selected = audits[0]?.__index ?? 0;
    }
    function render() {
      const audits = filteredAudits();
      document.getElementById('filter-summary').textContent = `${audits.length} of ${report.audits.length} claims shown`;
      document.getElementById('claim-list').innerHTML = audits.map((audit, i) => `
        <button class="claim-row ${audit.__index === selected ? 'active' : ''}" onclick="selected=${audit.__index}; render();">
          <div class="claim-meta">
            <span class="badge ${cls(audit.vibe)}">${esc(audit.vibe)}</span>
            <span class="muted">${esc(audit.verdict)} · ${esc(audit.claim.claim_type)}</span>
          </div>
          <div class="wrap">${esc(audit.claim.claim)}</div>
          <div class="meter ${cls(audit.vibe)}" title="Cap score ${audit.cap_score} / 100"><div style="width: ${audit.cap_score}%"></div></div>
        </button>
      `).join('');
      if (!audits.length) {
        document.getElementById('claim-detail').innerHTML = '<div class="panel"><p class="muted">No claims match the selected filters.</p></div>';
        document.getElementById('evidence').innerHTML = '';
        document.getElementById('raw').textContent = '';
        return;
      }
      const audit = audits.find(item => item.__index === selected) ?? audits[0];
      const evidenceCount = audit.supporting_evidence.length + audit.counter_evidence.length;
      const evidenceScore = Math.min(100, evidenceCount * 25);
      const confidence = confidenceScore[audit.confidence] ?? 0;
      document.getElementById('claim-detail').innerHTML = `
        <div class="panel">
          <span class="badge ${cls(audit.vibe)}">${esc(audit.vibe)}</span>
          <strong>Formal verdict: ${esc(audit.verdict)}</strong>
          ${hint(vibeTip(audit.vibe))}
          <div class="score"><div style="width: ${audit.cap_score}%"></div></div>
          <p class="muted">
            Confidence: ${esc(audit.confidence)} ${hint('Confidence reflects how strongly the available evidence supports this verdict, not whether the original claim is true.')}
            · Cap Score: ${audit.cap_score} / 100 ${hint('Higher means the original wording stretches further beyond what the evidence supports.')}
            · Evidence items: ${evidenceCount} ${hint('Evidence items are supporting or counter-evidence records attached to this claim.')}
          </p>
          <div class="strength-grid">
            ${strengthCard('Cap pressure', audit.cap_score, audit.vibe, `${audit.cap_score}/100`, 'How much the wording outruns the evidence.')}
            ${strengthCard('Confidence', confidence, audit.vibe, esc(audit.confidence), 'How confident CappinCheck is in this verdict from available evidence.')}
            ${strengthCard('Evidence depth', evidenceScore, audit.vibe, `${evidenceCount} item${evidenceCount === 1 ? '' : 's'}`, 'How much direct evidence is attached to this claim audit.')}
          </div>
        </div>
        <div class="panel"><h3>Original</h3><p class="wrap">${esc(audit.claim.claim)}</p></div>
        <div class="panel"><h3>Defensible Rewrite</h3><p class="wrap">${esc(audit.weaker_supported_rewrite)}</p></div>
        <div class="panel"><h3>Why</h3><p class="wrap">${esc(audit.why)}</p></div>
        <div class="panel"><h3>Numeric Findings</h3>${list(audit.numeric_findings)}</div>
      `;
      document.getElementById('evidence').innerHTML = `
        <div class="panel"><h3>Supporting Evidence Found</h3>${items(audit.supporting_evidence)}</div>
        <div class="panel"><h3>Contradictions / Narrowing Evidence</h3>${items(audit.counter_evidence)}</div>
        <div class="panel"><h3>Missing Context</h3>${list(audit.missing_context)}</div>
      `;
      document.getElementById('raw').textContent = JSON.stringify(audit, null, 2);
    }
    function strengthCard(label, value, vibe, display, tip) {
      return `
        <div class="strength-card">
          <div class="strength-label"><span>${label} ${hint(tip)}</span><span>${display}</span></div>
          <div class="meter ${cls(vibe)}"><div style="width: ${value}%"></div></div>
        </div>
      `;
    }
    function vibeTip(vibe) {
      return {
        'no cap': 'The claim appears supported as written.',
        'mostly no cap': 'The claim is basically supported, with small caveats.',
        'sus': 'The claim may be plausible, but important context or scope limits are missing.',
        'cap': 'The claim is materially overstated, contradicted, or numerically stretched.',
        'needs receipts': 'The claim cannot be checked from available evidence.'
      }[vibe] || 'Audit verdict label.';
    }
    function list(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return `<ul>${values.map(value => `<li class="wrap">${esc(value)}</li>`).join('')}</ul>`;
    }
    function items(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return values.map(item => {
        const href = safeHref(item.url);
        const source = href
          ? `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(item.url)}</a>`
          : `<span class="muted">${esc(item.url || 'No URL recorded')}</span>`;
        return `
          <div class="source-item">
            <p><strong>${esc(item.source_title)}</strong></p>
            <p class="wrap">${esc(item.snippet)}</p>
            <p class="wrap">${source}</p>
            <p class="muted wrap">${esc(item.relevance || '')}</p>
          </div>
        `;
      }).join('');
    }
    setupFilters();
    render();
  </script>
</body>
</html>
