<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CappinCheck Report</title>
  <style>
    :root {
      --ink: #1f2328;
      --muted: #667085;
      --line: #d0d7de;
      --bg: #f6f8fa;
      --panel: #ffffff;
      --overstated: #b42318;
      --missing: #b54708;
      --supported: #067647;
      --receipts: #344054;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    main {
      min-height: calc(100vh - 74px);
    }
    .claim-strip {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }
    .headline-strip {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(246,248,250,0.96));
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .telemetry-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }
    .stat-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .stat-note {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }
    .report-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      min-height: calc(100vh - 250px);
    }
    section { padding: 18px; border-right: 1px solid var(--line); }
    section:last-child { border-right: 0; }
    .filters {
      display: grid;
      grid-template-columns: minmax(180px, 260px);
      gap: 10px;
      margin: 0 0 12px;
    }
    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--panel);
      color: var(--ink);
    }
    .claim-row {
      width: 100%;
      text-align: left;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      overflow-wrap: anywhere;
    }
    .claim-row.active { border-color: var(--ink); box-shadow: 0 0 0 2px rgba(31,35,40,.08); }
    #claim-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
    }
    .claim-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 999px;
      margin-right: 6px;
      color: white;
      background: var(--receipts);
    }
    .hint {
      display: inline-grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      cursor: help;
      position: relative;
      background: var(--panel);
      vertical-align: middle;
    }
    .hint:focus {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }
    .hint::after {
      content: attr(data-tip);
      display: none;
      position: absolute;
      z-index: 10;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      width: min(280px, 72vw);
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--ink);
      color: #ffffff;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.35;
      box-shadow: 0 8px 24px rgba(31,35,40,.18);
    }
    .hint:hover::after,
    .hint:focus::after {
      display: block;
    }
    .muted { color: var(--muted); }
    .wrap {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
      overflow-wrap: anywhere;
    }
    .score {
      height: 10px;
      background: #eaecf0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .score > div { height: 100%; background: var(--overstated); }
    .strength-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .strength-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--bg);
    }
    .strength-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }
    .meter {
      height: 8px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .meter > div { height: 100%; background: var(--receipts); }
    .meter.overstated > div, .meter.contradicted > div { background: var(--overstated); }
    .meter.missing-context > div { background: var(--missing); }
    .meter.supported > div { background: var(--supported); }
    a {
      color: var(--receipts);
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .source-item {
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .source-item:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }
    h2, h3 { margin: 0 0 10px; letter-spacing: 0; }
    .title-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    pre {
      white-space: pre-wrap;
      background: #0d1117;
      color: #f0f6fc;
      padding: 12px;
      border-radius: 8px;
      max-height: 260px;
      overflow: auto;
    }
    details {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--bg);
      padding: 10px 12px;
      margin-top: 10px;
    }
    details:first-of-type {
      margin-top: 0;
    }
    summary {
      cursor: pointer;
      font-weight: 800;
    }
    @media (max-width: 980px) {
      .report-grid { grid-template-columns: 1fr; }
      section { border-right: 0; border-bottom: 1px solid var(--line); }
      .strength-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

        </div>
        <div id="evidence"></div>
      </section>
    </div>
  </main>

r tasks, and deliver production-ready code. Scott Wu Co-Founder and CEO Claude Sonnet 4.5 shows strong promise for red teaming , generating creative attack scenarios that accelerate how we study attacker tradecraft. These insights strengthen our defenses across endpoints, identity, cloud, data, SaaS, and AI workloads. Sven Krasser Sr. Vice President for Data Science and Chief Scientist Claude Sonnet 4.5 resets our expectations\u2014 it handles 30+ hours of autonomous coding , freeing our engineers to tackle months of complex architectural work in dramatically less time while maintaining coherence across massive codebases. Sean Ward CEO and Co-Founder For complex financial analysis\u2014risk, structured products, portfolio screening\u2014Claude Sonnet 4.5 with thinking delivers investment-grade insights that require less human review . When depth matters more than speed, it&#x27;s a meaningful step forward for institutional finance. Stian Kirkeberg Head of AI and Machine Learning 01 / 13 Our most aligned model yet As well as being our most capable model, Claude Sonnet 4.5 is our most aligned frontier model yet. Claude\u2019s improved capabilities and our extensive safety training have allowed us to substantially improve the model\u2019s behavior, reducing concerning behaviors like sycophancy, deception, power-seeking, and the tendency to encourage delusional thinking. For the model\u2019s agentic and computer use capabilities, we\u2019ve also made considerable progress on defending against prompt injection attacks, one of the most serious risks for users of these capabilities. You can read a detailed set of safety and alignment evaluations, which for the first time includes tests using techniques from mechanistic interpretability, in the Claude Sonnet 4.5 system card . Overall misaligned behavior scores from an automated behavioral auditor (lower is better). Misaligned behaviors include (but are not limited to) deception, sycophancy, power-seeking, encouragement of delusions, and compliance with harmful system prompts. More details can be found in the Claude Sonnet 4.5 system card . Claude Sonnet 4.5 is being released under our AI Safety Level 3 (ASL-3) protections, as per our framework that matches model capabilities with appropriate safeguards. These safeguards include filters called classifiers that aim to detect potentially dangerous inputs and outputs\u2014in particular those related to chemical, biological, radiological, and nuclear (CBRN) weapons. These classifiers might sometimes inadvertently flag normal content. We\u2019ve made it easy for users to continue any interrupted conversations with Sonnet 4, a model that poses a lower CBRN risk. We&#x27;ve already made significant progress in reducing these false positives, reducing them by a factor of ten since we originally described them , and a factor of two since Claude Opus 4 was released in May. We\u2019re continuing to make progress in making the classifiers more discerning 1 . The Claude Agent SDK We&#x27;ve spent more than six months shipping updates to Claude Code, so we know what it takes to build and design AI agents. We&#x27;ve solved hard problems: how agents should manage memory across long-running tasks, how to handle permission systems that balance autonomy with user control, and how to coordinate subagents working toward a shared goal. Now we\u2019re making all of this available to you. The Claude Agent SDK is the same infrastructure that powers Claude Code, but it shows impressive benefits for a very wide variety of tasks, not just coding. As of today, you can use it to build your own agents. We built Claude Code because the tool we wanted didn\u2019t exist yet. The Agent SDK gives you the same foundation to build something just as capable for whatever problem you&#x27;re solving. Bonus research preview We\u2019re releasing a temporary research preview alongside Claude Sonnet 4.5, called &quot; Imagine with Claude &quot;. In this experiment, Claude generates software on the fly. No functionality is predetermined; no code is prewritten. What you see is Claude creating in real time, responding and adapting to your requests as you interact. It&#x27;s a fun demonstration showing what Claude Sonnet 4.5 can do\u2014a way to see what&#x27;s possible when you combine a capable model with the right infrastructure. &quot;Imagine with Claude&quot; is available to Max subscribers for the next five days. We encourage you to try it out on claude.ai/imagine . Further information We recommend upgrading to Claude Sonnet 4.5 for all uses. Whether you\u2019re using Claude through our apps, our API, or Claude Code, Sonnet 4.5 is a drop-in replacement that provides much improved performance for the same price. Claude Code updates are available to all users. Claude Developer Platform updates, including the Claude Agent SDK, are available to all developers. Code execution and file creation are available on all paid plans in the Claude apps. For complete technical details and evaluation results, see our system card , model page , and documentation . For more information, explore our engineering posts and research post on cybersecurity . Footnotes 1 : Customers in the cybersecurity and biological research industries can work with their account teams to join our allowlist in the meantime. Methodology SWE-bench Verified : All Claude results were reported using a simple scaffold with two tools\u2014bash and file editing via string replacements. We report 77.2%, which was averaged over 10 trials, no test-time compute, and 200K thinking budget on the full 500-problem SWE-bench Verified dataset. The score reported uses a minor prompt addition: &quot;You should use tools as much as possible, ideally more than 100 times. You should also implement your own tests first before attempting the problem.&quot; A 1M context configuration achieves 78.2%, but we report the 200K result as our primary score as the 1M configuration was implicated in our recent inference issues . For our &quot;high compute&quot; numbers we adopt additional complexity and parallel test-time compute as follows: We sample multiple parallel attempts. We discard patches that break the visible regression tests in the repository, similar to the rejection sampling approach adopted by Agentless (Xia et al. 2024); note no hidden test information is used. We then use an internal scoring model to select the best candidate from the remaining attempts. This results in a score of 82.0% for Sonnet 4.5. Terminal-Bench : All scores reported use the default agent framework (Terminus 2), with XML parser, averaging multiple runs during different days to smooth the eval sensitivity to inference infrastructure. \u03c42-bench: Scores were achieved using extended thinking with tool use and a prompt addendum to the Airline and Telecom Agent Policy instructing Claude to better target its known failure modes when using the vanilla prompt. A prompt addendum was also added to the Telecom User prompt to avoid failure modes from the user ending the interaction incorrectly. AIME : Sonnet 4.5 score reported using sampling at temperature 1.0. The model used 64K reasoning tokens for the Python configuration. OSWorld: All scores reported use the official OSWorld-Verified framework with 100 max steps, averaged across 4 runs. MMMLU : All scores reported are the average of 5 runs over 14 non-English languages with extended thinking (up to 128K). Finance Agent : All scores reported were run and published by Vals AI on their public leaderboard. All Claude model results reported are with extended thinking (up to 64K) and Sonnet 4.5 is reported with interleaved thinking on. All OpenAI scores reported from their GPT-5 post , GPT-5 for developers post , GPT-5 system card (SWE-bench Verified reported using n=500), Terminal Bench leaderboard (using Terminus 2), and public Vals AI leaderboard. All Gemini scores reported from their model web page , Terminal Bench leaderboard (using Terminus 1), and public Vals AI leaderboard. Related content Widening the conversation on frontier AI Read more KPMG integrates Claude across its core business and workforce of more than 276,000 in strategic alliance KPMG and Anthropic announce a global alliance, with Claude integrated into KPMG&#x27;s Digital Gateway platform and available to all 276,000+ employees. Read more Anthropic acquires Stainless Anthropic is acquiring Stainless, a leader in SDKs and MCP server tooling. Read more Products Claude Claude Code Claude Code Enterprise Claude Cowork Claude Security Claude for Chrome Claude for Slack Claude for Microsoft 365 Skills Max plan Team plan Enterprise plan Download app Pricing Log in to Claude Models Mythos Preview Opus Sonnet Haiku Solutions AI agents Code modernization Coding Customer support Education Financial services Government Healthcare Legal Life sciences Nonprofits Security Small business Claude Platform Overview Developer docs Pricing Marketplace Regional compliance Claude on AWS Google Cloud\u2019s Vertex AI Microsoft Foundry Console login Resources Blog Claude partner network Community Connectors Courses Customer stories Engineering at Anthropic Events Inside Claude Code Inside Claude Cowork Inside Claude Enterprise Inside Claude Security Plugins Powered by Claude Service partners Startups program Tutorials Use cases Help and security Availability Status Support center Company Anthropic Careers Economic Futures Research News Claude\u2019s Constitution Responsible Scaling Policy Security and compliance Transparency Terms and policies Privacy policy Consumer health data privacy policy Responsible disclosure policy Terms of service: Commercial Terms of service: Consumer Usage policy \u00a9 2026 Anthropic PBC Introducing Claude Sonnet 4.5 \\ Anthropic"

        ${contrastCard(audit.contrast)}
        <div class="panel"><h3>Defensible Rewrite</h3><p class="wrap">${esc(audit.weaker_supported_rewrite)}</p></div>
        <div class="panel"><h3>Why</h3><p class="wrap">${esc(audit.why)}</p></div>
        ${claimTimingPanel(audit.claim_timing)}
        ${computedChecks}
        <div class="panel"><h3>Agent Steps</h3>${agentSteps(audit.agent_outputs || [])}</div>
      `;
      document.getElementById('evidence').innerHTML = `
        ${providedReferencesPanel(report.reference_urls || [])}
        ${sourcesChecked(audit.contrast)}
        <div class="panel"><h3>Gemini-Discovered Supporting Sources</h3><p class="muted">Sources found by the verifier while looking for the strongest support for this claim.</p>${items(audit.supporting_evidence)}</div>
        <div class="panel"><h3>Gemini-Discovered Caveat / Counter Sources</h3><p class="muted">Sources found by the contradiction-finder while looking for caveats, missing context, benchmark limits, or contrary evidence.</p>${items(audit.counter_evidence)}</div>
        <div class="panel"><h3>Missing Context</h3>${list(audit.missing_context)}</div>
      `;
    }
    function strengthCard(label, value, verdict, display, tip) {
      return `
        <div class="strength-card">
          <div class="strength-label"><span>${label} ${hint(tip)}</span><span>${display}</span></div>
          <div class="meter ${cls(verdict)}"><div style="width: ${value}%"></div></div>
        </div>
      `;
    }
    function contrastCard(contrast) {
      if (!contrast) return '';
      const best = contrast.best_sources?.[0];
      const sourceSummary = best ? best.evidence_summary : 'No usable reference source was available.';
      const qualification = best?.key_qualification ? `<p><strong>Key qualification:</strong> ${esc(best.key_qualification)}</p>` : '';
      return `
        <div class="panel">
          <h3>Evidence Contrast</h3>
          <p><strong>Claim says:</strong> <span class="wrap">${esc(contrast.claim_text)}</span></p>
          <p><strong>Best reference says:</strong> <span class="wrap">${esc(sourceSummary)}</span></p>
          ${qualification}
          <p><strong>Delta:</strong> ${esc(contrast.delta_type)} — ${esc(contrast.delta_explanation)}</p>
          <p><strong>Final verdict:</strong> ${esc(contrast.recommended_verdict)} · Confidence: ${esc(contrast.confidence)}</p>
          <p><strong>Defensible rewrite:</strong> <span class="wrap">${esc(contrast.suggested_rewrite)}</span></p>
        </div>
      `;
    }
    function claimTimingPanel(timing) {
      if (!timing) return '';
      return `
        <div class="panel">
          <h3>Claim Timing</h3>
          <p class="muted">Measured wall-clock time for this claim during the run.</p>
          <p><strong>Total:</strong> ${fmtMs(timing.total_duration_ms)} · <strong>Contrast:</strong> ${fmtMs(timing.contrast_ms)}</p>
          <ul>
            <li class="wrap"><strong>Verifier:</strong> ${fmtMs(timing.verifier_ms)}</li>
            <li class="wrap"><strong>Contradiction finder:</strong> ${fmtMs(timing.contradiction_finder_ms)}</li>
            <li class="wrap"><strong>Numeric calibrator:</strong> ${fmtMs(timing.numeric_calibrator_ms)}</li>
            <li class="wrap"><strong>Aggregator:</strong> ${fmtMs(timing.aggregator_ms)}</li>
          </ul>
        </div>
      `;
    }
    function providedReferencesPanel(values) {
      if (!values.length) {
        return `
          <div class="panel">
            <h3>Provided Reference URLs</h3>
            <p class="muted">No explicit reference URLs were provided for this run.</p>
          </div>
        `;
      }
      return `
        <div class="panel">
          <h3>Provided Reference URLs</h3>
          <p class="muted">Explicit sources supplied on the CLI with <code>--reference</code>. These anchor Evidence Contrast and define the source-of-truth packet for this run.</p>
          ${plainUrlItems(values)}
        </div>
      `;
    }
    function sourcesChecked(contrast) {
      if (!contrast) return '<div class="panel"><h3>Claim-Level Contrast References</h3><p class="muted">No contrast references checked for this claim. Contrast is applied only to the selected top-risk claims controlled by --contrast-top.</p></div>';
      const references = contrast.reference_sources || [];
      const best = contrast.best_sources || [];
      return `
        <div class="panel">
          <h3>Claim-Level Contrast References</h3>
          <p class="muted">References used by the Evidence Contrast pass for this selected claim. These are anchored by provided reference URLs, but Gemini may resolve nearby canonical pages or source titles while reading them.</p>
          ${referenceItems(references)}
        </div>
        <div class="panel">
          <h3>Reference Snippets / Mismatches</h3>
          <p class="muted">Claim-level snippets showing how the referenced source supports, narrows, or conflicts with the original wording.</p>
          ${contrastSourceItems(best)}
        </div>
      `;
    }
    function plainUrlItems(values) {
      return values.map(value => {
        const href = safeHref(value);
        const source = href
          ? `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(value)}</a>`
          : `<span class="muted">${esc(value)}</span>`;
        return `<div class="source-item"><p class="wrap">${source}</p></div>`;
      }).join('');
    }
    function referenceItems(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return values.map(item => {
        const href = safeHref(item.url);
        const source = href
          ? `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(item.url)}</a>`
          : `<span class="muted">${esc(item.url || 'No URL recorded')}</span>`;
        return `
          <div class="source-item">
            <p><strong>${esc(item.title)}</strong> <span class="muted">(${esc(item.source_type)} · authority ${item.authority_score}/100)</span></p>
            <p class="wrap">${source}</p>
            <p class="muted wrap">${esc(item.why_relevant || '')}</p>
          </div>
        `;
      }).join('');
    }
    function contrastSourceItems(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return values.map(item => {
        const href = safeHref(item.url);
        const source = href
          ? `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(item.url)}</a>`
          : `<span class="muted">${esc(item.url || 'No URL recorded')}</span>`;
        return `
          <div class="source-item">
            <p><strong>${esc(item.title)}</strong> <span class="muted">(${esc(item.stance)})</span></p>
            <p class="wrap">${esc(item.evidence_summary)}</p>
            <p class="wrap">${source}</p>
            <p class="muted wrap">${esc(item.key_qualification || '')}</p>
          </div>
        `;
      }).join('');
    }
    function agentSteps(values) {
      if (!values.length) return '<p class="muted">No agent step trace recorded.</p>';
      return values.map(step => `
        <details>
          <summary>${esc(step.agent)} — ${esc(step.summary)}</summary>
          <p class="muted">Claim ID: ${esc(step.claim_id)}</p>
          <p class="muted">Duration: ${step.duration_ms == null ? 'not recorded' : fmtMs(step.duration_ms)}</p>
          <h4>Supporting evidence</h4>
          ${items(step.supporting_evidence || [])}
          <h4>Contradictions / narrowing evidence</h4>
          ${items(step.counter_evidence || [])}
          <h4>Missing context</h4>
          ${list(step.missing_context || [])}
          <h4>Computed checks</h4>
          ${list(step.numeric_findings || [])}
        </details>
      `).join('');
    }
    function list(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return `<ul>${values.map(value => `<li class="wrap">${esc(value)}</li>`).join('')}</ul>`;
    }
    function items(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return values.map(item => {
        const href = safeHref(item.url);
        const source = href
          ? `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(item.url)}</a>`
          : `<span class="muted">${esc(item.url || 'No URL recorded')}</span>`;
        return `
          <div class="source-item">
            <p><strong>${esc(item.source_title)}</strong></p>
            <p class="wrap">${esc(item.snippet)}</p>
            <p class="wrap">${source}</p>
            <p class="muted wrap">${esc(item.relevance || '')}</p>
          </div>
        `;
      }).join('');
    }
    setupFilters();
    renderHeadline();
    render();
  </script>
</body>
</html>
