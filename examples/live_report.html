<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CappinCheck Report</title>
  <style>
    :root {
      --ink: #1f2328;
      --muted: #667085;
      --line: #d0d7de;
      --bg: #f6f8fa;
      --panel: #ffffff;
      --cap: #b42318;
      --sus: #b54708;
      --nocap: #067647;
      --receipts: #344054;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    main {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr) 380px;
      min-height: calc(100vh - 74px);
    }
    aside, section { padding: 18px; border-right: 1px solid var(--line); }
    section:last-child { border-right: 0; }
    .claim-row {
      width: 100%;
      text-align: left;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .claim-row.active { border-color: var(--ink); box-shadow: 0 0 0 2px rgba(31,35,40,.08); }
    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 999px;
      margin-right: 6px;
      color: white;
      background: var(--receipts);
    }
    .badge.cap { background: var(--cap); }
    .badge.sus { background: var(--sus); }
    .badge.no-cap, .badge.mostly-no-cap { background: var(--nocap); }
    .muted { color: var(--muted); }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .score {
      height: 10px;
      background: #eaecf0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .score > div { height: 100%; background: var(--cap); }
    h2, h3 { margin: 0 0 10px; letter-spacing: 0; }
    pre {
      white-space: pre-wrap;
      background: #0d1117;
      color: #f0f6fc;
      padding: 12px;
      border-radius: 8px;
      max-height: 260px;
      overflow: auto;
    }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      aside, section { border-right: 0; border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>CappinCheck</h1>
      <div class="muted">Demo Paper: CappinCheck for Agentic Claim Audits</div>
    </div>
    <div class="muted">1 audited claims</div>
  </header>
  <main>
    <aside>
      <h2>Claim Ledger</h2>
      <div id="claim-list"></div>
    </aside>
    <section>
      <h2>Selected Claim</h2>
      <div id="claim-detail"></div>
    </section>
    <section>
      <h2>Evidence Stack</h2>
      <div id="evidence"></div>
      <h3>Raw JSON</h3>
      <pre id="raw"></pre>
    </section>
  </main>
  <script>
    const report = {
  "document": {
    "title": "Demo Paper: CappinCheck for Agentic Claim Audits",
    "source": "examples/demo_document.md",
    "text": "# Demo Paper: CappinCheck for Agentic Claim Audits\n\n## Abstract\n\nWe introduce CappinCheck, an agentic workflow that improves performance by 30% over prior work on real-world tasks. The system robustly generalizes across domains and is the first agentic workflow for scientific claim auditing.\n\n## Results\n\nWe compare CappinCheck against a baseline claim-review pipeline on Benchmark X. The baseline system achieves 84.1% on the benchmark. CappinCheck achieves 87.3% on the same benchmark.\n\n| System | Benchmark X accuracy |\n| --- | ---: |\n| Baseline | 84.1% |\n| CappinCheck | 87.3% |\n\n## Discussion\n\nThe benchmark contains curated technical claims from public documents. We did not evaluate prospective real-world deployment, clinical documents, legal documents, or private enterprise workflows. We did not run an external literature search for prior scientific fact-checking or claim-audit systems.\n"
  },
  "claims": [
    {
      "id": "claim_1",
      "claim": "improves performance by 30% over prior work",
      "claim_type": "numeric",
      "source_location": "Abstract",
      "why_risky": "The results section shows an accuracy increase from 84.1% to 87.3%, which is only a 3.2% absolute improvement or roughly a 20% error reduction, making the 30% improvement claim mathematically unsupported by the provided data.",
      "audit_question": "What specific metric and prior work baseline were used to calculate the 30% performance improvement, and where is this data presented in the paper?"
    },
    {
      "id": "claim_2",
      "claim": "on real-world tasks",
      "claim_type": "generalization",
      "source_location": "Abstract",
      "why_risky": "The discussion explicitly notes that they did not evaluate prospective real-world deployment, clinical documents, legal documents, or private enterprise workflows, which undermines the claim of testing on real-world tasks.",
      "audit_question": "What characteristics of Benchmark X qualify it as representative of 'real-world tasks' given the exclusion of real-world deployments, clinical, legal, and private enterprise workflows?"
    },
    {
      "id": "claim_3",
      "claim": "The system robustly generalizes across domains",
      "claim_type": "generalization",
      "source_location": "Abstract",
      "why_risky": "The evaluation was restricted to curated technical claims from public documents, without testing across key domains like clinical or legal, meaning there is no empirical evidence to support robust cross-domain generalization.",
      "audit_question": "Which distinct domains was CappinCheck evaluated against, and what were the performance metrics demonstrating robustness across these domains?"
    },
    {
      "id": "claim_4",
      "claim": "is the first agentic workflow for scientific claim auditing.",
      "claim_type": "novelty",
      "source_location": "Abstract",
      "why_risky": "The authors state in the discussion that they did not conduct an external literature search for prior scientific fact-checking or claim-audit systems, making the absolute novelty claim of being the 'first' unsupported.",
      "audit_question": "What systematic literature search or patent search was performed to verify that no other agentic workflows for scientific claim auditing exist in prior literature?"
    },
    {
      "id": "claim_5",
      "claim": "We compare CappinCheck against a baseline claim-review pipeline on Benchmark X.",
      "claim_type": "benchmark",
      "source_location": "Results",
      "why_risky": "There is no information on whether Benchmark X is a standard, validated benchmark or if the baseline pipeline was optimized fairly, which could lead to an artificial performance advantage.",
      "audit_question": "Is Benchmark X a standard peer-reviewed benchmark, and how was the baseline claim-review pipeline constructed and optimized to ensure a fair comparison?"
    },
    {
      "id": "claim_6",
      "claim": "The baseline system achieves 84.1% on the benchmark.",
      "claim_type": "numeric",
      "source_location": "Results",
      "why_risky": "The accuracy figure is presented as a single static point estimate without standard deviation, confidence intervals, or details on the number of evaluation runs.",
      "audit_question": "What are the confidence intervals and statistical variance for the baseline system's 84.1% accuracy score across multiple runs?"
    },
    {
      "id": "claim_7",
      "claim": "CappinCheck achieves 87.3% on the same benchmark.",
      "claim_type": "numeric",
      "source_location": "Results",
      "why_risky": "The reported accuracy of 87.3% lacks statistical significance testing, meaning the 3.2% marginal difference over the baseline could be due to random variation.",
      "audit_question": "Was a statistical significance test performed to confirm that the 87.3% score is significantly better than the 84.1% baseline, and what was the resulting p-value?"
    },
    {
      "id": "claim_8",
      "claim": "The benchmark contains curated technical claims from public documents.",
      "claim_type": "other",
      "source_location": "Discussion",
      "why_risky": "Curated benchmarks of public documents are highly prone to selection bias and data leakage if the model was trained on public internet data containing those exact claims.",
      "audit_question": "What curation criteria and methodologies were used to construct Benchmark X, and how did you verify that the evaluation data did not leak into the models' training or fine-tuning datasets?"
    }
  ],
  "audits": [
    {
      "claim": {
        "id": "claim_1",
        "claim": "improves performance by 30% over prior work",
        "claim_type": "numeric",
        "source_location": "Abstract",
        "why_risky": "The results section shows an accuracy increase from 84.1% to 87.3%, which is only a 3.2% absolute improvement or roughly a 20% error reduction, making the 30% improvement claim mathematically unsupported by the provided data.",
        "audit_question": "What specific metric and prior work baseline were used to calculate the 30% performance improvement, and where is this data presented in the paper?"
      },
      "verdict": "contradicted",
      "vibe": "cap",
      "confidence": "high",
      "cap_score": 90,
      "why": "The claim of a 30% performance improvement over prior work is mathematically contradicted by the paper's own empirical results. The actual data presented on Benchmark X shows CappinCheck achieving 87.3% accuracy compared to a baseline of 84.1%, which translates to a 3.2 percentage point absolute increase, a 3.8% relative accuracy improvement, or a 20.1% relative error rate reduction. None of these calculations yield 30%. Furthermore, the authors state they did not conduct an external literature search, meaning the claim of beating 'prior work' lacks foundational evidence.",
      "weaker_supported_rewrite": "improves relative performance accuracy by 3.8% (or reduces the error rate by 20.1%) on Benchmark X compared to a baseline claim-review pipeline",
      "supporting_evidence": [],
      "counter_evidence": [
        {
          "source_title": "Demo Paper: CappinCheck for Agentic Claim Audits",
          "url": null,
          "date": null,
          "snippet": "We compare CappinCheck against a baseline claim-review pipeline on Benchmark X. The baseline system achieves 84.1% on the benchmark. CappinCheck achieves 87.3% on the same benchmark. | System | Benchmark X accuracy | | --- | ---: | | Baseline | 84.1% | | CappinCheck | 87.3% |",
          "relevance": "Provides the actual benchmark results which directly contradict the claimed 30% improvement, showing only a 3.2 percentage point absolute improvement (3.8% relative accuracy improvement, or 20.1% error reduction)."
        },
        {
          "source_title": "Demo Paper: CappinCheck for Agentic Claim Audits",
          "url": null,
          "date": null,
          "snippet": "We did not run an external literature search for prior scientific fact-checking or claim-audit systems.",
          "relevance": "Reveals that the comparison baseline may not represent actual state-of-the-art scientific claim-auditing systems, undermining the 'prior work' claim scope."
        }
      ],
      "missing_context": [
        "The specific baseline, task, or metric that shows a 30% improvement over prior work is completely missing from the paper.",
        "The paper does not provide the formula, metric, or justification used to calculate the 30% performance improvement figure.",
        "The exact specifications, architecture, and source of the 'baseline claim-review pipeline' are not documented.",
        "The paper lacks any other performance evaluations or external comparisons besides the Benchmark X comparison."
      ],
      "numeric_findings": [
        "Claimed performance improvement: 30%",
        "Baseline Benchmark X accuracy: 84.1%",
        "CappinCheck Benchmark X accuracy: 87.3%",
        "Absolute difference: 3.2 percentage points (87.3% - 84.1%)",
        "Relative accuracy improvement: 3.8% (3.2 / 84.1)",
        "Baseline error rate: 15.9%",
        "CappinCheck error rate: 12.7%",
        "Relative error rate reduction: 20.1% (3.2 / 15.9)",
        "Detected benchmark rows: Baseline = 84.1%, CappinCheck = 87.3%.",
        "Absolute gain: 87.3 - 84.1 = 3.2 percentage points.",
        "Relative gain: (3.2 / 84.1) * 100 = 3.8%.",
        "Claimed improvement is 30.0%; computed relative improvement is 3.8% (difference 26.2 points)."
      ]
    }
  ]
};
    let selected = 0;
    const cls = (vibe) => vibe.replaceAll(' ', '-');
    function render() {
      const audits = report.audits;
      document.getElementById('claim-list').innerHTML = audits.map((audit, i) => `
        <button class="claim-row ${i === selected ? 'active' : ''}" onclick="selected=${i}; render();">
          <span class="badge ${cls(audit.vibe)}">${audit.vibe}</span>
          <span class="muted">${audit.claim.claim_type}</span>
          <div>${audit.claim.claim}</div>
        </button>
      `).join('');
      const audit = audits[selected];
      document.getElementById('claim-detail').innerHTML = `
        <div class="panel">
          <span class="badge ${cls(audit.vibe)}">${audit.vibe}</span>
          <strong>${audit.verdict}</strong>
          <div class="score"><div style="width: ${audit.cap_score}%"></div></div>
          <p class="muted">Cap Score: ${audit.cap_score} / 100 · Confidence: ${audit.confidence}</p>
        </div>
        <div class="panel"><h3>Original</h3><p>${audit.claim.claim}</p></div>
        <div class="panel"><h3>Defensible Rewrite</h3><p>${audit.weaker_supported_rewrite}</p></div>
        <div class="panel"><h3>Why</h3><p>${audit.why}</p></div>
        <div class="panel"><h3>Numeric Findings</h3><ul>${audit.numeric_findings.map(x => `<li>${x}</li>`).join('')}</ul></div>
      `;
      document.getElementById('evidence').innerHTML = `
        <div class="panel"><h3>Supporting</h3>${items(audit.supporting_evidence)}</div>
        <div class="panel"><h3>Counter</h3>${items(audit.counter_evidence)}</div>
        <div class="panel"><h3>Missing Context</h3><ul>${audit.missing_context.map(x => `<li>${x}</li>`).join('')}</ul></div>
      `;
      document.getElementById('raw').textContent = JSON.stringify(audit, null, 2);
    }
    function items(values) {
      if (!values.length) return '<p class="muted">None recorded.</p>';
      return values.map(item => `<p><strong>${item.source_title}</strong><br>${item.snippet}<br><span class="muted">${item.url || ''}</span></p>`).join('');
    }
    render();
  </script>
</body>
</html>
